<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lifestyle Apps — Omar Huertas LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
:root{
  --now:#10b981;--now-d:#059669;--now-l:#6ee7b7;
  --ink:#0a1418;--ink-2:#142329;--navy:#04222f;--navy-2:#0a3a4d;
  --muted:#5a6c75;--line:#e6ecef;--bg:#f4f8f9;
  --paper:#fcfaf5;--paper-2:#f4f0e6;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);
  background:
   radial-gradient(50% 50% at 85% 5%,rgba(16,185,129,.20),transparent 70%),
   radial-gradient(45% 60% at 10% 100%,rgba(5,150,105,.16),transparent 70%),
   linear-gradient(135deg,#04222f,#0a3a4d 60%,#071d28);
  background-attachment:fixed;min-height:100vh;display:flex;flex-direction:column;align-items:center;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
.grain{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:4px 4px}

/* top bar */
.topbar{position:relative;z-index:5;width:100%;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px 22px;color:#eaf7f8}
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:13px;font-weight:900;box-shadow:0 8px 20px rgba(5,150,105,.35)}
.brand-lock{display:flex;flex-direction:column;line-height:1.12}
.brand-lock .b-name{font-weight:800;font-size:15px;letter-spacing:-.02em}
.brand-lock .b-sub{font-size:10px;font-weight:800;letter-spacing:.09em;color:var(--now-l);text-transform:uppercase}
.partner-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(16,185,129,.4);background:rgba(16,185,129,.10);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:800;color:#d6ffce}
.partner-pill .pp-dot{width:8px;height:8px;border-radius:50%;background:var(--now);box-shadow:0 0 0 3px rgba(16,185,129,.22)}
.toplink{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#eaf7f8;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:800;text-decoration:none}
@media(max-width:640px){.partner-pill{display:none}}

#progress{position:relative;z-index:5;width:min(1100px,94vw);height:4px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden;margin:2px 0 14px}
#progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--now-d),var(--now),var(--now-l));box-shadow:0 0 12px rgba(16,185,129,.6);transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* ===== BOOK STAGE ===== */
.stage{position:relative;z-index:5;width:min(1180px,96vw);flex:1;display:flex;align-items:center;justify-content:center;padding:6px 0 12px;perspective:3000px}
/* hardcover boards sitting behind the pages */
.bookwrap{position:relative;width:100%;max-height:82vh;aspect-ratio:1.46/1;display:flex;align-items:center;justify-content:center;
  transform-style:preserve-3d;transition:transform .9s cubic-bezier(.2,.7,.2,1)}
.bookwrap::before{ /* cover boards */
  content:"";position:absolute;inset:-14px -16px -16px -16px;border-radius:12px;
  background:linear-gradient(135deg,#06352a,#04231c 55%,#021510);
  box-shadow:0 50px 90px rgba(0,0,0,.55),inset 0 0 0 1px rgba(16,185,129,.18);
  z-index:0}
.book{position:relative;width:100%;height:100%;z-index:1}
/* center spine */
.book::after{content:"";position:absolute;top:1.5%;bottom:1.5%;left:50%;width:30px;transform:translateX(-50%);z-index:40;pointer-events:none;
  background:linear-gradient(90deg,rgba(0,0,0,0),rgba(0,0,0,.22) 38%,rgba(0,0,0,.30) 50%,rgba(0,0,0,.22) 62%,rgba(0,0,0,0));border-radius:4px}
.book.closed::after{opacity:0}

/* a leaf = one physical sheet, occupies the RIGHT half, hinged at the spine (its left edge) */
.leaf{position:absolute;top:0;right:0;width:50%;height:100%;transform-origin:left center;transform-style:preserve-3d;
  transition:transform .95s cubic-bezier(.34,.62,.28,1)}
.leaf.turned{transform:rotateY(-180deg)}
.leaf .face{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;border-radius:0 var(--radius) var(--radius) 0;
  display:flex;flex-direction:column;background:var(--paper);box-shadow:0 1px 0 rgba(0,0,0,.04)}
.leaf .face.front{z-index:2}
.leaf .face.back{transform:rotateY(180deg);border-radius:var(--radius) 0 0 var(--radius)}
/* page-edge thickness on outer side of the right page */
.leaf .face.front::before{content:"";position:absolute;top:0;bottom:0;right:0;width:8px;z-index:30;pointer-events:none;
  background:repeating-linear-gradient(90deg,#e9e3d4,#e9e3d4 1px,#fcfaf5 1px,#fcfaf5 3px)}
/* spine + curl shading */
.leaf .face::after{content:"";position:absolute;inset:0;z-index:25;pointer-events:none;opacity:1;
  background:linear-gradient(90deg,rgba(0,0,0,.16),rgba(0,0,0,0) 14%)}
.leaf .face.back::after{background:linear-gradient(270deg,rgba(0,0,0,.16),rgba(0,0,0,0) 14%)}
/* lift + sweeping highlight while a leaf is mid-turn */
.leaf.tn{box-shadow:0 40px 80px rgba(0,0,0,.45)}
.leaf.tn .face.front::after{animation:curl .95s ease}
@keyframes curl{0%{background:linear-gradient(90deg,rgba(0,0,0,.16),transparent 14%)}
  45%{background:linear-gradient(105deg,rgba(0,0,0,.05),rgba(255,255,255,.28) 30%,rgba(0,0,0,.22) 60%,transparent 80%)}
  100%{background:linear-gradient(90deg,rgba(0,0,0,.16),transparent 14%)}}

/* closed book = only the cover, centered */
.book.closed .leaf:not(:first-child){opacity:0;pointer-events:none}
.book.closed .leaf:first-child{width:100%}
.book.closed .leaf:first-child .face.cover{border-radius:var(--radius)}
.book{transition:transform .8s cubic-bezier(.2,.7,.2,1)}

/* ===== facing (left) page — the book's verso ===== */
.facing{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:linear-gradient(135deg,var(--paper),var(--paper-2));color:var(--ink);text-align:center;padding:40px}
.facing .f-mark{width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;box-shadow:0 10px 24px rgba(5,150,105,.3)}
.facing .f-word{font-family:Fraunces,Georgia,serif;font-size:26px;font-weight:700;line-height:1.05;color:var(--ink-2);letter-spacing:-.01em}
.facing .f-word b{color:var(--now-d)}
.facing .f-rule{width:54px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--now-d),var(--now-l))}
.facing .f-sub{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.facing .f-num{position:absolute;bottom:26px;font-family:Fraunces,Georgia,serif;font-size:13px;color:var(--muted)}

/* ===== page chrome (right / recto content) ===== */
.p-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 30px 0 34px;flex:0 0 auto}
.p-head .ph-brand{display:flex;align-items:center;gap:9px}
.p-head .ph-mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:9px;font-weight:900}
.p-head .ph-name{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--ink)}
.p-head .ph-doc{font-size:10px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--now-d)}
.p-rule{height:3px;margin:12px 30px 0 34px;border-radius:999px;background:linear-gradient(90deg,var(--now-d),var(--now) 45%,transparent)}
.p-body{flex:1 1 auto;overflow-y:auto;padding:18px 30px 12px 34px;scrollbar-width:thin}
.p-body::-webkit-scrollbar{width:7px}.p-body::-webkit-scrollbar-thumb{background:#d8d2c4;border-radius:999px}
.p-foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 30px 16px 34px;font-size:9.5px;font-weight:600;color:var(--muted);border-top:1px solid var(--line)}
.p-foot .pf-c{color:var(--ink);font-weight:700}
.p-foot .pf-n{font-family:Fraunces,Georgia,serif;font-weight:600;color:var(--now-d);font-size:12px}

/* typography */
.p-body h1{font-family:Fraunces,Georgia,serif;font-size:27px;font-weight:900;letter-spacing:-.02em;line-height:1.06;margin:2px 0 12px;color:var(--ink)}
.p-body h2{font-size:18px;font-weight:850;letter-spacing:-.02em;margin:20px 0 9px;color:var(--ink);display:flex;align-items:center;gap:9px}
.p-body h2::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--now);box-shadow:0 0 0 3px rgba(16,185,129,.18);flex:0 0 auto}
.p-body h3{font-size:13.5px;font-weight:800;margin:15px 0 6px;color:var(--ink-2)}
.p-body p{font-size:12.5px;line-height:1.62;color:#26373d;margin:0 0 11px}
.p-body ul,.p-body ol{margin:0 0 12px;padding-left:4px;list-style:none}
.p-body li{font-size:12.5px;line-height:1.55;color:#26373d;margin:0 0 7px;padding-left:20px;position:relative}
.p-body li::before{content:"";position:absolute;left:2px;top:7px;width:7px;height:7px;border-radius:2px;background:var(--now);transform:rotate(45deg)}
.p-body strong{color:var(--ink);font-weight:800}
.p-body .lead{font-size:14px;line-height:1.6;color:#1c2c32;font-weight:500}
.p-body .eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(5,150,105,.3);background:rgba(16,185,129,.10);border-radius:999px;padding:6px 13px;font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--now-d);margin-bottom:14px}
.p-body .eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--now)}
.callout{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.22);border-left:4px solid var(--now);border-radius:12px;padding:13px 16px;margin:4px 0 14px}
.callout p{margin:0;font-size:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:2px 0 14px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:0 4px 14px rgba(4,34,47,.05)}
.kcard .kt{font-size:11px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--now-d);margin-bottom:5px}
.kcard .kd{font-size:11.5px;line-height:1.5;color:#33474f}
table{width:100%;border-collapse:separate;border-spacing:0;margin:2px 0 14px;font-size:11px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
th{background:linear-gradient(135deg,var(--now-d),var(--now));color:#fff;font-weight:800;font-size:10px;letter-spacing:.03em}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#faf8f2}
/* metric cards — emerald-accented paper, NOT black */
.metric-row{display:flex;gap:10px;flex-wrap:wrap;margin:2px 0 14px}
.metric-row .m{flex:1 1 110px;background:#fff;border:1px solid var(--line);border-top:3px solid var(--now);border-radius:14px;padding:14px 14px 13px;box-shadow:0 8px 22px rgba(4,34,47,.07)}
.metric-row .m .v{font-family:Fraunces,Georgia,serif;font-size:24px;font-weight:900;letter-spacing:-.01em;background:linear-gradient(120deg,var(--now-d),var(--now));-webkit-background-clip:text;background-clip:text;color:transparent}
.metric-row .m .l{font-size:10px;font-weight:700;color:var(--muted);margin-top:3px}

/* COVER / BACK (full navy pages) */
.leaf .face.cover,.leaf .face.back-cover{background:linear-gradient(135deg,#04222f,#0a3a4d 60%,#071d28)!important;color:#fff;justify-content:space-between;padding:40px 38px;border-radius:0 var(--radius) var(--radius) 0}
.cover .c-aurora,.back-cover .bc-aurora{position:absolute;inset:0;z-index:0;pointer-events:none}
.cover .c-aurora{background:radial-gradient(45% 45% at 82% 10%,rgba(16,185,129,.34),transparent 70%),radial-gradient(45% 55% at 10% 96%,rgba(5,150,105,.22),transparent 70%)}
.back-cover .bc-aurora{background:radial-gradient(45% 45% at 18% 12%,rgba(16,185,129,.28),transparent 70%)}
.cover>*,.back-cover>*{position:relative;z-index:1}
.cover .c-top{display:flex;align-items:center;justify-content:space-between}
.cover .c-mark{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:18px;font-weight:900;box-shadow:0 12px 30px rgba(5,150,105,.4)}
.cover .c-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(16,185,129,.45);background:rgba(16,185,129,.12);border-radius:999px;padding:7px 13px;font-size:11px;font-weight:800;color:#d6ffce}
.cover .c-pill::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--now)}
.cover .c-mid{margin-top:auto}
.cover .c-eyebrow{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--now-l);margin-bottom:16px}
.cover h1{font-family:Fraunces,Georgia,serif;font-size:clamp(34px,5vw,52px);font-weight:900;line-height:1;letter-spacing:-.02em;margin:0 0 14px}
.cover h1 .accent{background:linear-gradient(120deg,var(--now),var(--now-l));-webkit-background-clip:text;background-clip:text;color:transparent}
.cover .c-sub{font-size:15px;line-height:1.5;color:#d3e7ee;max-width:92%;font-weight:500}
.cover .c-meta{margin-top:26px;padding-top:18px;border-top:1px solid rgba(255,255,255,.16);display:flex;align-items:flex-end;justify-content:space-between;gap:14px}
.cover .c-meta .cm-l .cm-by{font-size:13px;font-weight:800;color:#eaf7f8}
.cover .c-meta .cm-l .cm-rel{font-size:11.5px;color:#bcd6de;margin-top:3px;font-weight:600}
.cover .c-meta .cm-r{font-size:10px;color:#9fbcc6;text-align:right;font-weight:600;max-width:46%}
.back-cover h2{font-family:Fraunces,Georgia,serif;font-size:24px;font-weight:900;letter-spacing:-.01em;margin-bottom:12px;color:#fff}
.back-cover h2::before{display:none}
.back-cover p{font-size:12.5px;line-height:1.6;color:#d3e7ee;margin-bottom:11px}
.back-cover .bc-cta{display:inline-flex;align-items:center;gap:9px;background:var(--now);color:#06231a;font-weight:800;font-size:13px;border-radius:999px;padding:12px 22px;margin-top:6px}
.back-cover .legacy{margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,.16);font-size:10.5px;line-height:1.55;color:#bcd6de}
.back-cover .legacy strong{color:#eaf7f8}
.back-cover .disclaimer{font-size:9px;line-height:1.5;color:#7fa0ab;margin-top:12px}
.back-cover .bc-foot{margin-top:14px;font-size:11px;font-weight:700;color:#cfe9d3;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* controls */
.controls{position:relative;z-index:6;display:flex;align-items:center;gap:16px;padding:12px 0 20px;color:#eaf7f8}
.nav-btn{width:50px;height:50px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:21px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.2s ease}
.nav-btn:hover:not(:disabled){background:var(--now);color:#06231a;transform:translateY(-2px)}
.nav-btn:disabled{opacity:.3;cursor:default}
.counter{font-size:13px;font-weight:800;min-width:90px;text-align:center;letter-spacing:.04em}
.counter b{color:var(--now-l)}
.hint{position:fixed;bottom:9px;left:50%;transform:translateX(-50%);z-index:6;font-size:11px;color:#9fbcc6;font-weight:600;opacity:.8}

/* mobile: single page */
@media(max-width:860px){
  /* iOS-safe: no 3D page flip on phones — cross-fade instead */
  body{min-height:100svh}
  .stage{align-items:stretch;padding:6px 0 10px;perspective:none}
  .bookwrap{aspect-ratio:auto;width:92vw;max-width:460px;height:auto;max-height:none;flex:1}
  .book{height:100%}
  .bookwrap::before{inset:-8px -8px -10px -8px}
  .leaf{left:0;right:auto;width:100%;transform:none!important;opacity:0;pointer-events:none;transition:opacity .3s ease}
  .leaf.current{opacity:1;pointer-events:auto;z-index:5}
  .leaf.tn .face.front::after{animation:none}
  .leaf .face,.leaf .face.front,.cover,.back-cover{border-radius:var(--radius)}
  .leaf .face.front::before{display:none}
  .book::after{display:none}
  .facing{display:none}
  .hint{display:none}
  .p-head,.p-foot{padding-left:18px;padding-right:18px}.p-rule{margin-left:18px;margin-right:18px}.p-body{padding:16px 18px 12px}
}
</style>
</head>

<script>
const DOC = "Lifestyle Apps";
const PAGES = [
{cover:true, html:`
  <div class="c-top"><span class="c-mark">OH</span><span class="c-pill">Omar Huertas LLC</span></div>
  <div class="c-mid">
    <div class="c-eyebrow">App Suite White Paper</div>
    <h1>Lifestyle <span class="accent">Apps</span></h1>
    <p class="c-sub">Four native, focused apps for the way people actually live &mdash; lawn, drinks, land, and family.</p>
    <div class="c-meta">
      <div class="cm-l"><div class="cm-by">A White Paper by Omar Huertas LLC</div><div class="cm-rel">Release 1.0 &middot; June 2026</div></div>
      <div class="cm-r">&copy; 2026 Omar Huertas LLC. All rights reserved.</div>
    </div>
  </div>`},
{doc:'SUITE OVERVIEW', html:`
  <div class="eyebrow">Suite Overview</div>
  <h1>Four apps. One quality bar.</h1>
  <p class="lead">The Lifestyle Apps are four native SwiftUI apps, each laser&#8209;focused on a single job people care about every week. No bloated all&#8209;in&#8209;one &mdash; each app does one thing well and gets out of the way.</p>
  <p>Every app ships private and on&#8209;device by default, with its own Sparkle&#8209;style auto&#8209;update channel so each can evolve independently. They share a common foundation but stand alone on the App Store.</p>
  <div class="metric-row">
    <div class="m"><div class="v">4</div><div class="l">Apps</div></div>
    <div class="m"><div class="v">Native</div><div class="l">SwiftUI</div></div>
    <div class="m"><div class="v">Auto</div><div class="l">Update</div></div>
    <div class="m"><div class="v">Apple</div><div class="l">Platforms</div></div>
  </div>
  <div class="grid2">
    <div class="kcard"><div class="kt">ManThatGrass</div><div class="kd">Lawn care &mdash; schedules, treatments, seasonal guidance.</div></div>
    <div class="kcard"><div class="kt">DrinkMyCraft</div><div class="kd">Craft cocktails &amp; home brewing for the home bar.</div></div>
    <div class="kcard"><div class="kt">FarmThatLand</div><div class="kd">Farming &amp; homestead planning for land and livestock.</div></div>
    <div class="kcard"><div class="kt">RaiseThatBaby</div><div class="kd">Feeding, sleep, and milestone tracking for new parents.</div></div>
  </div>`},
{doc:'MANTHATGRASS', html:`
  <div class="eyebrow">Lawn Care</div>
  <h1>ManThatGrass</h1>
  <p class="lead">A focused lawn&#8209;care companion that turns a healthy yard into a simple, repeatable routine &mdash; the right task at the right time, all season long.</p>
  <p>Tell the app about your grass type and region, and it lays out a season&#8209;aware plan: when to mow, feed, aerate, overseed, and water. Log what you do and watch your lawn&apos;s history build over time.</p>

const book=document.getElementById('book');
const N=PAGES.length;
document.getElementById('tot').textContent=N;
const leaves=[];
PAGES.forEach((pg,i)=>{
  const leaf=document.createElement('div');leaf.className='leaf';
  const front=document.createElement('div');front.className='face front';
  if(pg.cover){front.classList.add('cover');front.innerHTML='<div class="c-aurora"></div>'+pg.html;}
  else if(pg.back){front.classList.add('back-cover');front.innerHTML='<div class="bc-aurora"></div>'+pg.html;}
  else{
    front.innerHTML='<div class="p-head"><span class="ph-brand"><span class="ph-mark">OH</span><span class="ph-name">Omar Huertas LLC</span></span>'+
      '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div><div class="p-rule"></div>'+
      '<div class="p-body">'+pg.html+'</div>'+
      '<div class="p-foot"><span class="pf-c">&copy; 2026 Omar Huertas LLC</span><span class="pf-n">'+String(i+1).padStart(2,'0')+'</span></div>';
  }
  const back=document.createElement('div');back.className='face back';
  back.innerHTML='<div class="facing"><div class="f-mark">OH</div><div class="f-word">Lifestyle <b>Apps</b></div><div class="f-rule"></div><div class="f-sub">An Omar Huertas LLC White Paper</div><div class="f-num">&mdash; '+(i+1)+' &mdash;</div></div>';
  leaf.appendChild(front);leaf.appendChild(back);
  book.appendChild(leaf);leaves.push(leaf);
});

let cur=0; // index of the right-hand (recto) page
function render(){
  leaves.forEach((el,i)=>{
    const turned=i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (N - i);
    el.classList.toggle('current', i===cur);
    el.style.display = Math.abs(i-cur)<=1 ? '' : 'none';
  });
  book.classList.toggle('closed', cur===0);
  document.getElementById('cur').textContent=cur+1;
  document.getElementById('progress').firstElementChild.style.width=(cur/(N-1)*100)+'%';
  document.getElementById('prev').disabled=cur<=0;
  document.getElementById('next').disabled=cur>=N-1;
}
function flash(el){el.classList.add('tn');setTimeout(()=>el.classList.remove('tn'),950);}
let busy=false;
function next(){if(busy||cur>=N-1)return;busy=true;flash(leaves[cur]);cur++;render();setTimeout(()=>busy=false,520);}
function prev(){if(busy||cur<=0)return;busy=true;cur--;flash(leaves[cur]);render();setTimeout(()=>busy=false,520);}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
book.addEventListener('click',e=>{const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
render();
</script>
