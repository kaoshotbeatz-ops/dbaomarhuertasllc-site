<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The ServiceNow Lexicon — by Omar Huertas LLC — Omar Huertas LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
:root{
  --now:#2f6df6;--now-d:#2456c9;--now-l:#8fb4ff;
  --ink:#0a1418;--ink-2:#142329;--navy:#04162f;--navy-2:#0c2f5a;
  --muted:#5a6c75;--line:#e6ecef;--bg:#f4f8f9;
  --paper:#fcfaf5;--paper-2:#f4f0e6;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);
  background:
   radial-gradient(50% 50% at 85% 5%,rgba(47,109,246,.20),transparent 70%),
   radial-gradient(45% 60% at 10% 100%,rgba(36,86,201,.16),transparent 70%),
   linear-gradient(135deg,#04162f,#0c2f5a 60%,#06142a);
  background-attachment:fixed;min-height:100vh;display:flex;flex-direction:column;align-items:center;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
.grain{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:4px 4px}

/* top bar */
.topbar{position:relative;z-index:5;width:100%;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px 22px;color:#eaf7f8}
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:13px;font-weight:900;box-shadow:0 8px 20px rgba(36,86,201,.35)}
.brand-lock{display:flex;flex-direction:column;line-height:1.12}
.brand-lock .b-name{font-weight:800;font-size:15px;letter-spacing:-.02em}
.brand-lock .b-sub{font-size:10px;font-weight:800;letter-spacing:.09em;color:var(--now-l);text-transform:uppercase}
.partner-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(47,109,246,.4);background:rgba(47,109,246,.10);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:800;color:#dce8ff}
.partner-pill .pp-dot{width:8px;height:8px;border-radius:50%;background:var(--now);box-shadow:0 0 0 3px rgba(47,109,246,.22)}
.toplink{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#eaf7f8;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:800;text-decoration:none}
@media(max-width:640px){.partner-pill{display:none}}

#progress{position:relative;z-index:5;width:min(1100px,94vw);height:4px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden;margin:2px 0 14px}
#progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--now-d),var(--now),var(--now-l));box-shadow:0 0 12px rgba(47,109,246,.6);transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* ===== BOOK STAGE ===== */
.stage{position:relative;z-index:5;width:min(1180px,96vw);flex:1;display:flex;align-items:center;justify-content:center;padding:6px 0 12px;perspective:3000px}
/* hardcover boards sitting behind the pages */
.bookwrap{position:relative;width:100%;max-height:82vh;aspect-ratio:1.46/1;display:flex;align-items:center;justify-content:center;
  transform-style:preserve-3d;transition:transform .9s cubic-bezier(.2,.7,.2,1)}
.bookwrap::before{ /* cover boards */
  content:"";position:absolute;inset:-14px -16px -16px -16px;border-radius:12px;
  background:linear-gradient(135deg,#0a2350,#06173a 55%,#040d22);
  box-shadow:0 50px 90px rgba(0,0,0,.55),inset 0 0 0 1px rgba(47,109,246,.18);
  z-index:0}
.book{position:relative;width:100%;height:100%;z-index:1}
/* center spine */
.book::after{content:"";position:absolute;top:1.5%;bottom:1.5%;left:50%;width:30px;transform:translateX(-50%);z-index:40;pointer-events:none;
  background:linear-gradient(90deg,rgba(0,0,0,0),rgba(0,0,0,.22) 38%,rgba(0,0,0,.30) 50%,rgba(0,0,0,.22) 62%,rgba(0,0,0,0));border-radius:4px}
.book.closed::after{opacity:0}

/* a leaf = one physical sheet, occupies the RIGHT half, hinged at the spine (its left edge) */
.leaf{position:absolute;top:0;right:0;width:50%;height:100%;transform-origin:left center;transform-style:preserve-3d;
  transition:transform .95s cubic-bezier(.34,.62,.28,1)}
.leaf.turned{transform:rotateY(-180deg)}
.leaf .face{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;border-radius:0 var(--radius) var(--radius) 0;
  display:flex;flex-direction:column;background:var(--paper);box-shadow:0 1px 0 rgba(0,0,0,.04)}
.leaf .face.front{z-index:2}
.leaf .face.back{transform:rotateY(180deg);border-radius:var(--radius) 0 0 var(--radius)}
/* page-edge thickness on outer side of the right page */
.leaf .face.front::before{content:"";position:absolute;top:0;bottom:0;right:0;width:8px;z-index:30;pointer-events:none;
  background:repeating-linear-gradient(90deg,#e9e3d4,#e9e3d4 1px,#fcfaf5 1px,#fcfaf5 3px)}
/* page-edge thickness on outer (left) side of the verso page */
.leaf .face.back::before{content:"";position:absolute;top:0;bottom:0;left:0;width:8px;z-index:30;pointer-events:none;
  background:repeating-linear-gradient(270deg,#e9e3d4,#e9e3d4 1px,#fcfaf5 1px,#fcfaf5 3px)}
.leaf .face.back.cover::before,.leaf .face.back.back-cover::before{display:none}
/* spine + curl shading */
.leaf .face::after{content:"";position:absolute;inset:0;z-index:25;pointer-events:none;opacity:1;
  background:linear-gradient(90deg,rgba(0,0,0,.16),rgba(0,0,0,0) 14%)}
.leaf .face.back::after{background:linear-gradient(270deg,rgba(0,0,0,.16),rgba(0,0,0,0) 14%)}
/* lift + sweeping highlight while a leaf is mid-turn */
.leaf.tn{box-shadow:0 40px 80px rgba(0,0,0,.45)}
.leaf.tn .face.front::after{animation:curl .95s ease}
@keyframes curl{0%{background:linear-gradient(90deg,rgba(0,0,0,.16),transparent 14%)}
  45%{background:linear-gradient(105deg,rgba(0,0,0,.05),rgba(255,255,255,.28) 30%,rgba(0,0,0,.22) 60%,transparent 80%)}
  100%{background:linear-gradient(90deg,rgba(0,0,0,.16),transparent 14%)}}

/* closed book = only the cover, centered */
.book.closed .leaf:not(:first-child){opacity:0;pointer-events:none}
.book.closed .leaf:first-child{width:100%}
.book.closed .leaf:first-child .face.cover{border-radius:var(--radius)}
.book{transition:transform .8s cubic-bezier(.2,.7,.2,1)}

/* ===== facing (left) page — the book's verso ===== */
.facing{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:linear-gradient(135deg,var(--paper),var(--paper-2));color:var(--ink);text-align:center;padding:40px}
.facing .f-mark{width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;box-shadow:0 10px 24px rgba(36,86,201,.3)}
.facing .f-word{font-family:Fraunces,Georgia,serif;font-size:26px;font-weight:700;line-height:1.05;color:var(--ink-2);letter-spacing:-.01em}
.facing .f-word b{color:var(--now-d)}
.facing .f-rule{width:54px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--now-d),var(--now-l))}
.facing .f-sub{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.facing .f-num{position:absolute;bottom:26px;font-family:Fraunces,Georgia,serif;font-size:13px;color:var(--muted)}

/* ===== page chrome (right / recto content) ===== */
.p-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 30px 0 34px;flex:0 0 auto}
.p-head .ph-brand{display:flex;align-items:center;gap:9px}
.p-head .ph-mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:9px;font-weight:900}
.p-head .ph-name{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--ink)}
.p-head .ph-doc{font-size:10px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--now-d)}
.p-rule{height:3px;margin:12px 30px 0 34px;border-radius:999px;background:linear-gradient(90deg,var(--now-d),var(--now) 45%,transparent)}
.p-body{flex:1 1 auto;overflow-y:auto;padding:18px 30px 12px 34px;scrollbar-width:thin}
.p-body::-webkit-scrollbar{width:7px}.p-body::-webkit-scrollbar-thumb{background:#d8d2c4;border-radius:999px}
.p-foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 30px 16px 34px;font-size:9.5px;font-weight:600;color:var(--muted);border-top:1px solid var(--line)}
.p-foot .pf-c{color:var(--ink);font-weight:700}
.p-foot .pf-n{font-family:Fraunces,Georgia,serif;font-weight:600;color:var(--now-d);font-size:12px}

/* typography */
.p-body h1{font-family:Fraunces,Georgia,serif;font-size:27px;font-weight:900;letter-spacing:-.02em;line-height:1.06;margin:2px 0 12px;color:var(--ink)}
.p-body h2{font-size:18px;font-weight:850;letter-spacing:-.02em;margin:20px 0 9px;color:var(--ink);display:flex;align-items:center;gap:9px}
.p-body h2::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--now);box-shadow:0 0 0 3px rgba(47,109,246,.18);flex:0 0 auto}
.p-body h3{font-size:13.5px;font-weight:800;margin:15px 0 6px;color:var(--ink-2)}
.p-body p{font-size:12.5px;line-height:1.62;color:#26373d;margin:0 0 11px}
.p-body ul,.p-body ol{margin:0 0 12px;padding-left:4px;list-style:none}
.p-body li{font-size:12.5px;line-height:1.55;color:#26373d;margin:0 0 7px;padding-left:20px;position:relative}
.p-body li::before{content:"";position:absolute;left:2px;top:7px;width:7px;height:7px;border-radius:2px;background:var(--now);transform:rotate(45deg)}
.p-body strong{color:var(--ink);font-weight:800}
.p-body .lead{font-size:14px;line-height:1.6;color:#1c2c32;font-weight:500}
.p-body .eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(36,86,201,.3);background:rgba(47,109,246,.10);border-radius:999px;padding:6px 13px;font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--now-d);margin-bottom:14px}
.p-body .eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--now)}
.callout{background:rgba(47,109,246,.07);border:1px solid rgba(47,109,246,.22);border-left:4px solid var(--now);border-radius:12px;padding:13px 16px;margin:4px 0 14px}
.callout p{margin:0;font-size:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:2px 0 14px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:0 4px 14px rgba(4,34,47,.05)}
.kcard .kt{font-size:11px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--now-d);margin-bottom:5px}
.kcard .kd{font-size:11.5px;line-height:1.5;color:#33474f}
table{width:100%;border-collapse:separate;border-spacing:0;margin:2px 0 14px;font-size:11px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
th{background:linear-gradient(135deg,var(--now-d),var(--now));color:#fff;font-weight:800;font-size:10px;letter-spacing:.03em}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#faf8f2}
/* metric cards — emerald-accented paper, NOT black */
.metric-row{display:flex;gap:10px;flex-wrap:wrap;margin:2px 0 14px}
.metric-row .m{flex:1 1 110px;background:#fff;border:1px solid var(--line);border-top:3px solid var(--now);border-radius:14px;padding:14px 14px 13px;box-shadow:0 8px 22px rgba(4,34,47,.07)}
.metric-row .m .v{font-family:Fraunces,Georgia,serif;font-size:24px;font-weight:900;letter-spacing:-.01em;background:linear-gradient(120deg,var(--now-d),var(--now));-webkit-background-clip:text;background-clip:text;color:transparent}
.metric-row .m .l{font-size:10px;font-weight:700;color:var(--muted);margin-top:3px}

/* COVER / BACK (full navy pages) */
.leaf .face.cover,.leaf .face.back-cover{background:linear-gradient(135deg,#04162f,#0c2f5a 60%,#06142a)!important;color:#fff;justify-content:space-between;padding:40px 38px;border-radius:0 var(--radius) var(--radius) 0}
.cover .c-aurora,.back-cover .bc-aurora{position:absolute;inset:0;z-index:0;pointer-events:none}
.cover .c-aurora{background:radial-gradient(45% 45% at 82% 10%,rgba(47,109,246,.34),transparent 70%),radial-gradient(45% 55% at 10% 96%,rgba(36,86,201,.22),transparent 70%)}
.back-cover .bc-aurora{background:radial-gradient(45% 45% at 18% 12%,rgba(47,109,246,.28),transparent 70%)}
.cover>*,.back-cover>*{position:relative;z-index:1}
.cover .c-top{display:flex;align-items:center;justify-content:space-between}
.cover .c-mark{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:18px;font-weight:900;box-shadow:0 12px 30px rgba(36,86,201,.4)}
.cover .c-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(47,109,246,.45);background:rgba(47,109,246,.12);border-radius:999px;padding:7px 13px;font-size:11px;font-weight:800;color:#dce8ff}
.cover .c-pill::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--now)}
.cover .c-mid{margin-top:auto}
.cover .c-eyebrow{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--now-l);margin-bottom:16px}
.cover h1{font-family:Fraunces,Georgia,serif;font-size:clamp(34px,5vw,52px);font-weight:900;line-height:1;letter-spacing:-.02em;margin:0 0 14px}
.cover h1 .accent{background:linear-gradient(120deg,var(--now),var(--now-l));-webkit-background-clip:text;background-clip:text;color:transparent}
.cover .c-sub{font-size:15px;line-height:1.5;color:#d3e7ee;max-width:92%;font-weight:500}
.cover .c-meta{margin-top:26px;padding-top:18px;border-top:1px solid rgba(255,255,255,.16);display:flex;align-items:flex-end;justify-content:space-between;gap:14px}
.cover .c-meta .cm-l .cm-by{font-size:13px;font-weight:800;color:#eaf7f8}
.cover .c-meta .cm-l .cm-rel{font-size:11.5px;color:#bcd6de;margin-top:3px;font-weight:600}
.cover .c-meta .cm-r{font-size:10px;color:#9fbcc6;text-align:right;font-weight:600;max-width:46%}
.back-cover h2{font-family:Fraunces,Georgia,serif;font-size:24px;font-weight:900;letter-spacing:-.01em;margin-bottom:12px;color:#fff}
.back-cover h2::before{display:none}
.back-cover p{font-size:12.5px;line-height:1.6;color:#d3e7ee;margin-bottom:11px}
.back-cover .bc-cta{display:inline-flex;align-items:center;gap:9px;background:var(--now);color:#fff;font-weight:800;font-size:13px;border-radius:999px;padding:12px 22px;margin-top:6px}
.back-cover .legacy{margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,.16);font-size:10.5px;line-height:1.55;color:#bcd6de}
.back-cover .legacy strong{color:#eaf7f8}
.back-cover .disclaimer{font-size:9px;line-height:1.5;color:#7fa0ab;margin-top:12px}
.back-cover .bc-foot{margin-top:14px;font-size:11px;font-weight:700;color:#dce8ff;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* controls */
.controls{position:relative;z-index:6;display:flex;align-items:center;gap:16px;padding:12px 0 20px;color:#eaf7f8}
.nav-btn{width:50px;height:50px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:21px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.2s ease}
@media(hover:hover){.nav-btn:hover:not(:disabled){background:var(--now);color:#fff;transform:translateY(-2px)}}
.nav-btn:active:not(:disabled){background:var(--now);color:#fff;transform:scale(.92)}
.nav-btn:disabled{opacity:.3;cursor:default}
.counter{font-size:13px;font-weight:800;min-width:90px;text-align:center;letter-spacing:.04em}
.counter b{color:var(--now-l)}
.hint{position:fixed;bottom:9px;left:50%;transform:translateX(-50%);z-index:6;font-size:11px;color:#9fbcc6;font-weight:600;opacity:.8}

/* mobile: single page */
@media(max-width:860px){
  /* iOS-safe: no 3D page flip on phones — cross-fade instead */
  body{min-height:100svh}
  .stage{align-items:stretch;padding:6px 0 10px;perspective:none}
  .bookwrap{aspect-ratio:auto;width:92vw;max-width:460px;height:auto;max-height:none;flex:1}
  .book{height:100%}
  .bookwrap::before{inset:-8px -8px -10px -8px}
  /* phones: linearize — every FACE becomes its own page (JS shows one at a time) */
  .leaf{position:absolute!important;inset:0;left:0;right:auto;width:100%;transform:none!important;opacity:1;pointer-events:auto;transition:none}
  .leaf .face{position:absolute;inset:0;transform:none!important;backface-visibility:visible;border-radius:var(--radius)}
  .leaf .face.back{transform:none!important;border-radius:var(--radius)}
  .leaf .face::after{display:none}
  .leaf .face.front::before,.leaf .face.back::before{display:none}
  .leaf.tn .face.front::after{animation:none}
  .cover,.back-cover{border-radius:var(--radius)}
  .book::after{display:none}
  .facing{display:none}
  .hint{display:none}
  .p-head,.p-foot{padding-left:18px;padding-right:18px}.p-rule{margin-left:18px;margin-right:18px}.p-body{padding:16px 18px 12px}
}
</style>
</head>
<body>
<div class="grain"></div>

<div class="topbar">
  <a class="brand" href="https://dbaomarhuertasllc.com" style="color:#eaf7f8;text-decoration:none">
    <span class="brand-mark">OH</span>
    <span class="brand-lock"><span class="b-name">Omar Huertas LLC</span><span class="b-sub">ServiceNow Partner</span></span>
  </a>
  <span style="display:flex;align-items:center;gap:10px"><a class="toplink" href="https://dbaomarhuertasllc.com">dbaomarhuertasllc.com</a><span class="partner-pill"><span class="pp-dot"></span>ServiceNow&reg; &middot; Explained</span></span>
</div>

<div id="progress"><span></span></div>

<div class="stage">
  <div class="bookwrap"><div class="book" id="book"></div></div>
</div>

<div class="controls">
  <button class="nav-btn" id="prev" aria-label="Previous page">&larr;</button>
  <div class="counter"><b id="cur">1</b> / <span id="tot">1</span></div>
  <button class="nav-btn" id="next" aria-label="Next page">&rarr;</button>
</div>
<div class="hint">Use &larr; &rarr; keys, click the page edges, or the buttons to turn the page</div>

<script>
const DOC = "ServiceNow Lexicon";
const PAGES = [

/* ========== COVER ========== */
{cover:true, html:`
  <div class="c-top"><span class="c-mark">OH</span><span class="c-pill">By Omar Huertas LLC</span></div>
  <div class="c-mid">
    <div class="c-eyebrow">The Field Guide &middot; ServiceNow, Explained</div>
    <h1>The ServiceNow <span class="accent">Lexicon</span></h1>
    <p class="c-sub">What ServiceNow is, what it does, every acronym and module decoded &mdash; and why your company needs it. In plain English.</p>
    <div class="c-meta">
      <div class="cm-l"><div class="cm-by">An educational guide by Omar Huertas LLC</div><div class="cm-rel">2026 Edition &middot; Expanded</div></div>
      <div class="cm-r">&copy; 2026 Omar Huertas LLC.</div>
    </div>
  </div>`},

/* ========== 1. WHAT IS SERVICENOW ========== */
{doc:"FOUNDATIONS", html:`
  <span class="eyebrow">Foundations</span>
  <h1>What Is ServiceNow?</h1>
  <p class="lead">ServiceNow is a cloud platform that helps an organization run its work. Instead of dozens of disconnected tools, email chains, and spreadsheets, ServiceNow gives every department one place to request things, route them, approve them, get them done, and measure the results.</p>
  <p>Think of it as the digital nervous system of a company. When someone needs a new laptop, reports an outage, asks HR a question, or files a security concern, that request becomes a tracked <strong>record</strong> that moves through an automated <strong>workflow</strong> until it is resolved &mdash; with a clear owner, history, and timeline at every step.</p>
  <p>It started in IT, but the same engine now powers HR, customer service, security, finance, legal, and operations. One platform, one way of working, shared across the whole business.</p>
  <div class="metric-row">
    <div class="m"><div class="v">1</div><div class="l">Platform</div></div>
    <div class="m"><div class="v">1</div><div class="l">Data Model</div></div>
    <div class="m"><div class="v">Any</div><div class="l">Department</div></div>
    <div class="m"><div class="v">Cloud</div><div class="l">Native</div></div>
  </div>
  <p>The promise is simple: less manual chasing, fewer dropped balls, and real visibility into how work actually flows.</p>`},

/* ========== 2. HISTORY ========== */
{doc:"FOUNDATIONS", html:`
  <h1>A Quick History &amp; Why It Won</h1>
  <p>ServiceNow was born to fix a painfully common problem: <strong>IT ticketing</strong>. In most companies, when something broke or you needed access, you emailed someone, hoped it landed, and waited. There was no shared queue, no status, no accountability.</p>
  <h2>From ticketing to a platform</h2>
  <p>The early product gave IT a clean, web-based way to log and track those tickets. But the team behind it built something cleverer underneath: a general-purpose engine for <strong>records and workflows</strong>. Any kind of work could be modeled the same way &mdash; a thing to track, a process to move it through, people to own each step.</p>
  <p>Once that was true, the platform spread far beyond IT. HR onboarding, customer cases, security incidents, purchase requests &mdash; all of it fit the same pattern.</p>
  <h2>Why it won</h2>
  <ul>
    <li><strong>One platform, not many tools.</strong> Every capability is an app on the same foundation, sharing one data model and one login.</li>
    <li><strong>Configurable, not custom-coded.</strong> Most of what companies need is built by configuration, so changes are fast and survive upgrades.</li>
    <li><strong>It connects everything.</strong> ServiceNow became the layer that ties other systems together and orchestrates work across them.</li>
  </ul>
  <p>The &ldquo;single platform&rdquo; idea is the whole point &mdash; and it is why ServiceNow grew from a help-desk tool into a system the entire enterprise runs on.</p>`},

/* ========== 3. THE PROBLEM ========== */
{doc:"FOUNDATIONS", html:`
  <h1>The Problem It Solves</h1>
  <p class="lead">Most organizations do not have a technology problem so much as a coordination problem. Work is everywhere, and nobody can see all of it at once.</p>
  <h2>Tool sprawl</h2>
  <p>Each team buys its own tool. IT has one, HR another, facilities a third, finance a fourth. None of them talk to each other, so work that crosses teams falls through the cracks.</p>
  <h2>Email and spreadsheets as process</h2>
  <p>When there is no real system, people improvise with inboxes and shared spreadsheets. Approvals get lost, versions conflict, and the &ldquo;status&rdquo; of anything is whatever the last reply said.</p>
  <h2>No single source of truth</h2>
  <p>Ask three people what hardware the company owns, who has access to what, or where a service runs, and you get three different answers. Nobody trusts the data because there is no one place that holds it.</p>
  <h2>Manual, repetitive work</h2>
  <p>Skilled people spend their days copying information between systems, chasing approvals, and re-keying the same data &mdash; work a computer should do.</p>
  <div class="callout"><p>ServiceNow attacks all four at once: it consolidates the tools, replaces the email-and-spreadsheet processes with real workflows, builds a single source of truth, and automates the manual work in between.</p></div>`},

/* ========== 4. THE NOW PLATFORM ========== */
{doc:"FOUNDATIONS", html:`
  <h1>The Now Platform</h1>
  <p class="lead">Everything ServiceNow does sits on one shared foundation called the Now Platform. Understanding its parts is the key to understanding the whole company.</p>
  <p>The Now Platform is a single architecture made of a few building blocks. Every product &mdash; IT, HR, security, customer service &mdash; is simply an <strong>app built on top of it</strong>, sharing the same parts.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Single Data Store</div><div class="kd">One shared database holds the records for every department, so information is entered once and reused everywhere.</div></div>
    <div class="kcard"><div class="kt">Workflow Engine</div><div class="kd">The automation core that moves records through steps, routes approvals, and triggers actions without manual hand-offs.</div></div>
    <div class="kcard"><div class="kt">Low-Code Builder</div><div class="kd">Visual tools let teams design forms, flows, and apps by configuring rather than writing code from scratch.</div></div>
    <div class="kcard"><div class="kt">Built-In AI</div><div class="kd">Machine learning and generative AI are part of the platform &mdash; routing, summarizing, drafting, and predicting.</div></div>
    <div class="kcard"><div class="kt">Integration Layer</div><div class="kd">Pre-built connectors and APIs let ServiceNow exchange data with the other systems a company already runs.</div></div>
    <div class="kcard"><div class="kt">One Experience</div><div class="kd">Portals and modern workspaces give employees and agents a single, consistent place to do their work.</div></div>
  </div>
  <p>Because every app shares these blocks, adding a new capability does not mean buying a new tool &mdash; it means turning on another app on the same platform.</p>`},

/* ========== 5. HOW IT WORKS ========== */
{doc:"FOUNDATIONS", html:`
  <h1>How It Works</h1>
  <p class="lead">In plain English, here is the loop almost everything in ServiceNow follows.</p>
  <ol>
    <li><strong>A record is created.</strong> Someone raises a request, reports an issue, or an automated system opens one. That becomes a tracked record with an owner and a status.</li>
    <li><strong>A workflow moves it forward.</strong> Rules and flows decide what happens next &mdash; route it to the right team, ask for an approval, or take an automatic action.</li>
    <li><strong>Automation does the busywork.</strong> The platform fills in fields, sends notifications, and updates other systems so people do not have to.</li>
    <li><strong>A portal gives self-service.</strong> Employees and customers request and check on things themselves through a friendly website, instead of emailing or calling.</li>
    <li><strong>The CMDB maps what you own.</strong> Behind the scenes, a living map of your systems and services gives context &mdash; what this request touches and what it might affect.</li>
    <li><strong>Integrations keep systems in sync.</strong> ServiceNow exchanges data with the other tools you run, so everyone works from the same facts.</li>
  </ol>
  <div class="callout"><p>Record in &rarr; workflow moves it &rarr; automation handles the routine &rarr; people self-serve &rarr; everything is tracked and measured. That same loop powers IT, HR, security, and the rest.</p></div>`},

/* ========== 6. INSTANCE & ENVIRONMENTS ========== */
{doc:"FOUNDATIONS", html:`
  <h1>The Instance &amp; Environments</h1>
  <p class="lead">When a company adopts ServiceNow, it gets its own private copy of the platform. That copy is called an <strong>instance</strong>.</p>
  <p>An instance is your company&rsquo;s own ServiceNow &mdash; its own data, its own configuration, its own web address. Nobody else can see inside it. Most companies run several instances for different purposes.</p>
  <h2>The three common environments</h2>
  <div class="grid2">
    <div class="kcard"><div class="kt">Dev</div><div class="kd">The development instance, where new ideas are built and configured safely, away from real users.</div></div>
    <div class="kcard"><div class="kt">Test</div><div class="kd">Also called QA or staging. Changes are tried here against realistic data before anyone trusts them.</div></div>
    <div class="kcard"><div class="kt">Prod</div><div class="kd">Production &mdash; the live instance the whole company actually uses every day. Changes here are handled with care.</div></div>
  </div>
  <h2>Moving changes safely</h2>
  <p>You never build directly in production. Instead, work is bundled and promoted from one environment to the next using two mechanisms:</p>
  <ul>
    <li><strong>Update sets</strong> &mdash; a package that captures a set of configuration changes so they can be reviewed and moved together.</li>
    <li><strong>Application repositories</strong> &mdash; a more modern way to version whole apps and publish them between instances.</li>
  </ul>
  <p>This dev &rarr; test &rarr; prod discipline is how serious organizations change a live system without breaking it.</p>`},

/* ========== 7. DECODER I ========== */
{doc:"ACRONYM DECODER", html:`
  <span class="eyebrow">Decoder I</span>
  <h1>Platform &amp; Core</h1>
  <p>The vocabulary that runs underneath everything. These are the terms you will hear in any ServiceNow conversation.</p>
  <table>
    <thead><tr><th>Term</th><th>Stands for</th><th>In plain English</th></tr></thead>
    <tbody>
      <tr><td>Now Platform</td><td>&mdash;</td><td>The shared foundation every ServiceNow app is built on.</td></tr>
      <tr><td>Instance</td><td>&mdash;</td><td>Your company&rsquo;s own private copy of ServiceNow.</td></tr>
      <tr><td>CMDB</td><td>Configuration Management Database</td><td>The living map of everything you run and how it connects.</td></tr>
      <tr><td>CI</td><td>Configuration Item</td><td>One thing in that map &mdash; a server, app, laptop, or service.</td></tr>
      <tr><td>CSDM</td><td>Common Service Data Model</td><td>The agreed blueprint for keeping the CMDB clean and consistent.</td></tr>
      <tr><td>IRE</td><td>Identification &amp; Reconciliation Engine</td><td>The gatekeeper that stops duplicate CIs from being created.</td></tr>
      <tr><td>MID Server</td><td>Management, Instrumentation &amp; Discovery</td><td>A small program inside your network that lets ServiceNow reach systems behind the firewall.</td></tr>
      <tr><td>ECC Queue</td><td>External Communication Channel</td><td>The mailbox the MID Server and the platform use to pass messages.</td></tr>
      <tr><td>ACL</td><td>Access Control List</td><td>The rules that decide who can see or change each record and field.</td></tr>
      <tr><td>BR</td><td>Business Rule</td><td>Server-side logic that runs when records are saved &mdash; behind-the-scenes automation.</td></tr>
      <tr><td>Client Script</td><td>&mdash;</td><td>Logic that runs in the browser to make forms react as a user types.</td></tr>
      <tr><td>UI Policy</td><td>User Interface Policy</td><td>A no-code way to show, hide, or require fields on a form.</td></tr>
      <tr><td>UI Action</td><td>&mdash;</td><td>A button or link on a form that performs an action.</td></tr>
      <tr><td>ATF</td><td>Automated Test Framework</td><td>Built-in testing that checks the platform still works after changes.</td></tr>
      <tr><td>KB</td><td>Knowledge Base</td><td>The searchable library of articles and how-to answers.</td></tr>
      <tr><td>SLA / OLA</td><td>Service / Operational Level Agreement</td><td>A promised time to respond or resolve &mdash; tracked automatically.</td></tr>
      <tr><td>CR</td><td>Change Request</td><td>A controlled record for making a change to a live system.</td></tr>
    </tbody>
  </table>`},

/* ========== 8. DECODER II ========== */
{doc:"ACRONYM DECODER", html:`
  <span class="eyebrow">Decoder II</span>

  <p>The big product families &mdash; the named areas a company licenses and turns on for different parts of the business.</p>
  <table>
    <thead><tr><th>Term</th><th>Stands for</th><th>In plain English</th></tr></thead>
    <tbody>
      <tr><td>ITSM</td><td>IT Service Management</td><td>Run IT like a service: incidents, requests, changes, and knowledge.</td></tr>
      <tr><td>ITOM</td><td>IT Operations Management</td><td>See and operate the infrastructure &mdash; discover it, map it, watch its health.</td></tr>
      <tr><td>ITAM</td><td>IT Asset Management</td><td>Know what you own and what you spend across hardware and software.</td></tr>
      <tr><td>HAM</td><td>Hardware Asset Management</td><td>Track physical assets from purchase to retirement.</td></tr>
      <tr><td>SAM</td><td>Software Asset Management</td><td>Manage software licenses, usage, and compliance.</td></tr>
      <tr><td>SPM</td><td>Strategic Portfolio Management</td><td>Plan and track work and projects (formerly ITBM / PPM).</td></tr>
      <tr><td>CSM</td><td>Customer Service Management</td><td>The same workflow magic, pointed at your customers.</td></tr>
      <tr><td>HRSD</td><td>HR Service Delivery</td><td>Give employees a service desk for HR questions and processes.</td></tr>
      <tr><td>SecOps</td><td>Security Operations</td><td>Respond to security incidents and vulnerabilities with workflow.</td></tr>
      <tr><td>GRC / IRM</td><td>Governance, Risk &amp; Compliance / Integrated Risk Management</td><td>Manage policy, risk, compliance, and audit in one place.</td></tr>
      <tr><td>FSM</td><td>Field Service Management</td><td>Schedule and dispatch technicians who do work in the field.</td></tr>
      <tr><td>TPRM</td><td>Third-Party Risk Management</td><td>Assess and monitor the risk your vendors bring.</td></tr>
      <tr><td>S2P</td><td>Source-to-Pay</td><td>Sourcing, procurement, and supplier management end to end.</td></tr>
    </tbody>
  </table>`},

/* ========== 9. DECODER III ========== */
{doc:"ACRONYM DECODER", html:`
  <span class="eyebrow">Decoder III</span>
  <h1>Build, Data &amp; AI</h1>
  <p>How things get built on the platform, how data moves, and how the intelligence works.</p>
  <table>
    <thead><tr><th>Term</th><th>Stands for</th><th>In plain English</th></tr></thead>
    <tbody>
      <tr><td>Flow Designer</td><td>&mdash;</td><td>A visual, drag-and-drop tool to build automated workflows.</td></tr>
      <tr><td>IntegrationHub</td><td>&mdash;</td><td>Pre-built connectors that let flows act on other systems.</td></tr>
      <tr><td>App Engine</td><td>&mdash;</td><td>The low-code toolkit for building custom apps on the platform.</td></tr>
      <tr><td>GlideRecord</td><td>&mdash;</td><td>The standard way developers read and write platform data in code.</td></tr>
      <tr><td>Scoped vs Global</td><td>&mdash;</td><td>Apps kept in their own protected boundary, versus shared platform-wide.</td></tr>
      <tr><td>Update Set</td><td>&mdash;</td><td>A package that moves configuration changes between instances.</td></tr>
      <tr><td>Service Portal</td><td>&mdash;</td><td>The friendly self-service website employees and customers use.</td></tr>
      <tr><td>UI Builder</td><td>&mdash;</td><td>The modern way to design custom pages and experiences.</td></tr>
      <tr><td>Next Experience / Workspaces</td><td>&mdash;</td><td>The current look-and-feel and the focused screens agents work in.</td></tr>
      <tr><td>Discovery</td><td>&mdash;</td><td>Automatically finds the devices and software on your network.</td></tr>
      <tr><td>Service Mapping</td><td>&mdash;</td><td>Draws how those pieces combine into business services.</td></tr>
      <tr><td>Event Management</td><td>&mdash;</td><td>Collects alerts and turns the noise into meaningful incidents.</td></tr>
      <tr><td>Predictive Intelligence</td><td>&mdash;</td><td>Machine learning that categorizes and routes work automatically.</td></tr>
      <tr><td>Performance Analytics</td><td>PA</td><td>Tracks trends and targets over time, not just point-in-time reports.</td></tr>
      <tr><td>Virtual Agent</td><td>&mdash;</td><td>A chatbot that answers questions and completes tasks in chat.</td></tr>
      <tr><td>Now Assist</td><td>&mdash;</td><td>Generative AI that summarizes, drafts, and assists across the platform.</td></tr>
    </tbody>
  </table>`},

/* ========== 10. DECODER IV ========== */
{doc:"ACRONYM DECODER", html:`
  <span class="eyebrow">Decoder IV</span>
  <h1>Integration &amp; Identity</h1>
  <p>The plumbing that lets ServiceNow talk to other systems and verify who people are.</p>
  <table>
    <thead><tr><th>Term</th><th>Stands for</th><th>In plain English</th></tr></thead>
    <tbody>
      <tr><td>REST</td><td>Representational State Transfer</td><td>The common modern way two systems exchange data over the web.</td></tr>
      <tr><td>SOAP</td><td>Simple Object Access Protocol</td><td>An older, more rigid way systems exchange data &mdash; still seen in enterprises.</td></tr>
      <tr><td>OAuth</td><td>Open Authorization</td><td>A secure way to let one system act on your behalf without sharing your password.</td></tr>
      <tr><td>SSO</td><td>Single Sign-On</td><td>Log in once and reach many systems without re-entering credentials.</td></tr>
      <tr><td>SAML</td><td>Security Assertion Markup Language</td><td>A standard that makes single sign-on work between systems.</td></tr>
      <tr><td>LDAP</td><td>Lightweight Directory Access Protocol</td><td>The protocol used to read your corporate directory of users.</td></tr>
      <tr><td>AD</td><td>Active Directory</td><td>The common corporate directory that holds user accounts and groups.</td></tr>
      <tr><td>Webhook</td><td>&mdash;</td><td>An automatic message one system sends another the moment something happens.</td></tr>
      <tr><td>Import Set</td><td>&mdash;</td><td>A staging area where incoming data lands before it is loaded.</td></tr>
      <tr><td>Transform Map</td><td>&mdash;</td><td>The rules that map incoming data into the right ServiceNow fields.</td></tr>
      <tr><td>Data Source</td><td>&mdash;</td><td>The defined connection to where imported data comes from.</td></tr>
      <tr><td>Scheduled Job</td><td>&mdash;</td><td>A task that runs automatically on a set timetable.</td></tr>
    </tbody>
  </table>`},

/* ========== 11. CERTIFICATIONS ========== */
{doc:"ACRONYM DECODER", html:`
  <h1>The Certifications, Decoded</h1>
  <p class="lead">ServiceNow skills are validated through official certifications. They are a useful signal &mdash; but they prove real, hands-on ability, not just memorized facts.</p>
  <table>
    <thead><tr><th>Cert</th><th>Stands for</th><th>What it proves</th></tr></thead>
    <tbody>
      <tr><td>CSA</td><td>Certified System Administrator</td><td>The foundation &mdash; can configure and run the platform day to day.</td></tr>
      <tr><td>CAD</td><td>Certified Application Developer</td><td>Can build custom applications on the platform.</td></tr>
      <tr><td>CIS</td><td>Certified Implementation Specialist</td><td>Deep, product-specific delivery skill &mdash; one per product area.</td></tr>
      <tr><td>CIS-ITSM</td><td>&mdash; (ITSM)</td><td>Specialist in implementing IT Service Management.</td></tr>
      <tr><td>CIS-Discovery</td><td>&mdash; (Discovery)</td><td>Specialist in populating the CMDB with Discovery.</td></tr>
      <tr><td>CIS-CSM</td><td>&mdash; (CSM)</td><td>Specialist in Customer Service Management.</td></tr>
      <tr><td>CIS-HR</td><td>&mdash; (HRSD)</td><td>Specialist in HR Service Delivery.</td></tr>
      <tr><td>CTA</td><td>Certified Technical Architect</td><td>The top credential &mdash; designs platform-wide architecture.</td></tr>
      <tr><td>CMA</td><td>Certified Master Architect</td><td>The most elite tier of architectural expertise.</td></tr>
    </tbody>
  </table>
  <div class="callout"><p>Certifications open doors &mdash; but the real test is delivery. A long list of passed exams matters far less than a track record of working systems and satisfied teams.</p></div>`},

/* ========== 12. ITSM ========== */
{doc:"THE MODULES", html:`
  <span class="eyebrow">The Modules</span>
  <h1>ITSM in Depth</h1>
  <p class="lead">IT Service Management is where ServiceNow began &mdash; and for most companies it is still the front door. The idea: run IT like a service business, with clear processes anyone can trust.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Incident</div><div class="kd">Something is broken &mdash; log it, route it, fix it, and restore service fast. The classic &ldquo;ticket.&rdquo;</div></div>
    <div class="kcard"><div class="kt">Problem</div><div class="kd">Find and remove the underlying cause so the same incidents stop happening.</div></div>
    <div class="kcard"><div class="kt">Change</div><div class="kd">Make changes to live systems in a controlled, approved, low-risk way.</div></div>
    <div class="kcard"><div class="kt">Request / Catalog</div><div class="kd">A storefront where employees order services &mdash; access, software, a laptop &mdash; with built-in approvals.</div></div>
    <div class="kcard"><div class="kt">Knowledge</div><div class="kd">A searchable library so people can answer their own questions and agents resolve faster.</div></div>
    <div class="kcard"><div class="kt">CMDB underneath</div><div class="kd">The map of what you run gives every ticket context &mdash; what it touches and what it affects.</div></div>
  </div>
  <p>Together these turn chaotic, email-driven IT support into a measurable service with owners, timelines, and service-level promises &mdash; the foundation everything else builds on.</p>`},

/* ========== 13. ITOM ========== */
{doc:"THE MODULES", html:`
  <h1>ITOM in Depth</h1>
  <p class="lead">IT Operations Management answers two questions every IT leader asks: <em>What do we actually have?</em> and <em>Is it healthy right now?</em></p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Discovery</div><div class="kd">Automatically scans the network to find servers, devices, and software &mdash; no manual inventory needed.</div></div>
    <div class="kcard"><div class="kt">Service Mapping</div><div class="kd">Draws how all those pieces combine to deliver a business service, like email or payroll.</div></div>
    <div class="kcard"><div class="kt">Event Management</div><div class="kd">Gathers alerts from monitoring tools and cuts the noise into a few meaningful incidents.</div></div>
    <div class="kcard"><div class="kt">Cloud Observability</div><div class="kd">Extends that visibility into cloud and modern, fast-changing environments.</div></div>
    <div class="kcard"><div class="kt">Health Log Analytics</div><div class="kd">Reads system logs to spot trouble forming before it becomes an outage.</div></div>
    <div class="kcard"><div class="kt">Feeds the CMDB</div><div class="kd">Everything ITOM learns flows into the CMDB, keeping the map of your world accurate.</div></div>
  </div>
  <p>The payoff: instead of finding out a service is down from angry users, IT sees and operates the infrastructure proactively &mdash; and knows exactly which business services an issue will hit.</p>`},

/* ========== 14. ITAM ========== */
{doc:"THE MODULES", html:`
  <h1>ITAM in Depth</h1>
  <p class="lead">IT Asset Management is about money and control: knowing precisely what you own, where it is, and what it costs &mdash; so nothing is wasted and nothing is missed.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">HAM &mdash; Hardware</div><div class="kd">Tracks physical assets across their whole life: purchase, deployment, repair, and retirement.</div></div>
    <div class="kcard"><div class="kt">SAM &mdash; Software</div><div class="kd">Manages software licenses and usage so you stay compliant and stop paying for shelfware.</div></div>
    <div class="kcard"><div class="kt">Cloud Cost</div><div class="kd">Brings runaway cloud spending into view so it can be understood and controlled.</div></div>
    <div class="kcard"><div class="kt">License Compliance</div><div class="kd">Flags where you are over- or under-licensed before an audit does it for you.</div></div>
    <div class="kcard"><div class="kt">Lifecycle Savings</div><div class="kd">Reclaims and reuses assets and licenses instead of buying new ones.</div></div>
    <div class="kcard"><div class="kt">One source of cost truth</div><div class="kd">Finance and IT finally see the same numbers for what technology really costs.</div></div>
  </div>
  <p>Done well, ITAM pays for itself &mdash; recovered licenses, avoided audit penalties, and smarter buying decisions add up to real savings.</p>`},

/* ========== 15. EMPLOYEE & CUSTOMER ========== */
{doc:"THE MODULES", html:`
  <h1>Employee &amp; Customer</h1>
  <p class="lead">The same workflow engine that transformed IT works just as well for the people outside IT &mdash; your employees and your customers.</p>
  <h2>HRSD &mdash; HR Service Delivery</h2>
  <p>Gives employees a real service desk for HR. Questions about benefits, leave, and policy get answered consistently; onboarding a new hire becomes a smooth, coordinated process instead of a scramble across departments.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Self-Service HR</div><div class="kd">Employees find answers and raise requests through one friendly portal.</div></div>
    <div class="kcard"><div class="kt">Guided Onboarding</div><div class="kd">IT, facilities, and HR tasks for a new hire fire automatically and in order.</div></div>
  </div>
  <h2>CSM &mdash; Customer Service Management</h2>
  <p>Points the same magic at your customers. Cases are routed to the right person, connected to the products and services involved, and resolved with full history &mdash; often before the customer even has to call.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Connected Cases</div><div class="kd">Customer issues link to the actual product, account, and history behind them.</div></div>
    <div class="kcard"><div class="kt">Proactive Service</div><div class="kd">Spot and fix problems for many customers at once, before they pile up.</div></div>
  </div>
  <p>One platform, one way of working &mdash; now improving the experience of everyone the business serves.</p>`},

/* ========== 16. SECURITY & RISK ========== */
{doc:"THE MODULES", html:`
  <h1>Security &amp; Risk</h1>
  <p class="lead">When something goes wrong &mdash; or you need to prove you are in control &mdash; ServiceNow brings the same discipline to security and compliance.</p>
  <h2>SecOps &mdash; Security Operations</h2>
  <p>Connects the security team to the rest of the platform so threats are handled as fast, tracked workflows rather than scattered emails.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Security Incident Response</div><div class="kd">Detect, prioritize, and resolve security incidents with a clear, repeatable process.</div></div>
    <div class="kcard"><div class="kt">Vulnerability Response</div><div class="kd">Sort the flood of vulnerabilities by real risk and drive fixes to closure.</div></div>
  </div>
  <h2>GRC / IRM &mdash; Governance, Risk &amp; Compliance</h2>
  <p>Replaces spreadsheets full of risks and controls with a living system that shows, at any moment, where the organization stands.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Policy &amp; Compliance</div><div class="kd">Manage policies and prove you meet the rules and regulations that apply.</div></div>
    <div class="kcard"><div class="kt">Risk &amp; Audit</div><div class="kd">Track risks and run audits with evidence captured automatically along the way.</div></div>
  </div>
  <p>The result is audit-readiness as a daily state, not a fire drill &mdash; and faster, calmer responses when incidents do strike.</p>`},

/* ========== 17. WORK & PORTFOLIO ========== */
{doc:"THE MODULES", html:`
  <h1>Work &amp; Portfolio</h1>
  <p class="lead">Beyond day-to-day service, ServiceNow helps leaders plan the work itself &mdash; where to invest, how to deliver, and how to buy.</p>
  <h2>SPM &mdash; Strategic Portfolio Management</h2>
  <p>Connects strategy to delivery: capture demand and ideas, prioritize what to fund, and run the work with agile or traditional project methods &mdash; all visible in one place.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Demand &amp; Planning</div><div class="kd">Collect ideas and requests, then decide what is worth doing.</div></div>
    <div class="kcard"><div class="kt">Agile / PPM</div><div class="kd">Deliver the work and track progress, time, and value.</div></div>
  </div>
  <h2>FSM &mdash; Field Service Management</h2>
  <p>Coordinates the people who do hands-on work in the field &mdash; scheduling the right technician, with the right parts, to the right place.</p>
  <h2>Source-to-Pay</h2>
  <p>Manages how the company buys &mdash; sourcing suppliers, running procurement, and managing the supplier relationships &mdash; end to end on the platform.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Sourcing &amp; Procurement</div><div class="kd">Find suppliers and purchase with controls and approvals built in.</div></div>
    <div class="kcard"><div class="kt">Supplier Management</div><div class="kd">Track supplier performance and risk over the life of the relationship.</div></div>
  </div>`},

/* ========== 18. BUILD & INTELLIGENCE ========== */
{doc:"THE MODULES", html:`
  <h1>Build &amp; Intelligence</h1>
  <p class="lead">The platform is not just pre-built products &mdash; it is a toolbox for building your own, and a brain that makes all of it smarter.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">App Engine / Creator Workflows</div><div class="kd">Build custom apps with low-code tools when no off-the-shelf product fits.</div></div>
    <div class="kcard"><div class="kt">IntegrationHub + Flow Designer</div><div class="kd">Automate processes visually and reach out to other systems with little or no code.</div></div>
    <div class="kcard"><div class="kt">Now Assist</div><div class="kd">Generative AI that summarizes cases, drafts replies, and assists builders.</div></div>
    <div class="kcard"><div class="kt">Predictive Intelligence</div><div class="kd">Machine learning that categorizes and routes work automatically.</div></div>
    <div class="kcard"><div class="kt">Performance Analytics</div><div class="kd">Track trends and targets over time to manage by the numbers.</div></div>
    <div class="kcard"><div class="kt">Virtual Agent</div><div class="kd">A chatbot that handles common questions and tasks 24/7.</div></div>
  </div>
  <h2>Service Portal &amp; UI Builder</h2>
  <p>And it all gets a face: <strong>Service Portal</strong> and <strong>UI Builder</strong> let you design the self-service websites and modern screens that employees and customers actually touch &mdash; on-brand and easy to use.</p>`},

/* ========== 19. CMDB & CSDM ========== */
{doc:"KEY CONCEPTS", html:`
  <span class="eyebrow">Key Concepts</span>
  <h1>The Heart: CMDB &amp; CSDM</h1>
  <p class="lead">If ServiceNow has a beating heart, it is the CMDB &mdash; the Configuration Management Database. It is the living map of everything your organization runs and how it all connects.</p>
  <p>Every server, application, laptop, and business service is a <strong>Configuration Item (CI)</strong> in that map. The relationships between them are the real value: when one thing changes or breaks, you can instantly see what else is affected.</p>
  <h2>How it stays trustworthy</h2>
  <ul>
    <li><strong>CSDM</strong> is the agreed blueprint &mdash; a standard structure that keeps the data organized and meaningful.</li>
    <li><strong>Discovery</strong> and the <strong>MID Server</strong> populate it automatically, so it reflects reality instead of a stale spreadsheet.</li>
    <li><strong>IRE</strong>, the Identification &amp; Reconciliation Engine, stops duplicates before they pollute the map.</li>
  </ul>
  <div class="callout"><p>Garbage in, garbage out &mdash; the CMDB is the foundation. Every smart thing the platform does, from impact analysis to automation, is only as good as the data underneath it. Get the CMDB right and everything else gets easier.</p></div>`},

/* ========== 20. WORKFLOW & AUTOMATION ========== */
{doc:"KEY CONCEPTS", html:`
  <h1>Workflow &amp; Automation</h1>
  <p class="lead">Automation is what turns ServiceNow from a record-keeper into a workhorse. The two tools that make it happen are <strong>Flow Designer</strong> and <strong>IntegrationHub</strong>.</p>
  <p>Flow Designer is a visual canvas where you build a process by dragging steps together &mdash; no heavy coding required. IntegrationHub gives those flows the ability to reach out and act on other systems.</p>
  <h2>The building blocks</h2>
  <div class="grid2">
    <div class="kcard"><div class="kt">Triggers</div><div class="kd">The starting gun &mdash; a record is created, a field changes, or a schedule fires.</div></div>
    <div class="kcard"><div class="kt">Actions</div><div class="kd">The steps the flow performs &mdash; update a record, send a message, call a system.</div></div>
    <div class="kcard"><div class="kt">Approvals</div><div class="kd">Pauses that route to the right person for a yes or no before continuing.</div></div>
    <div class="kcard"><div class="kt">Spokes</div><div class="kd">Ready-made connector packs that let a flow work with a specific outside system.</div></div>
  </div>
  <p>Strung together, these let a company automate work that spans many systems &mdash; provisioning an account, onboarding a hire, fulfilling a request &mdash; with little code and a clear, visual map anyone can follow and maintain.</p>`},

/* ========== 21. AI ON THE PLATFORM ========== */
{doc:"KEY CONCEPTS", html:`
  <h1>AI on the Platform</h1>
  <p class="lead">&ldquo;AI&rdquo; means different things in different places. On ServiceNow it is three distinct capabilities &mdash; here is what each one actually does.</p>
  <h2>Now Assist &mdash; generative AI</h2>
  <p>The newest layer. It reads and writes language: <strong>summarizing</strong> a long case into a few lines, <strong>drafting</strong> replies and knowledge articles, and helping builders by <strong>generating code</strong> and flows from plain descriptions. It saves people from the blank page.</p>
  <h2>Predictive Intelligence &mdash; machine learning</h2>
  <p>The quieter workhorse. It learns from your past records to <strong>categorize</strong> and <strong>route</strong> new work automatically &mdash; sending each ticket to the right team without a human sorting it first.</p>
  <h2>Virtual Agent &mdash; self-service chat</h2>
  <p>A chatbot that talks to employees and customers, answers common questions, and completes routine tasks &mdash; resetting a password, checking a status &mdash; without a human in the loop.</p>
  <div class="callout"><p>Generative AI drafts and summarizes. Machine learning sorts and predicts. The chatbot handles the front line. Used together, they remove a huge amount of routine work.</p></div>`},

/* ========== 22. REPORTING & PA ========== */
{doc:"KEY CONCEPTS", html:`
  <h1>Reporting, Dashboards &amp; PA</h1>
  <p class="lead">You cannot improve what you cannot see. ServiceNow gives you two levels of insight &mdash; and the difference between them matters.</p>
  <h2>Reports &amp; dashboards</h2>
  <p>The everyday level. A report answers a question about right now &mdash; how many incidents are open, who has the most, which requests are overdue. Group those reports onto a <strong>dashboard</strong> and you get a single screen that shows the current state at a glance.</p>
  <h2>Performance Analytics (PA)</h2>
  <p>The strategic level. PA does something reports cannot: it remembers. By taking a snapshot of key numbers over time, it reveals <strong>trends</strong> &mdash; are things getting better or worse? &mdash; and measures progress against <strong>targets</strong> and <strong>KPIs</strong>.</p>
  <table>
    <thead><tr><th>&nbsp;</th><th>Reports</th><th>Performance Analytics</th></tr></thead>
    <tbody>
      <tr><td>Answers</td><td>What is happening now?</td><td>How is it changing over time?</td></tr>
      <tr><td>Best for</td><td>Daily operations</td><td>Trends, targets, goals</td></tr>
      <tr><td>Time view</td><td>A snapshot</td><td>History and direction</td></tr>
    </tbody>
  </table>
  <p>Reports run the day. PA helps leaders steer the future.</p>`},

/* ========== 23. A DAY IN THE LIFE ========== */
{doc:"THE BUSINESS CASE", html:`
  <span class="eyebrow">The Business Case</span>
  <h1>A Day in the Life</h1>
  <p class="lead">Theory is fine, but here is what it looks like in practice. Follow one ordinary request &mdash; a new employee, Maria, needs a laptop on her first day &mdash; from start to finish.</p>
  <ol>
    <li><strong>Raised in the portal.</strong> Maria&rsquo;s manager opens the self-service site, clicks &ldquo;New Hire Laptop,&rdquo; and submits in under a minute. A tracked request is born.</li>
    <li><strong>Routed by workflow.</strong> The platform instantly sends it to the right places &mdash; IT to prep the device, the manager for sign-off &mdash; without a single email.</li>
    <li><strong>Approved.</strong> The manager gets a notification, taps approve, and the workflow moves on automatically.</li>
    <li><strong>Fulfilled.</strong> IT is alerted, the laptop is imaged and assigned, and the asset is recorded against Maria in the CMDB.</li>
    <li><strong>Tracked against an SLA.</strong> A promised &ldquo;ready by day one&rdquo; clock has been ticking the whole time, so nothing quietly slips.</li>
    <li><strong>Measured on a dashboard.</strong> The whole thing &mdash; how long it took, whether the promise was met &mdash; rolls into a dashboard the IT leader watches.</li>
  </ol>
  <p>No lost emails. No mystery status. No one wondering whose job it was. Maria has a working laptop on day one &mdash; and the business has the data to make the next one even smoother.</p>`},

/* ========== 24. WHY A COMPANY NEEDS IT ========== */
{doc:"THE BUSINESS CASE", html:`
  <h1>Why a Company Needs ServiceNow</h1>
  <p class="lead">Stripped of the jargon, here is the business case &mdash; eight reasons organizations invest in the platform.</p>

    <div class="kcard"><div class="kt">Consolidate Tools</div><div class="kd">Replace a dozen disconnected systems with one platform &mdash; fewer licenses, less complexity.</div></div>

    <div class="kcard"><div class="kt">Better Experience</div><div class="kd">Employees and customers get fast, friendly self-service instead of frustration.</div></div>
    <div class="kcard"><div class="kt">Visibility &amp; Control</div><div class="kd">Leaders finally see how work really flows &mdash; and where it gets stuck.</div></div>

  <p>It is rarely about one feature. It is about doing all of this on a single platform &mdash; which is exactly what no pile of separate tools can offer.</p>`},

/* ========== 25. SIGNS YOU'RE READY ========== */
{doc:"THE BUSINESS CASE", html:`
  <h1>Signs You&rsquo;re Ready</h1>
  <p class="lead">Not sure if it is time? These are the symptoms organizations feel right before ServiceNow becomes obvious. The more you recognize, the more pressing the case.</p>
  <ul>
    <li><strong>Tool sprawl.</strong> Every team has its own system, and none of them talk to each other.</li>
    <li><strong>Work lives in email and spreadsheets.</strong> Important processes run on inboxes and shared files held together with hope.</li>
    <li><strong>No real asset inventory.</strong> Nobody can say with confidence what hardware and software the company owns.</li>
    <li><strong>Slow approvals.</strong> Requests stall for days because they are stuck in someone&rsquo;s inbox.</li>
    <li><strong>No visibility.</strong> Leaders cannot see how much work is in flight, where it is, or why it is late.</li>
    <li><strong>Compliance pressure.</strong> Audits are painful scrambles to gather evidence after the fact.</li>
    <li><strong>Growth outpacing process.</strong> What worked at 50 people is breaking at 500.</li>
  </ul>
  <div class="callout"><p>If three or more of these feel familiar, the question is no longer <em>whether</em> to bring order to your operations &mdash; it is how soon, and with whom.</p></div>`},

/* ========== 26. IMPLEMENTATION ========== */
{doc:"THE BUSINESS CASE", html:`
  <h1>How an Implementation Actually Goes</h1>
  <p class="lead">A good ServiceNow rollout is not a big-bang gamble &mdash; it is a series of clear phases, each with a purpose. Here is what the journey really looks like.</p>
  <ol>
    <li><strong>Discovery &amp; scoping.</strong> Understand the business, agree on goals, and define what the first release will and will not include. Tight scope is the secret to success.</li>
    <li><strong>Design.</strong> Map the processes and how the platform will support them &mdash; deciding what to configure and what to leave standard.</li>
    <li><strong>Build / configure.</strong> Set it up on the platform, favoring configuration over custom code so it stays maintainable and upgrade-safe.</li>
    <li><strong>Test.</strong> Try it against realistic scenarios and real users, fixing issues before they reach production.</li>
    <li><strong>Deploy.</strong> Promote the work to the live instance carefully, with a plan to fall back if needed.</li>
    <li><strong>Hypercare &amp; adoption.</strong> Stay close after go-live, support real users, and drive the habits that make the investment pay off.</li>
  </ol>
  <h2>Why a partner matters</h2>
  <p>The platform is powerful, which means it is easy to over-build. An experienced partner keeps scope honest, follows best practice, and steers you clear of the expensive mistakes &mdash; turning a risky project into a predictable one.</p>`},

];   // linear order: [cover, ...content, back-cover]

const book=document.getElementById('book');

// Build the HTML for one physical page (face), given its content spec + the
// page number printed in the footer.
function faceMarkup(pg,pageNo){
  if(pg.cover) return ['cover','<div class="c-aurora"></div>'+pg.html];
  if(pg.back)  return ['back-cover','<div class="bc-aurora"></div>'+pg.html];
  return ['content',
    '<div class="p-head"><span class="ph-brand"><span class="ph-mark">OH</span><span class="ph-name">Omar Huertas LLC</span></span>'+
    '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div><div class="p-rule"></div>'+
    '<div class="p-body">'+pg.html+'</div>'+
    '<div class="p-foot"><span class="pf-c">&copy; 2026 Omar Huertas LLC</span><span class="pf-n">'+String(pageNo).padStart(2,'0')+'</span></div>'];
}
function buildFace(side,pg,pageNo){
  const f=document.createElement('div');f.className='face '+side;
  if(pg){const [cls,html]=faceMarkup(pg,pageNo);if(cls!=='content')f.classList.add(cls);f.innerHTML=html;}
  else{ // blank verso filler (odd page count) — decorative
    f.classList.add('blankback');
    f.innerHTML='<div class="facing"><div class="f-mark">OH</div><div class="f-word">The ServiceNow<br><b>Lexicon</b></div><div class="f-rule"></div><div class="f-sub">An Omar Huertas LLC Field Guide</div></div>';
  }
  return f;
}

// Each LEAF (sheet) carries TWO pages: front = recto (right), back = verso (left).
// Linear reading order across the book is front0, back0, front1, back1, ...
const leaves=[], faceSeq=[];
const L=Math.ceil(PAGES.length/2);
for(let i=0;i<L;i++){
  const fp=PAGES[2*i], bp=PAGES[2*i+1];
  const leaf=document.createElement('div');leaf.className='leaf';
  const front=buildFace('front',fp,2*i+1);
  const back =buildFace('back', bp,bp?2*i+2:null);
  leaf.appendChild(front);leaf.appendChild(back);
  book.appendChild(leaf);leaves.push(leaf);
  faceSeq.push(front); if(bp) faceSeq.push(back);   // real pages only (skip blank filler)
}
const N=leaves.length;     // desktop spreads
const M=faceSeq.length;    // mobile pages (every face)

const elCur=document.getElementById('cur'), elTot=document.getElementById('tot');
const elBar=document.getElementById('progress').firstElementChild;
const elPrev=document.getElementById('prev'), elNext=document.getElementById('next');
const mq=window.matchMedia('(max-width:860px)');
function isMobile(){return mq.matches;}

let cur=0;   // desktop: right-hand leaf index
let mi=0;    // mobile: face index

function renderDesktop(){
  book.querySelectorAll('.face').forEach(f=>f.style.display='');   // clear mobile show/hide
  leaves.forEach((el,i)=>{
    const turned=i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (N - i);
    el.style.display = Math.abs(i-cur)<=1 ? '' : 'none';
  });
  book.classList.toggle('closed', cur===0);
  elCur.textContent=cur+1; elTot.textContent=N;
  elBar.style.width=(N>1?cur/(N-1)*100:0)+'%';
  elPrev.disabled=cur<=0; elNext.disabled=cur>=N-1;
}
const allFaces=Array.prototype.slice.call(book.querySelectorAll('.face'));
function renderMobile(){
  leaves.forEach(el=>{el.classList.remove('turned');el.style.zIndex='';el.style.display='block';});
  allFaces.forEach(f=>{f.style.display='none';});      // hide every face incl. blank filler
  if(faceSeq[mi]) faceSeq[mi].style.display='flex';    // show only the active page
  book.classList.toggle('closed', mi===0);
  elCur.textContent=mi+1; elTot.textContent=M;
  elBar.style.width=(M>1?mi/(M-1)*100:0)+'%';
  elPrev.disabled=mi<=0; elNext.disabled=mi>=M-1;
}
function render(){ isMobile()?renderMobile():renderDesktop(); }

function flash(el){el.classList.add('tn');setTimeout(()=>el.classList.remove('tn'),950);}
let busy=false;
function next(){
  if(busy)return;
  if(isMobile()){ if(mi>=M-1)return; busy=true; mi++; render(); }
  else{ if(cur>=N-1)return; busy=true; flash(leaves[cur]); cur++; render(); }
  setTimeout(()=>busy=false,440);
}
function prev(){
  if(busy)return;
  if(isMobile()){ if(mi<=0)return; busy=true; mi--; render(); }
  else{ if(cur<=0)return; busy=true; cur--; flash(leaves[cur]); render(); }
  setTimeout(()=>busy=false,440);
}
elNext.onclick=next; elPrev.onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
let _sw=0;
book.addEventListener('click',e=>{if(Date.now()-_sw<450)return;const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
let _tx=0,_ty=0;
book.addEventListener('touchstart',e=>{const t=e.changedTouches[0];_tx=t.clientX;_ty=t.clientY;},{passive:true});
book.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-_tx,dy=t.clientY-_ty;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.3){_sw=Date.now();dx<0?next():prev();}},{passive:true});
// keep the two indices roughly in sync when crossing the breakpoint
mq.addEventListener('change',()=>{ if(isMobile()) mi=Math.min(M-1,Math.max(0,cur*2)); else cur=Math.min(N-1,Math.max(0,Math.floor(mi/2))); render(); });
render();
</script>
