"html": "<span class='eyebrow'>CUSTOMER WORKFLOWS</span><h1>Customer Service Management</h1><p class='lead'>Customer Service Management (CSM) helps a company solve customer problems &mdash; and fix the underlying causes &mdash; rather than just answering tickets one at a time.</p><h2>Beyond the call center</h2><p>When a customer reports an issue, the answer often lies in another department &mdash; engineering, billing, or operations. CSM connects the front-line agent to those teams so the real problem gets solved.</p><div class='metric-row'><div class='m'><div class='v'>1</div><div class='l'>place for every case</div></div><div class='m'><div class='v'>360&deg;</div><div class='l'>view of the customer</div></div><div class='m'><div class='v'>&darr;</div><div class='l'>repeat contacts</div></div></div><ul><li><strong>Connected.</strong> Front office and back office work the same case together.</li><li><strong>Proactive.</strong> Spot a product fault and notify everyone affected before they call.</li></ul><div class='callout'><p><strong>Key:</strong> CSM aims to resolve the cause of customer issues, not just close the ticket.</p></div>"
},
{
"doc": "CASES &amp; ACCOUNTS",
"html": "<span class='eyebrow'>CUSTOMER WORKFLOWS</span><h1>Cases, Accounts &amp; Contacts</h1><p class='lead'>To serve customers well, the system needs to know who they are and what they bought. Accounts, contacts, and cases are the three building blocks.</p><h2>The core records</h2><table><tr><th>Term</th><th>Plain meaning</th></tr><tr><td>Account</td><td>The customer organization &mdash; a company or household you do business with.</td></tr><tr><td>Contact</td><td>A specific person at that account who you talk to.</td></tr><tr><td>Case</td><td>A single issue or request raised by a contact.</td></tr></table><p>Linking these together means an agent instantly sees a customer&rsquo;s history, products, and past cases &mdash; no re-explaining required.</p><div class='callout'><p><strong>Key:</strong> Accounts and contacts give every case the context that turns a generic reply into informed, personal service.</p></div>"
},
{
"doc": "PORTAL &amp; COMMUNITIES",
"html": "<span class='eyebrow'>CUSTOMER WORKFLOWS</span><h1>The Customer Portal &amp; Communities</h1><p class='lead'>Many customers prefer to help themselves. A self-service portal and a community let them find answers, track cases, and learn from peers &mdash; any time of day.</p><h2>Help that scales</h2><p>The portal is the customer-facing website where people open cases, read guides, and check status. The community adds a space where customers and experts share knowledge.</p><div class='grid2'><div class='kcard'><div class='kt'>PORTAL</div><div class='kd'>Branded self-service site for cases, knowledge, and account info.</div></div><div class='kcard'><div class='kt'>COMMUNITY</div><div class='kd'>Forums where customers ask, answer, and upvote solutions.</div></div><div class='kcard'><div class='kt'>DEFLECTION</div><div class='kd'>Good answers up front reduce the volume of incoming cases.</div></div><div class='kcard'><div class='kt'>24/7</div><div class='kd'>Help is available even when agents are offline.</div></div></div><div class='callout'><p><strong>Key:</strong> Self-service portals and communities answer common questions without a single phone call.</p></div>"
},
{
"doc": "FSM",
"html": "<span class='eyebrow'>CUSTOMER WORKFLOWS</span><h1>Field Service Management</h1><p class='lead'>Field Service Management (FSM) handles work that happens in the real world &mdash; a technician driving to a site to install, repair, or inspect something.</p><h2>When the fix needs feet</h2><p>Some problems can&rsquo;t be solved over the phone. FSM coordinates the people, parts, and visits required to get the job done on-site, and ties it back to the original customer case.</p><ul><li><strong>Work order.</strong> The instruction for a job that must be done in person.</li><li><strong>Task.</strong> An individual step within that job.</li><li><strong>Parts.</strong> Tracking the inventory a technician needs to bring.</li><li><strong>Skills.</strong> Matching the right qualified person to the right job.</li></ul><div class='callout'><p><strong>Key:</strong> FSM extends customer service from the screen to the doorstep, coordinating real-world visits end to end.</p></div>"
},
{
"doc": "DISPATCH",
"html": "<span class='eyebrow'>CUSTOMER WORKFLOWS</span><h1>Dispatch, Scheduling &amp; Mobile</h1><p class='lead'>Getting the right technician to the right place at the right time is a puzzle. Scheduling tools solve it, and a mobile app puts the job in the technician&rsquo;s pocket.</p><h2>From plan to doorstep</h2><p>A dispatcher (or automated assistant) assigns jobs based on skills, location, and availability, then the technician works from a phone &mdash; even with no signal.</p><div class='grid2'><div class='kcard'><div class='kt'>DISPATCH</div><div class='kd'>Assigning jobs to the best-suited technician.</div></div><div class='kcard'><div class='kt'>SCHEDULE</div><div class='kd'>Fitting visits into the day, minimizing drive time.</div></div><div class='kcard'><div class='kt'>MOBILE</div><div class='kd'>Job details, maps, and forms on the technician&rsquo;s phone.</div></div><div class='kcard'><div class='kt'>OFFLINE</div><div class='kd'>Work continues without connectivity, syncing later.</div></div></div><div class='callout'><p><strong>Key:</strong> Smart scheduling plus a capable mobile app means fewer wasted trips and faster fixes for customers.</p></div>"
},
{
"doc": "OMNI-CHANNEL",
"html": "<span class='eyebrow'>CUSTOMER WORKFLOWS</span><h1>Omni-Channel</h1><p class='lead'>Customers and employees reach out however they like &mdash; chat, email, phone, or messaging apps. Omni-channel brings every conversation into one consistent experience.</p><h2>One conversation, any door</h2><p>Whether someone starts in web chat and follows up by email, the agent sees the whole thread. No repeating, no lost context.</p><ul><li><strong>Chat.</strong> Live or assisted conversation right on the website or portal.</li><li><strong>Email.</strong> Messages turned automatically into trackable cases.</li><li><strong>Phone.</strong> Calls connected to the caller&rsquo;s record and history.</li><li><strong>Messaging.</strong> Popular apps and texts handled in the same workspace.</li></ul><div class='callout'><p><strong>Key:</strong> Omni-channel means the channel changes but the conversation &mdash; and the context &mdash; never restarts.</p></div>"
},
{
"doc": "VOICE OF CUSTOMER",
"html": "<span class='eyebrow'>CUSTOMER WORKFLOWS</span><h1>Surveys &amp; Voice of the Customer</h1><p class='lead'>You can&rsquo;t improve what you don&rsquo;t measure. Surveys and sentiment tools capture how people feel and turn that feedback into action.</p><h2>Listening at scale</h2><p>After a case closes, a short survey asks how it went. Across thousands of responses, patterns emerge &mdash; and the system can flag unhappy customers for follow-up automatically.</p><div class='metric-row'><div class='m'><div class='v'>CSAT</div><div class='l'>satisfaction score</div></div><div class='m'><div class='v'>NPS</div><div class='l'>likelihood to recommend</div></div><div class='m'><div class='v'>&#9888;</div><div class='l'>at-risk alerts</div></div></div><ul><li><strong>Survey.</strong> A set of questions sent at the right moment.</li><li><strong>Sentiment.</strong> Reading tone in comments to gauge feeling.</li><li><strong>Action.</strong> Low scores can trigger a case to make things right.</li></ul><div class='callout'><p><strong>Key:</strong> Feedback only matters if it drives action &mdash; surveys close the loop between hearing and improving.</p></div>"
},
{
"doc": "SELF-SERVICE",
"html": "<span class='eyebrow'>SHARED FOUNDATION</span><h1>Knowledge &amp; Self-Service</h1><p class='lead'>The fastest support is the answer someone finds themselves. A shared knowledge base powers self-service for both employees and customers.</p><h2>Write once, help everywhere</h2><p>A well-written article can answer the same question for thousands of people &mdash; on the employee portal, the customer portal, inside chat, and to agents handling live cases.</p><ul><li><strong>Knowledge base.</strong> An organized, searchable library of articles.</li><li><strong>Article.</strong> A single how-to, policy, or answer, kept current.</li><li><strong>Deflection.</strong> Answering before a case is ever opened.</li><li><strong>Feedback.</strong> Readers rate articles so weak ones get fixed.</li></ul><div class='callout'><p><strong>Key:</strong> Good knowledge multiplies every expert&rsquo;s effort &mdash; one article quietly resolves countless questions across HR and customer service alike.</p></div>"
},
{
"doc": "SECOPS",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Security Operations (SecOps)</h1><p class='lead'>SecOps connects your security tools to your IT workflows, so threats get found, prioritized, and fixed&mdash;not lost in a flood of alerts.</p><p>Most organizations own dozens of security products that each shout warnings into separate inboxes. ServiceNow Security Operations brings those signals into one place, attaches them to the affected systems, and routes the work to the right people with clear steps to follow.</p><div class='grid2'><div class='kcard'><div class='kt'>RESPOND</div><div class='kd'>Security Incident Response handles active attacks and breaches.</div></div><div class='kcard'><div class='kt'>REDUCE</div><div class='kd'>Vulnerability Response fixes weaknesses before they are exploited.</div></div><div class='kcard'><div class='kt'>UNDERSTAND</div><div class='kd'>Threat Intelligence adds context on who and what is attacking.</div></div><div class='kcard'><div class='kt'>AUTOMATE</div><div class='kd'>Playbooks and orchestration run repetitive steps for you.</div></div></div><div class='callout'><p><strong>Key:</strong> SecOps turns scattered alerts into organized, trackable work tied to the actual business systems at risk.</p></div>"
},
{
"doc": "SIR",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Security Incident Response</h1><p class='lead'>When something bad is happening right now&mdash;malware, a phishing hit, a breach&mdash;Security Incident Response (SIR) coordinates the team that stops it.</p><p>A security incident is created automatically from a detection tool or manually by an analyst. From there, the platform tracks every step: who is investigating, what systems are affected, what was done, and when it was contained. Nothing depends on someone's memory or a side chat.</p><h2>What it gives the team</h2><ul><li><strong>One record.</strong> All evidence, notes, and tasks for an incident live together.</li><li><strong>Severity &amp; priority.</strong> The biggest threats rise to the top automatically.</li><li><strong>Repeatable steps.</strong> Guided response playbooks ensure nothing is skipped under pressure.</li><li><strong>A clean timeline.</strong> A full record supports after-action review and reporting.</li></ul><div class='callout'><p><strong>Key:</strong> SIR is the command center for handling active security events from first alert to full resolution.</p></div>"
},
{
"doc": "VULN RESPONSE",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Vulnerability Response</h1><p class='lead'>Scanners find thousands of weaknesses. Vulnerability Response helps you decide which ones actually matter and get them patched.</p><p>You can't fix everything at once, and not every weakness is dangerous. This capability pulls in results from vulnerability scanners, matches them to the real systems in your inventory, and ranks them by how likely they are to be exploited and how important the affected system is.</p><table><tr><th>Question</th><th>How it helps</th></tr><tr><td>What's vulnerable?</td><td>Matches findings to actual assets</td></tr><tr><td>How risky?</td><td>Scores by exploitability and business value</td></tr><tr><td>Who fixes it?</td><td>Routes work to the right IT owner</td></tr><tr><td>Is it done?</td><td>Tracks remediation to closure</td></tr></table><div class='callout'><p><strong>Key:</strong> Instead of an endless list, teams get a short, prioritized queue of the patches that reduce the most risk.</p></div>"
},
{
"doc": "THREAT INTEL",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Threat Intelligence Basics</h1><p class='lead'>Threat Intelligence adds the &ldquo;who and how&rdquo; behind an attack, so analysts understand what they're really facing.</p><p>An alert on its own says little. Threat intelligence enriches it with known indicators&mdash;suspicious web addresses, file fingerprints, attacker techniques&mdash;gathered from outside feeds and past experience. When a new incident appears, the platform can check whether its clues match known bad activity.</p><h3>Common building blocks</h3><ul><li><strong>Indicators (IOCs).</strong> Signs of compromise, like a malicious IP address or file hash.</li><li><strong>Feeds.</strong> Outside sources that supply fresh lists of known threats.</li><li><strong>Enrichment.</strong> Automatically attaching this context to an incident.</li></ul><div class='callout'><p><strong>Key:</strong> Threat intelligence turns a vague alert into an informed decision&mdash;is this a known danger, and how do others handle it?</p></div>"
},
{
"doc": "IRM / GRC",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Integrated Risk Management</h1><p class='lead'>Integrated Risk Management (IRM), often called GRC, gives leaders one honest view of the organization's risks, rules, and controls.</p><p>Governance, Risk, and Compliance work has historically lived in spreadsheets and email. IRM brings it onto one platform where policies, risks, controls, and audits all connect&mdash;so a single control can be linked to the rules it satisfies and the risks it reduces.</p><div class='grid2'><div class='kcard'><div class='kt'>GOVERNANCE</div><div class='kd'>The policies and rules the organization commits to follow.</div></div><div class='kcard'><div class='kt'>RISK</div><div class='kd'>The things that could go wrong, and how likely and severe they are.</div></div><div class='kcard'><div class='kt'>COMPLIANCE</div><div class='kd'>Proof that you actually follow the rules and standards.</div></div><div class='kcard'><div class='kt'>CONTROLS</div><div class='kd'>The safeguards that keep risks in check, tested over time.</div></div></div><div class='callout'><p><strong>Key:</strong> IRM connects policy, risk, and compliance so nothing is managed in isolation&mdash;and leaders see the true picture.</p></div>"
},
{
"doc": "POLICY",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Policy &amp; Compliance Management</h1><p class='lead'>This is how an organization keeps its rules current and proves it actually follows the laws and standards that apply to it.</p><p>Every business answers to something&mdash;industry standards, privacy laws, internal policies. Policy and Compliance Management stores those requirements, maps them to the controls that satisfy them, and tracks evidence that the controls are working.</p><h2>From rule to proof</h2><ul><li><strong>Authority documents.</strong> The external standards and regulations you must meet.</li><li><strong>Policies.</strong> Your internal rules written to satisfy those requirements.</li><li><strong>Controls.</strong> The specific safeguards put in place.</li><li><strong>Attestation.</strong> Periodic confirmation that controls are followed.</li></ul><div class='callout'><p><strong>Key:</strong> When an auditor asks &ldquo;prove it,&rdquo; the evidence is already organized&mdash;no last-minute scramble.</p></div>"
},
{
"doc": "RISK MGMT",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Risk Management</h1><p class='lead'>Risk Management is the disciplined habit of writing down what could go wrong, judging how serious it is, and deciding what to do about it.</p><p>At the center is the risk register&mdash;a living list of identified risks. Each risk is assessed for how likely it is and how much damage it would cause, then assigned an owner and a plan: reduce it, accept it, transfer it, or avoid it.</p><div class='metric-row'><div class='m'><div class='v'>IDENTIFY</div><div class='l'>spot the risk</div></div><div class='m'><div class='v'>ASSESS</div><div class='l'>rate likelihood &amp; impact</div></div><div class='m'><div class='v'>TREAT</div><div class='l'>decide the response</div></div><div class='m'><div class='v'>MONITOR</div><div class='l'>watch over time</div></div></div><p>Assessments can be sent out as simple questionnaires, and the results roll up so leaders see which risks are rising and which are under control.</p><div class='callout'><p><strong>Key:</strong> A good risk register turns vague worry into a prioritized, owned, trackable plan.</p></div>"
},
{
"doc": "AUDIT MGMT",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Audit Management</h1><p class='lead'>Audit Management plans, runs, and documents internal audits&mdash;the checkups that confirm controls actually work as claimed.</p><p>Audits are how an organization holds itself accountable. This capability helps auditors scope what to review, gather evidence, log findings, and track the fixes through to completion&mdash;all in one place instead of disconnected documents.</p><h3>The audit lifecycle</h3><ul><li><strong>Plan.</strong> Decide what to audit and focus on the highest-risk areas.</li><li><strong>Field work.</strong> Test controls and collect evidence.</li><li><strong>Findings.</strong> Record what passed, what failed, and why.</li><li><strong>Remediation.</strong> Assign and track corrective actions.</li></ul><p>Because it shares data with risk and compliance, auditors can reuse existing evidence instead of re-requesting it.</p><div class='callout'><p><strong>Key:</strong> Audit Management makes audits faster and less painful by keeping scope, evidence, and follow-up organized.</p></div>"
},
{
"doc": "BCM",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Business Continuity Management</h1><p class='lead'>Business Continuity Management (BCM) prepares the organization to keep running&mdash;or recover quickly&mdash;when disaster strikes.</p><p>Outages, storms, and cyberattacks happen. BCM helps you figure out which business functions matter most, how long they can be down, and exactly what to do to bring them back. The goal is a tested plan, not a panicked improvisation.</p><h2>Core ideas</h2><ul><li><strong>Impact analysis.</strong> Which processes are critical, and what depends on them.</li><li><strong>Recovery objectives.</strong> How fast you must recover and how much data loss is acceptable.</li><li><strong>Continuity plans.</strong> Step-by-step instructions for who does what during a disruption.</li><li><strong>Exercises.</strong> Practice runs that prove the plan works before it's needed.</li></ul><div class='callout'><p><strong>Key:</strong> BCM answers a simple question in advance&mdash;if this breaks, how do we keep serving customers?</p></div>"
},
{
"doc": "VENDOR RISK",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Third-Party Risk Management</h1><p class='lead'>Your suppliers and partners can introduce risk into your business. Third-Party Risk Management keeps track of how trustworthy and secure they are.</p><p>Modern organizations rely on many outside vendors, and each one&mdash;especially those handling your data&mdash;is a potential weak point. This capability assesses vendors before you sign, monitors them over time, and keeps a record of their security posture.</p><table><tr><th>Stage</th><th>What happens</th></tr><tr><td>Onboard</td><td>Send security questionnaires before engaging</td></tr><tr><td>Assess</td><td>Score the vendor's risk level</td></tr><tr><td>Monitor</td><td>Re-check periodically and on major changes</td></tr><tr><td>Offboard</td><td>Confirm access and data are removed</td></tr></table><div class='callout'><p><strong>Key:</strong> You're only as secure as your weakest vendor&mdash;this keeps that exposure visible and managed.</p></div>"
},
{
"doc": "DATA PRIVACY",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Data Privacy &amp; Responsible Handling</h1><p class='lead'>Data privacy is about knowing what personal information you hold, why you have it, and treating it with the care the law and your customers expect.</p><p>Privacy laws give people rights over their own data&mdash;to see it, correct it, or have it deleted. Responsible data handling means tracking where personal information lives, limiting who can access it, and being able to act on those requests quickly and provably.</p><h3>What good practice looks like</h3><ul><li><strong>Know your data.</strong> Maintain an inventory of what personal data you collect and where it sits.</li><li><strong>Honor requests.</strong> Handle access, correction, and deletion requests on time.</li><li><strong>Limit exposure.</strong> Only collect what you need and restrict who can see it.</li><li><strong>Document it.</strong> Keep records that show you're handling data lawfully.</li></ul><div class='callout'><p><strong>Key:</strong> Privacy isn't only a legal box to tick&mdash;it's the foundation of customer trust.</p></div>"
},
{
"doc": "SOAR",
"html": "<span class='eyebrow'>SECURITY, RISK &amp; GOVERNANCE</span><h1>Playbooks, SOAR &amp; Orchestration</h1><p class='lead'>These tools let the platform do the repetitive security work automatically, so analysts spend their time on judgment, not busywork.</p><p>SOAR stands for Security Orchestration, Automation, and Response. A playbook is a saved set of steps for handling a specific situation; orchestration is the platform reaching out to other tools to carry those steps out&mdash;like blocking an address or isolating a device&mdash;without a human doing each one by hand.</p><div class='grid2'><div class='kcard'><div class='kt'>PLAYBOOK</div><div class='kd'>A repeatable, guided response for a known scenario.</div></div><div class='kcard'><div class='kt'>AUTOMATION</div><div class='kd'>Routine steps run instantly, the same way every time.</div></div><div class='kcard'><div class='kt'>ORCHESTRATION</div><div class='kd'>Coordinating many tools to act together.</div></div><div class='kcard'><div class='kt'>RESPONSE</div><div class='kd'>Faster containment with less room for error.</div></div></div><div class='callout'><p><strong>Key:</strong> SOAR shrinks response time from hours to minutes by letting machines handle the predictable steps.</p></div>"
},
{
"doc": "APP ENGINE",
"html": "<span class='eyebrow'>BUILD &amp; AUTOMATION</span><h1>App Engine: Building Apps Without a Big Team</h1><p class='lead'>App Engine is the part of ServiceNow that lets people build custom business apps quickly &mdash; often with little or no traditional programming.</p><p>Every organization has work that spreadsheets and email cannot handle well: tracking requests, approvals, assets, or projects. App Engine gives you the building blocks &mdash; data tables, forms, workflows, and security &mdash; so a team can assemble a real working app on the platform instead of buying or coding one from scratch.</p><div class='grid2'><div class='kcard'><div class='kt'>LOW-CODE</div><div class='kd'>Drag, configure, and point-and-click your way to a working app &mdash; less hand-written code.</div></div><div class='kcard'><div class='kt'>GOVERNED</div><div class='kd'>Apps inherit the platform&rsquo;s security, audit trail, and lifecycle controls automatically.</div></div></div><div class='callout'><p><strong>Key:</strong> App Engine turns &ldquo;we need a system for that&rdquo; into something a small team can deliver in weeks, not months.</p></div>"
},
{
"doc": "STUDIO",
"html": "<span class='eyebrow'>BUILD &amp; AUTOMATION</span><h1>App Engine Studio &amp; UI Builder</h1><p class='lead'>These are the visual workspaces where builders actually create an app &mdash; the design tools, not the engine underneath.</p><p><strong>App Engine Studio</strong> is a guided, step-by-step canvas. You define your data, add the experiences users see, layer in logic, and set who can access what &mdash; all from one place, with helpful prompts along the way.</p><p><strong>UI Builder</strong> is the page designer. It lets you arrange the screens &mdash; lists, forms, charts, buttons &mdash; by dragging components onto a page and configuring how they behave, without writing front-end code.</p><ul><li><strong>App Engine Studio.</strong> The &ldquo;build the whole app&rdquo; cockpit.</li><li><strong>UI Builder.</strong> The &ldquo;design the screens&rdquo; tool inside it.</li><li><strong>Components.</strong> Reusable visual pieces you snap together.</li></ul><div class='callout'><p><strong>Key:</strong> Studio assembles the app; UI Builder makes it look and feel right for the people using it.</p></div>"
},
{
"doc": "FLOW DESIGNER",
"html": "<span class='eyebrow'>BUILD &amp; AUTOMATION</span><h1>Flow Designer: Automation Without Code</h1><p class='lead'>Flow Designer lets you automate routine work by describing it in plain steps &mdash; &ldquo;when this happens, do that&rdquo; &mdash; instead of writing scripts.</p><p>A flow is a recipe. It starts with a <strong>trigger</strong> (a record is created, a date arrives, a form is submitted) and then runs a sequence of <strong>actions</strong> (send an email, create a task, ask for approval, update a field). You build it by stacking readable steps in a visual editor.</p><div class='grid2'><div class='kcard'><div class='kt'>TRIGGER</div><div class='kd'>The event that starts the flow &mdash; the &ldquo;when.&rdquo;</div></div><div class='kcard'><div class='kt'>ACTIONS</div><div class='kd'>The steps it performs in order &mdash; the &ldquo;then.&rdquo;</div></div></div><p>Because flows are visual, the people who understand the process &mdash; not just engineers &mdash; can read, review, and adjust them.</p><div class='callout'><p><strong>Key:</strong> Flow Designer replaces manual, repetitive busywork with reliable, repeatable automation anyone can follow.</p></div>"
},
{
"doc": "ACTIONS",
"html": "<span class='eyebrow'>BUILD &amp; AUTOMATION</span><h1>Actions, Subflows &amp; the Flow Ecosystem</h1><p class='lead'>If a flow is a recipe, actions are the individual steps &mdash; and subflows are mini-recipes you can reuse across many flows.</p><ul><li><strong>Action.</strong> A single reusable step, like &ldquo;create a record&rdquo; or &ldquo;post a message.&rdquo; Ships ready-made or built custom.</li><li><strong>Subflow.</strong> A small flow packaged so other flows can call it &mdash; build once, reuse everywhere.</li><li><strong>Action Designer.</strong> The tool for making your own actions when no ready-made one fits.</li></ul><p>This matters because it keeps automation tidy. Instead of copying the same five steps into ten flows, you build a subflow once and call it. Fix it in one place and every flow improves.</p><div class='callout'><p><strong>Key:</strong> Reusable actions and subflows make automation faster to build, easier to maintain, and consistent across the business.</p></div>"
},
{
"doc": "INTEGRATIONHUB",
"html": "<span class='eyebrow'>BUILD &amp; AUTOMATION</span><h1>IntegrationHub &amp; Spokes</h1><p class='lead'>IntegrationHub lets your flows reach out and talk to other systems &mdash; email tools, chat apps, cloud services &mdash; without custom plumbing.</p><p>Most work crosses system boundaries: a request here might need to create a ticket there, message a team, or update a record in another tool. IntegrationHub provides pre-built connectors so a flow can do that as just another step.</p><div class='grid2'><div class='kcard'><div class='kt'>SPOKE</div><div class='kd'>A ready-made connector for a specific outside system &mdash; the bundle of actions that talk to it.</div></div><div class='kcard'><div class='kt'>ACTION</div><div class='kd'>One thing the spoke can do in that system, like &ldquo;send a message&rdquo; or &ldquo;create an item.&rdquo;</div></div></div><p>You drop a spoke&rsquo;s action into a flow, fill in a few details, and the connection just works &mdash; no need to learn each system&rsquo;s technical details.</p><div class='callout'><p><strong>Key:</strong> Spokes turn complex system-to-system connections into simple, reusable flow steps.</p></div>"
},
{
"doc": "WEB SERVICES",
"html": "<span class='eyebrow'>BUILD &amp; AUTOMATION</span><h1>REST, SOAP &amp; Web Services in Plain English</h1><p class='lead'>Web services are how two software systems talk to each other over the internet &mdash; one asks, the other answers.</p><p>Think of it like ordering at a counter. Your system sends a <strong>request</strong> (&ldquo;give me this customer&rsquo;s record&rdquo;), the other system sends back a <strong>response</strong> (the data, or a confirmation). The rules for how they phrase those messages are the &ldquo;protocol.&rdquo;</p><ul><li><strong>REST.</strong> The modern, lightweight style &mdash; simple, fast, the default for most connections today.</li><li><strong>SOAP.</strong> An older, more formal style still common in established enterprise systems.</li><li><strong>API.</strong> The published &ldquo;menu&rdquo; of requests a system agrees to accept.</li></ul><div class='callout'><p><strong>Key:</strong> REST and SOAP are just two dialects for the same conversation &mdash; systems exchanging requests and responses so data can flow between them.</p></div>"
},
{
"doc": "ETL",
"html": "<span class='eyebrow'>BUILD &amp; AUTOMATION</span><h1>IntegrationHub ETL &amp; Data Import</h1><p class='lead'>ETL is how messy data from outside gets cleaned up and loaded into the platform in the right place &mdash; without manual copy-paste.</p><p>ETL stands for <strong>Extract, Transform, Load</strong>: pull data in, reshape it to match how your system expects it, then save it into the correct tables.</p><div class='grid2'><div class='kcard'><div class='kt'>EXTRACT</div><div class='kd'>Pull the raw data in &mdash; a spreadsheet, an export, another system.</div></div><div class='kcard'><div class='kt'>TRANSFORM</div><div class='kd'>Map columns, fix formats, and match it to your structure.</div></div></div><p>IntegrationHub ETL gives you a guided, visual way to define those mapping rules so imports are consistent and repeatable &mdash; the same source loads correctly every time.</p><div class='callout'><p><strong>Key:</strong> ETL turns a pile of outside data into clean, correctly-filed records the platform can actually use.</p></div>"
},
{
"doc": "NOW ASSIST",
"html": "<span class='eyebrow'>AI ON THE PLATFORM</span><h1>Now Assist: Generative AI on the Platform</h1><p class='lead'>Now Assist is ServiceNow&rsquo;s generative AI helper &mdash; it drafts, summarizes, and suggests, right inside the tools people already use.</p><p>Generative AI can read and write natural language. Now Assist puts that to work on everyday tasks: summarizing a long case so an agent gets the gist instantly, drafting a reply, or even helping a builder generate part of a flow from a plain description.</p><ul><li><strong>Summarize.</strong> Condense long records, chats, or histories into a quick recap.</li><li><strong>Draft.</strong> Generate first-pass replies, resolution notes, or knowledge articles.</li><li><strong>Assist building.</strong> Help create flows and code from plain-language prompts.</li></ul><div class='callout'><p><strong>Key:</strong> Now Assist saves time on reading and writing tasks &mdash; people review and approve, but start from a draft instead of a blank page.</p></div>"
},
{
"doc": "PREDICTIVE AI",
"html": "<span class='eyebrow'>AI ON THE PLATFORM</span><h1>Predictive Intelligence: Machine Learning at Work</h1><p class='lead'>Predictive Intelligence learns from your past records to make smart guesses about new ones &mdash; like which team a request should go to.</p><p>Instead of following rigid rules, it studies thousands of resolved cases and spots patterns. When a new item arrives, it can suggest the right category, route it to the correct group, or flag similar past cases &mdash; automatically.</p><div class='grid2'><div class='kcard'><div class='kt'>CLASSIFY</div><div class='kd'>Predict the right category or priority for a new record.</div></div><div class='kcard'><div class='kt'>ROUTE</div><div class='kd'>Send work to the team most likely to resolve it.</div></div></div><p>It improves as it sees more examples, so accuracy grows over time &mdash; cutting the manual triage that slows teams down.</p><div class='callout'><p><strong>Key:</strong> Predictive Intelligence learns from your own history to sort, route, and prioritize work without someone deciding each time.</p></div>"
},
{
"doc": "VIRTUAL AGENT",
"html": "<span class='eyebrow'>AI ON THE PLATFORM</span><h1>Virtual Agent &amp; Conversational Interfaces</h1><p class='lead'>Virtual Agent is a chatbot that handles common requests through conversation &mdash; so people get answers without waiting for a human.</p><p>Users type (or speak) what they need in plain language &mdash; &ldquo;reset my password,&rdquo; &ldquo;order a laptop&rdquo; &mdash; and the Virtual Agent walks them through it, taking real action behind the scenes. When something is too complex, it hands off smoothly to a person.</p><ul><li><strong>Topic.</strong> A guided conversation for one task, built like a flow.</li><li><strong>Handoff.</strong> Passing the chat to a human when needed &mdash; with full context.</li><li><strong>Channels.</strong> Works in chat windows, messaging apps, and portals.</li></ul><div class='callout'><p><strong>Key:</strong> Virtual Agent deflects routine requests through natural conversation, freeing people for the work that truly needs them.</p></div>"
},
{
"doc": "AI SEARCH",
"html": "<span class='eyebrow'>AI ON THE PLATFORM</span><h1>AI Search &amp; the Knowledge Experience</h1><p class='lead'>AI Search helps people find the right answer fast &mdash; understanding what they mean, not just matching exact words.</p><p>Traditional search needs the perfect keyword. AI Search understands intent and context, so a question phrased in everyday language still surfaces the relevant knowledge article, catalog item, or record &mdash; often with the answer highlighted directly.</p><div class='grid2'><div class='kcard'><div class='kt'>UNDERSTANDS</div><div class='kd'>Reads the meaning behind a question, not just the literal words.</div></div><div class='kcard'><div class='kt'>SURFACES</div><div class='kd'>Ranks the most relevant results and can show the answer inline.</div></div></div><p>Paired with a solid knowledge base, it means employees and customers help themselves &mdash; fewer tickets, faster resolutions.</p><div class='callout'><p><strong>Key:</strong> AI Search turns a search box into an answer engine &mdash; people find what they need without knowing the exact words.</p></div>"
},
{
"doc": "ANALYTICS",
"html": "<span class='eyebrow'>AI ON THE PLATFORM</span><h1>Performance Analytics, Reporting &amp; Dashboards</h1><p class='lead'>These tools turn the data flowing through the platform into clear pictures &mdash; so leaders can see how things are going and where to improve.</p><p>A <strong>report</strong> is a snapshot answering one question right now (&ldquo;how many open requests?&rdquo;). A <strong>dashboard</strong> gathers several views on one screen. <strong>Performance Analytics</strong> adds the dimension of time &mdash; tracking trends so you see whether things are getting better or worse.</p><div class='metric-row'><div class='m'><div class='v'>NOW</div><div class='l'>reports snapshot</div></div><div class='m'><div class='v'>ONE VIEW</div><div class='l'>dashboards combine</div></div><div class='m'><div class='v'>OVER TIME</div><div class='l'>analytics trend</div></div></div><ul><li><strong>KPI.</strong> A key number you watch, like average resolution time.</li><li><strong>Indicator.</strong> A measure tracked day over day to reveal direction.</li></ul><div class='callout'><p><strong>Key:</strong> Reports show what&rsquo;s happening, dashboards bring it together, and Performance Analytics shows whether it&rsquo;s trending the right way.</p></div>"
},
{
"doc": "SPM",
"html": "<span class='eyebrow'>BUSINESS VALUE</span><h1>Strategic Portfolio Management</h1><p class='lead'>Once known as ITBM, Strategic Portfolio Management (SPM) is where leaders connect big-picture strategy to the day-to-day work that delivers it.</p><p>Most organizations have plenty of ideas and not enough hands. SPM is the layer that helps decide what to work on, fund it, staff it, and track whether it actually paid off &mdash; all in one place instead of scattered spreadsheets.</p><div class='grid2'><div class='kcard'><div class='kt'>STRATEGY</div><div class='kd'>Set goals and outcomes, then link every initiative back to them.</div></div><div class='kcard'><div class='kt'>PLANNING</div><div class='kd'>Build roadmaps and align budgets to priorities.</div></div><div class='kcard'><div class='kt'>DELIVERY</div><div class='kd'>Run the work as projects or agile, and watch progress live.</div></div><div class='kcard'><div class='kt'>VALUE</div><div class='kd'>Measure results against the goals you started with.</div></div></div><div class='callout'><p><strong>Key:</strong> SPM answers the questions executives actually ask &mdash; are we working on the right things, and are they worth it?</p></div>"
},
{
"doc": "PLANNING",
"html": "<span class='eyebrow'>BUSINESS VALUE</span><h1>Project, Demand &amp; Resource Management</h1><p class='lead'>Three connected disciplines that turn a flood of requests into an organized, staffed plan of work.</p><ul><li><strong>Demand Management.</strong> A single front door for new ideas and requests. Each one is captured, scored, and reviewed so good ideas rise and weak ones are filtered early.</li><li><strong>Project Management.</strong> Once a demand is approved, it becomes a project with tasks, timelines, milestones, and a budget &mdash; tracked the same way every time.</li><li><strong>Resource Management.</strong> Matches the people you have to the work you committed to, so teams aren&rsquo;t overbooked or sitting idle.</li></ul><div class='callout'><p><strong>Key:</strong> The platform supports both traditional (waterfall) and agile ways of working, so teams aren&rsquo;t forced into one style.</p></div><p>Because demand, projects, and resources live together, a leader can see &mdash; in real time &mdash; what&rsquo;s requested, what&rsquo;s approved, who&rsquo;s assigned, and what&rsquo;s at risk.</p>"
},
{
"doc": "LICENSING",
"html": "<span class='eyebrow'>BUSINESS VALUE</span><h1>Editions &amp; Licensing, in Plain English</h1><p class='lead'>ServiceNow is sold as a subscription. What you pay for depends on which products you turn on and how many people use them.</p><p>Rather than buying software outright, you license the right to use specific applications for a period of time. Pricing generally follows a few common patterns.</p><table><tr><th>Model</th><th>What it means</th></tr><tr><td>Per user</td><td>You pay for named people who log in to do work (the &ldquo;fulfillers&rdquo;).</td></tr><tr><td>Per transaction</td><td>You pay based on volume &mdash; for example, automated actions or events processed.</td></tr><tr><td>Per device / asset</td><td>You pay by the number of things being managed.</td></tr></table><div class='callout'><p><strong>Key:</strong> People who simply submit requests (end users) usually don&rsquo;t need a paid seat. You pay for the staff who fulfill the work.</p></div><p>Products are bundled into tiers &mdash; often labeled Standard, Professional, and Enterprise &mdash; where higher tiers unlock more automation, AI, and advanced features.</p>"
},
{
"doc": "PERSONAS",
"html": "<span class='eyebrow'>PEOPLE</span><h1>The People Who Use ServiceNow</h1><p class='lead'>The platform serves very different audiences. Knowing the personas makes every other concept click into place.</p><ul><li><strong>End User.</strong> Anyone in the organization who requests help or services &mdash; resets a password, orders a laptop, asks HR a question. They want it fast and simple.</li><li><strong>Fulfiller.</strong> The staff member who does the work behind a request &mdash; an IT agent, an HR specialist, a facilities tech.</li><li><strong>Process Owner.</strong> Owns how a process should run and is accountable for its quality and outcomes.</li><li><strong>Developer.</strong> Builds and customizes applications, workflows, and integrations on the platform.</li><li><strong>Administrator.</strong> Keeps the platform healthy, secure, and configured &mdash; the &ldquo;admin&rdquo; role with the keys.</li></ul><div class='callout'><p><strong>Key:</strong> One person can wear several hats, but the platform is designed so each role sees only what it needs.</p></div>"
},
{
"doc": "CERTS",
"html": "<span class='eyebrow'>REFERENCE</span><h1>The Certification Path</h1><p class='lead'>ServiceNow offers official exams that prove a person knows the platform. Here&rsquo;s what the common acronyms mean.</p><ul><li><strong>CSA &mdash; Certified System Administrator.</strong> The foundation. Proves you can configure and manage the platform&rsquo;s core. Almost everyone starts here.</li><li><strong>CAD &mdash; Certified Application Developer.</strong> Shows you can build custom applications and write platform code.</li><li><strong>CIS &mdash; Certified Implementation Specialist.</strong> Proves deep skill in a specific product area (such as IT Service Management, HR, or Security) &mdash; the &ldquo;CIS&rdquo; comes in many flavors.</li><li><strong>CTA &mdash; Certified Technical Architect.</strong> The most advanced. Proves you can design large, healthy, enterprise-scale solutions.</li></ul><div class='callout'><p><strong>Key:</strong> CSA is the prerequisite for nearly everything else. Think of it as the front door to the whole certification ladder.</p></div>"
},
{
"doc": "IMPLEMENTATION",
"html": "<span class='eyebrow'>REFERENCE</span><h1>How an Implementation Actually Goes</h1><p class='lead'>Standing up ServiceNow follows a repeatable set of phases &mdash; whether the project is small or company-wide.</p><div class='grid2'><div class='kcard'><div class='kt'>1. DISCOVER</div><div class='kd'>Understand goals, current processes, and pain points.</div></div><div class='kcard'><div class='kt'>2. DESIGN</div><div class='kd'>Decide how the platform will be configured to meet those goals.</div></div><div class='kcard'><div class='kt'>3. BUILD</div><div class='kd'>Configure and develop in a safe sub-production environment.</div></div><div class='kcard'><div class='kt'>4. TEST</div><div class='kd'>Validate everything works and users sign off.</div></div></div><p>After testing comes <strong>Deploy</strong> &mdash; moving the work into the live (production) system &mdash; and then <strong>Operate</strong>, where the platform is supported and improved over time.</p><div class='callout'><p><strong>Key:</strong> A good implementation favors configuring over heavy customizing, which keeps future upgrades smooth and cheap.</p></div>"
},
{
"doc": "PARTNERS",
"html": "<span class='eyebrow'>REFERENCE</span><h1>The Partner Ecosystem</h1><p class='lead'>ServiceNow rarely sells and implements alone. A network of certified partner firms does much of the hands-on work.</p><p>Partners are independent companies trained and authorized to plan, build, and deliver ServiceNow solutions. They are graded into tiers based on certifications, customer success, and experience.</p><ul><li><strong>Why a partner matters.</strong> They have done it before &mdash; bringing proven methods, reusable patterns, and lessons learned that an in-house team would have to discover the hard way.</li><li><strong>Speed and risk.</strong> Experienced partners shorten timelines and avoid costly missteps.</li><li><strong>Specialization.</strong> Many partners go deep in one area &mdash; a product, an industry, or a region &mdash; matching the right expertise to your need.</li></ul><div class='callout'><p><strong>Key:</strong> The right partner is a force multiplier: they transfer knowledge to your team so you&rsquo;re stronger after they leave, not dependent forever.</p></div>"
},
{
"doc": "CAREER",
"html": "<span class='eyebrow'>PEOPLE</span><h1>Building a ServiceNow Career</h1><p class='lead'>The platform powers a thriving job market. Here&rsquo;s how people grow from beginner to expert.</p><div class='metric-row'><div class='m'><div class='v'>CSA</div><div class='l'>where most start</div></div><div class='m'><div class='v'>7,000+</div><div class='l'>partner firms hiring</div></div><div class='m'><div class='v'>Admin&rarr;Architect</div><div class='l'>typical path</div></div></div><p>A common journey: learn the basics and earn the CSA, gain hands-on experience as an administrator or fulfiller, then specialize &mdash; toward development, a product area, or solution architecture.</p><ul><li><strong>Core skills.</strong> Understanding processes, configuring forms and flows, and clear communication matter as much as code.</li><li><strong>Growth skills.</strong> Scripting, integrations, and architecture open senior, higher-paying roles.</li><li><strong>Never stop.</strong> The platform updates twice a year, so continuous learning is the job.</li></ul><div class='callout'><p><strong>Key:</strong> Free training is available to anyone &mdash; the biggest barrier to starting is simply beginning.</p></div>"
},
{
"doc": "ROI",
"html": "<span class='eyebrow'>BUSINESS VALUE</span><h1>The Business Case &amp; ROI</h1><p class='lead'>Leaders don&rsquo;t buy a platform &mdash; they buy outcomes. Here&rsquo;s how value is typically measured.</p><p>Return on investment (ROI) compares what you spend on the platform against the savings and gains it produces. The strongest cases blend hard dollars with softer, strategic wins.</p><div class='grid2'><div class='kcard'><div class='kt'>FASTER</div><div class='kd'>Requests resolved in less time through automation.</div></div><div class='kcard'><div class='kt'>CHEAPER</div><div class='kd'>Fewer manual steps and retired legacy tools.</div></div><div class='kcard'><div class='kt'>BETTER</div><div class='kd'>Higher employee and customer satisfaction.</div></div><div class='kcard'><div class='kt'>SAFER</div><div class='kd'>Consistent, auditable, compliant processes.</div></div></div><div class='callout'><p><strong>Key:</strong> Measure a baseline before you start &mdash; you can&rsquo;t prove improvement if you never recorded where you began.</p></div><p>The best business cases also count avoided cost: problems prevented, outages shortened, and hours given back to staff for higher-value work.</p>"
},
{
"doc": "READINESS",
"html": "<span class='eyebrow'>BUSINESS VALUE</span><h1>Is Your Company Ready?</h1><p class='lead'>You don&rsquo;t need to be a giant to benefit. A few honest signs reveal when a platform is the right move.</p><ul><li><strong>Spreadsheet sprawl.</strong> Critical work is tracked in scattered spreadsheets and email threads no one trusts.</li><li><strong>Tool overload.</strong> A dozen disconnected systems that don&rsquo;t talk to each other.</li><li><strong>Repeated requests.</strong> The same questions and tasks handled manually over and over.</li><li><strong>No visibility.</strong> Leaders can&rsquo;t answer simple questions like &ldquo;how many open requests do we have?&rdquo;</li><li><strong>Growth strain.</strong> Processes that worked at 50 people are breaking at 500.</li></ul><div class='metric-row'><div class='m'><div class='v'>3+</div><div class='l'>signs? worth a look</div></div><div class='m'><div class='v'>1</div><div class='l'>platform to unify</div></div></div><div class='callout'><p><strong>Key:</strong> Readiness is less about size and more about pain &mdash; when manual work is holding you back, the platform pays for itself.</p></div>"
},
{
"doc": "GLOSSARY A",
"html": "<span class='eyebrow'>REFERENCE</span><h1>Quick Glossary &mdash; Part 1</h1><p class='lead'>Plain-English definitions of the terms you&rsquo;ll hear most often. Part one of two.</p><ul><li><strong>Instance.</strong> Your own private copy of ServiceNow running in the cloud.</li><li><strong>Table.</strong> A structured list that stores records &mdash; like a smart spreadsheet.</li><li><strong>Record.</strong> A single entry in a table, such as one ticket or one user.</li><li><strong>Form.</strong> The screen you fill in to view or edit a record.</li><li><strong>Workflow / Flow.</strong> An automated series of steps the platform runs for you.</li><li><strong>Catalog.</strong> The &ldquo;store&rdquo; where users request services and items.</li><li><strong>Incident.</strong> A record of something broken that needs fixing.</li><li><strong>Request.</strong> A record of something a user wants.</li><li><strong>CMDB.</strong> A map of your technology and how the pieces connect.</li><li><strong>SLA.</strong> A promised timeframe for getting work done.</li><li><strong>Role.</strong> A permission setting that controls what a user can see and do.</li><li><strong>Scope.</strong> A boundary that keeps one application&rsquo;s data and code separate.</li></ul>"
},
{
"doc": "GLOSSARY B",
"html": "<span class='eyebrow'>REFERENCE</span><h1>Quick Glossary &mdash; Part 2</h1><p class='lead'>More everyday terms to round out your vocabulary. Part two of two.</p><ul><li><strong>ITSM.</strong> IT Service Management &mdash; running IT support the organized way.</li><li><strong>Fulfiller.</strong> The staff member who does the work behind a request.</li><li><strong>Knowledge Base.</strong> A searchable library of help articles and answers.</li><li><strong>Update Set.</strong> A bundle of changes moved safely between environments.</li><li><strong>Production.</strong> The live system real users depend on every day.</li><li><strong>Sub-production.</strong> Safe copies (dev and test) for building and trying things.</li><li><strong>Integration.</strong> A connection that lets ServiceNow exchange data with another system.</li><li><strong>API.</strong> The doorway through which systems talk to each other.</li><li><strong>Virtual Agent.</strong> A chatbot that answers questions and takes action automatically.</li><li><strong>Now Assist.</strong> The platform&rsquo;s generative-AI helper built into the tools.</li><li><strong>Upgrade.</strong> The twice-a-year refresh that adds new features.</li><li><strong>Service Portal.</strong> The friendly website where end users get help.</li></ul>"
},
{

"html": "<h2>Now you speak ServiceNow.</h2><p>Knowing the words is the first step. Putting the platform to work &mdash; CMDB, ITSM, ITOM, ITAM, Integrations, AI, and beyond &mdash; is what we do.</p><p>Omar Huertas LLC is a Registered ServiceNow Build, Consulting &amp; Implementation Partner. We help organizations turn the Now Platform into real outcomes.</p><a class='bc-cta'>Work with us &rarr;</a><div class='legacy'>&#9670; In honor of <strong>Michael Lombardo</strong>, the Mayor of ServiceNow (1987&ndash;2024). Everything we build is for his legacy.</div><div class='disclaimer'>ServiceNow, the ServiceNow logo, Now, Now Platform, and related product names are trademarks of ServiceNow, Inc. This independent educational guide is provided by Omar Huertas LLC and is not affiliated with, authorized, or endorsed by ServiceNow, Inc. All trademarks are the property of their respective owners.</div><div class='bc-foot'><span>omar@dbaomarhuertasllc.com</span><span>dbaomarhuertasllc.com</span></div>"

];   // linear order: [cover, ...content, back-cover]

const book=document.getElementById('book');

// Build the HTML for one physical page (face), given its content spec + the
// page number printed in the footer.
function faceMarkup(pg,pageNo){
  if(pg.cover) return ['cover','<div class="c-aurora"></div>'+pg.html];
  if(pg.back)  return ['back-cover','<div class="bc-aurora"></div>'+pg.html];
  return ['content',
    '<div class="p-head"><span class="ph-brand"><span class="ph-mark">OH</span><span class="ph-name">Omar Huertas LLC</span></span>'+
    '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div><div class="p-rule"></div>'+
    '<div class="p-body">'+pg.html+'</div>'+
    '<div class="p-foot"><span class="pf-c">&copy; 2026 Omar Huertas LLC</span><span class="pf-n">'+String(pageNo).padStart(2,'0')+'</span></div>'];
}
function buildFace(side,pg,pageNo){
  const f=document.createElement('div');f.className='face '+side;
  if(pg){const [cls,html]=faceMarkup(pg,pageNo);if(cls!=='content')f.classList.add(cls);f.innerHTML=html;}
  else{ // blank verso filler (odd page count) — decorative
    f.classList.add('blankback');
    f.innerHTML='<div class="facing"><div class="f-mark">OH</div><div class="f-word">The ServiceNow<br><b>Lexicon</b></div><div class="f-rule"></div><div class="f-sub">An Omar Huertas LLC Field Guide</div></div>';
  }
  return f;
}

// Each LEAF (sheet) carries TWO pages: front = recto (right), back = verso (left).
// Linear reading order across the book is front0, back0, front1, back1, ...
const leaves=[], faceSeq=[];
const L=Math.ceil(PAGES.length/2);
for(let i=0;i<L;i++){
  const fp=PAGES[2*i], bp=PAGES[2*i+1];
  const leaf=document.createElement('div');leaf.className='leaf';
  const front=buildFace('front',fp,2*i+1);
  const back =buildFace('back', bp,bp?2*i+2:null);
  leaf.appendChild(front);leaf.appendChild(back);
  book.appendChild(leaf);leaves.push(leaf);
  faceSeq.push(front); if(bp) faceSeq.push(back);   // real pages only (skip blank filler)
}
const N=leaves.length;     // desktop spreads
const M=faceSeq.length;    // mobile pages (every face)

const elCur=document.getElementById('cur'), elTot=document.getElementById('tot');
const elBar=document.getElementById('progress').firstElementChild;
const elPrev=document.getElementById('prev'), elNext=document.getElementById('next');
const mq=window.matchMedia('(max-width:860px)');
function isMobile(){return mq.matches;}

let cur=0;   // desktop: right-hand leaf index
let mi=0;    // mobile: face index

function renderDesktop(){
  book.querySelectorAll('.face').forEach(f=>f.style.display='');   // clear mobile show/hide
  leaves.forEach((el,i)=>{
    const turned=i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (N - i);
    el.style.display = Math.abs(i-cur)<=1 ? '' : 'none';
  });
  book.classList.toggle('closed', cur===0);
  elCur.textContent=cur+1; elTot.textContent=N;
  elBar.style.width=(N>1?cur/(N-1)*100:0)+'%';
  elPrev.disabled=cur<=0; elNext.disabled=cur>=N-1;
}
const allFaces=Array.prototype.slice.call(book.querySelectorAll('.face'));
function renderMobile(){
  leaves.forEach(el=>{el.classList.remove('turned');el.style.zIndex='';el.style.display='block';});
  allFaces.forEach(f=>{f.style.display='none';});      // hide every face incl. blank filler
  if(faceSeq[mi]) faceSeq[mi].style.display='flex';    // show only the active page
  book.classList.toggle('closed', mi===0);
  elCur.textContent=mi+1; elTot.textContent=M;
  elBar.style.width=(M>1?mi/(M-1)*100:0)+'%';
  elPrev.disabled=mi<=0; elNext.disabled=mi>=M-1;
}
function render(){ isMobile()?renderMobile():renderDesktop(); }

function flash(el){el.classList.add('tn');setTimeout(()=>el.classList.remove('tn'),950);}
let busy=false;
function next(){
  if(busy)return;
  if(isMobile()){ if(mi>=M-1)return; busy=true; mi++; render(); }
  else{ if(cur>=N-1)return; busy=true; flash(leaves[cur]); cur++; render(); }
  setTimeout(()=>busy=false,440);
}
function prev(){
  if(busy)return;
  if(isMobile()){ if(mi<=0)return; busy=true; mi--; render(); }
  else{ if(cur<=0)return; busy=true; cur--; flash(leaves[cur]); render(); }
  setTimeout(()=>busy=false,440);
}
elNext.onclick=next; elPrev.onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
let _sw=0;
book.addEventListener('click',e=>{if(Date.now()-_sw<450)return;const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
let _tx=0,_ty=0;
book.addEventListener('touchstart',e=>{const t=e.changedTouches[0];_tx=t.clientX;_ty=t.clientY;},{passive:true});
book.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-_tx,dy=t.clientY-_ty;if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.3){_sw=Date.now();dx<0?next():prev();}},{passive:true});
// keep the two indices roughly in sync when crossing the breakpoint
mq.addEventListener('change',()=>{ if(isMobile()) mi=Math.min(M-1,Math.max(0,cur*2)); else cur=Math.min(N-1,Math.max(0,Math.floor(mi/2))); render(); });

// ---- theme switcher: 8 colors that pop ----
const THEMES={
  Sapphire:['#2f6df6','#2456c9','#8fb4ff','47,109,246','36,86,201'],
  Emerald :['#10b981','#059669','#6ee7b7','16,185,129','5,150,105'],
  Violet  :['#8b5cf6','#6d28d9','#c4b5fd','139,92,246','109,40,217'],
  Magenta :['#ec4899','#be185d','#f9a8d4','236,72,153','190,24,93'],
  Amber   :['#f59e0b','#b45309','#fbbf24','245,158,11','180,83,9'],
  Crimson :['#ef4444','#b91c1c','#fca5a5','239,68,68','185,28,28'],
  Cyan    :['#06b6d4','#0e7490','#67e8f9','6,182,212','14,116,144'],
  Lime    :['#84cc16','#4d7c0f','#bef264','132,204,22','77,124,15']
};
const themer=document.getElementById('themer');
function applyTheme(n){const t=THEMES[n];if(!t)return;const r=document.documentElement.style;
  r.setProperty('--now',t[0]);r.setProperty('--now-d',t[1]);r.setProperty('--now-l',t[2]);
  r.setProperty('--glow',t[3]);r.setProperty('--glow-d',t[4]);
  try{localStorage.setItem('lexTheme',n);}catch(e){}
  themer.querySelectorAll('.sw').forEach(b=>b.classList.toggle('active',b.dataset.t===n));}
Object.keys(THEMES).forEach(n=>{const b=document.createElement('button');b.className='sw';b.dataset.t=n;b.title=n;b.setAttribute('aria-label','Theme: '+n);b.style.background=THEMES[n][0];b.onclick=()=>applyTheme(n);themer.appendChild(b);});
let _sv='Sapphire';try{_sv=localStorage.getItem('lexTheme')||'Sapphire';}catch(e){}
applyTheme(_sv);

render();
</script>
