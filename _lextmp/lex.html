<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The ServiceNow Lexicon — by Omar Huertas LLC — Omar Huertas LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
:root{
  --now:#2f6df6;--now-d:#2456c9;--now-l:#8fb4ff;--glow:47,109,246;--glow-d:36,86,201;
  --ink:#0a1418;--ink-2:#142329;--navy:#04162f;--navy-2:#0c2f5a;
  --muted:#5a6c75;--line:#e6ecef;--bg:#f4f8f9;
  --paper:#fcfaf5;--paper-2:#f4f0e6;
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);
  background:
   radial-gradient(50% 50% at 85% 5%,rgba(var(--glow),.20),transparent 70%),
   radial-gradient(45% 60% at 10% 100%,rgba(var(--glow-d),.16),transparent 70%),
   linear-gradient(135deg,#04162f,#0c2f5a 60%,#06142a);
  background-attachment:fixed;min-height:100vh;display:flex;flex-direction:column;align-items:center;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
.grain{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:4px 4px}

/* top bar */
.topbar{position:relative;z-index:5;width:100%;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:14px 22px;color:#eaf7f8}
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:13px;font-weight:900;box-shadow:0 8px 20px rgba(var(--glow-d),.35)}
.brand-lock{display:flex;flex-direction:column;line-height:1.12}
.brand-lock .b-name{font-weight:800;font-size:15px;letter-spacing:-.02em}
.brand-lock .b-sub{font-size:10px;font-weight:800;letter-spacing:.09em;color:var(--now-l);text-transform:uppercase}
.partner-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(var(--glow),.4);background:rgba(var(--glow),.10);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:800;color:#dce8ff}
.partner-pill .pp-dot{width:8px;height:8px;border-radius:50%;background:var(--now);box-shadow:0 0 0 3px rgba(var(--glow),.22)}
.toplink{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#eaf7f8;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:800;text-decoration:none}
@media(max-width:640px){.partner-pill{display:none}}

#progress{position:relative;z-index:5;width:min(1100px,94vw);height:4px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden;margin:2px 0 14px}
#progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--now-d),var(--now),var(--now-l));box-shadow:0 0 12px rgba(var(--glow),.6);transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* ===== BOOK STAGE ===== */
.stage{position:relative;z-index:5;width:min(1180px,96vw);flex:1;display:flex;align-items:center;justify-content:center;padding:6px 0 12px;perspective:3000px}
/* hardcover boards sitting behind the pages */
.bookwrap{position:relative;width:100%;max-height:82vh;aspect-ratio:1.46/1;display:flex;align-items:center;justify-content:center;
  transform-style:preserve-3d;transition:transform .9s cubic-bezier(.2,.7,.2,1)}
.bookwrap::before{ /* cover boards */
  content:"";position:absolute;inset:-14px -16px -16px -16px;border-radius:12px;
  background:linear-gradient(135deg,#0a2350,#06173a 55%,#040d22);
  box-shadow:0 50px 90px rgba(0,0,0,.55),inset 0 0 0 1px rgba(var(--glow),.18);
  z-index:0}
.book{position:relative;width:100%;height:100%;z-index:1}
/* center spine */
.book::after{content:"";position:absolute;top:1.5%;bottom:1.5%;left:50%;width:30px;transform:translateX(-50%);z-index:40;pointer-events:none;
  background:linear-gradient(90deg,rgba(0,0,0,0),rgba(0,0,0,.22) 38%,rgba(0,0,0,.30) 50%,rgba(0,0,0,.22) 62%,rgba(0,0,0,0));border-radius:4px}
.book.closed::after{opacity:0}

/* a leaf = one physical sheet, occupies the RIGHT half, hinged at the spine (its left edge) */
.leaf{position:absolute;top:0;right:0;width:50%;height:100%;transform-origin:left center;transform-style:preserve-3d;
  transition:transform .95s cubic-bezier(.34,.62,.28,1)}
.leaf.turned{transform:rotateY(-180deg)}
.leaf .face{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;border-radius:0 var(--radius) var(--radius) 0;
  display:flex;flex-direction:column;background:var(--paper);box-shadow:0 1px 0 rgba(0,0,0,.04)}
.leaf .face.front{z-index:2}
.leaf .face.back{transform:rotateY(180deg);border-radius:var(--radius) 0 0 var(--radius)}
/* page-edge thickness on outer side of the right page */
.leaf .face.front::before{content:"";position:absolute;top:0;bottom:0;right:0;width:8px;z-index:30;pointer-events:none;
  background:repeating-linear-gradient(90deg,#e9e3d4,#e9e3d4 1px,#fcfaf5 1px,#fcfaf5 3px)}
/* page-edge thickness on outer (left) side of the verso page */
.leaf .face.back::before{content:"";position:absolute;top:0;bottom:0;left:0;width:8px;z-index:30;pointer-events:none;
  background:repeating-linear-gradient(270deg,#e9e3d4,#e9e3d4 1px,#fcfaf5 1px,#fcfaf5 3px)}
.leaf .face.back.cover::before,.leaf .face.back.back-cover::before{display:none}
/* spine + curl shading */
.leaf .face::after{content:"";position:absolute;inset:0;z-index:25;pointer-events:none;opacity:1;
  background:linear-gradient(90deg,rgba(0,0,0,.16),rgba(0,0,0,0) 14%)}
.leaf .face.back::after{background:linear-gradient(270deg,rgba(0,0,0,.16),rgba(0,0,0,0) 14%)}
/* lift + sweeping highlight while a leaf is mid-turn */
.leaf.tn{box-shadow:0 40px 80px rgba(0,0,0,.45)}
.leaf.tn .face.front::after{animation:curl .95s ease}
@keyframes curl{0%{background:linear-gradient(90deg,rgba(0,0,0,.16),transparent 14%)}
  45%{background:linear-gradient(105deg,rgba(0,0,0,.05),rgba(255,255,255,.28) 30%,rgba(0,0,0,.22) 60%,transparent 80%)}
  100%{background:linear-gradient(90deg,rgba(0,0,0,.16),transparent 14%)}}

/* closed book = only the cover, centered */
.book.closed .leaf:not(:first-child){opacity:0;pointer-events:none}
.book.closed .leaf:first-child{width:100%}
.book.closed .leaf:first-child .face.cover{border-radius:var(--radius)}
.book{transition:transform .8s cubic-bezier(.2,.7,.2,1)}

/* ===== facing (left) page — the book's verso ===== */
.facing{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:linear-gradient(135deg,var(--paper),var(--paper-2));color:var(--ink);text-align:center;padding:40px}
.facing .f-mark{width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;box-shadow:0 10px 24px rgba(var(--glow-d),.3)}
.facing .f-word{font-family:Fraunces,Georgia,serif;font-size:26px;font-weight:700;line-height:1.05;color:var(--ink-2);letter-spacing:-.01em}
.facing .f-word b{color:var(--now-d)}
.facing .f-rule{width:54px;height:3px;border-radius:999px;background:linear-gradient(90deg,var(--now-d),var(--now-l))}
.facing .f-sub{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.facing .f-num{position:absolute;bottom:26px;font-family:Fraunces,Georgia,serif;font-size:13px;color:var(--muted)}

/* ===== page chrome (right / recto content) ===== */
.p-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 30px 0 34px;flex:0 0 auto}
.p-head .ph-brand{display:flex;align-items:center;gap:9px}
.p-head .ph-mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:9px;font-weight:900}
.p-head .ph-name{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--ink)}
.p-head .ph-doc{font-size:10px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--now-d)}
.p-rule{height:3px;margin:12px 30px 0 34px;border-radius:999px;background:linear-gradient(90deg,var(--now-d),var(--now) 45%,transparent)}
.p-body{flex:1 1 auto;overflow-y:auto;padding:18px 30px 12px 34px;scrollbar-width:thin}
.p-body::-webkit-scrollbar{width:7px}.p-body::-webkit-scrollbar-thumb{background:#d8d2c4;border-radius:999px}
.p-foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 30px 16px 34px;font-size:9.5px;font-weight:600;color:var(--muted);border-top:1px solid var(--line)}
.p-foot .pf-c{color:var(--ink);font-weight:700}
.p-foot .pf-n{font-family:Fraunces,Georgia,serif;font-weight:600;color:var(--now-d);font-size:12px}

/* typography */
.p-body h1{font-family:Fraunces,Georgia,serif;font-size:27px;font-weight:900;letter-spacing:-.02em;line-height:1.06;margin:2px 0 12px;color:var(--ink)}
.p-body h2{font-size:18px;font-weight:850;letter-spacing:-.02em;margin:20px 0 9px;color:var(--ink);display:flex;align-items:center;gap:9px}
.p-body h2::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--now);box-shadow:0 0 0 3px rgba(var(--glow),.18);flex:0 0 auto}
.p-body h3{font-size:13.5px;font-weight:800;margin:15px 0 6px;color:var(--ink-2)}
.p-body p{font-size:12.5px;line-height:1.62;color:#26373d;margin:0 0 11px}
.p-body ul,.p-body ol{margin:0 0 12px;padding-left:4px;list-style:none}
.p-body li{font-size:12.5px;line-height:1.55;color:#26373d;margin:0 0 7px;padding-left:20px;position:relative}
.p-body li::before{content:"";position:absolute;left:2px;top:7px;width:7px;height:7px;border-radius:2px;background:var(--now);transform:rotate(45deg)}
.p-body strong{color:var(--ink);font-weight:800}
.p-body .lead{font-size:14px;line-height:1.6;color:#1c2c32;font-weight:500}
.p-body .eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(var(--glow-d),.3);background:rgba(var(--glow),.10);border-radius:999px;padding:6px 13px;font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--now-d);margin-bottom:14px}
.p-body .eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--now)}
.callout{background:rgba(var(--glow),.07);border:1px solid rgba(var(--glow),.22);border-left:4px solid var(--now);border-radius:12px;padding:13px 16px;margin:4px 0 14px}
.callout p{margin:0;font-size:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:2px 0 14px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:0 4px 14px rgba(4,34,47,.05)}
.kcard .kt{font-size:11px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--now-d);margin-bottom:5px}
.kcard .kd{font-size:11.5px;line-height:1.5;color:#33474f}
table{width:100%;border-collapse:separate;border-spacing:0;margin:2px 0 14px;font-size:11px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
th{background:linear-gradient(135deg,var(--now-d),var(--now));color:#fff;font-weight:800;font-size:10px;letter-spacing:.03em}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#faf8f2}
/* metric cards — emerald-accented paper, NOT black */
.metric-row{display:flex;gap:10px;flex-wrap:wrap;margin:2px 0 14px}
.metric-row .m{flex:1 1 110px;background:#fff;border:1px solid var(--line);border-top:3px solid var(--now);border-radius:14px;padding:14px 14px 13px;box-shadow:0 8px 22px rgba(4,34,47,.07)}
.metric-row .m .v{font-family:Fraunces,Georgia,serif;font-size:24px;font-weight:900;letter-spacing:-.01em;background:linear-gradient(120deg,var(--now-d),var(--now));-webkit-background-clip:text;background-clip:text;color:transparent}
.metric-row .m .l{font-size:10px;font-weight:700;color:var(--muted);margin-top:3px}

/* COVER / BACK (full navy pages) */
.leaf .face.cover,.leaf .face.back-cover{background:linear-gradient(135deg,#04162f,#0c2f5a 60%,#06142a)!important;color:#fff;justify-content:space-between;padding:40px 38px;border-radius:0 var(--radius) var(--radius) 0}
.cover .c-aurora,.back-cover .bc-aurora{position:absolute;inset:0;z-index:0;pointer-events:none}
.cover .c-aurora{background:radial-gradient(45% 45% at 82% 10%,rgba(var(--glow),.34),transparent 70%),radial-gradient(45% 55% at 10% 96%,rgba(var(--glow-d),.22),transparent 70%)}
.back-cover .bc-aurora{background:radial-gradient(45% 45% at 18% 12%,rgba(var(--glow),.28),transparent 70%)}
.cover>*,.back-cover>*{position:relative;z-index:1}
.cover .c-top{display:flex;align-items:center;justify-content:space-between}
.cover .c-mark{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--navy),var(--now));display:grid;place-items:center;color:#fff;font-size:18px;font-weight:900;box-shadow:0 12px 30px rgba(var(--glow-d),.4)}
.cover .c-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(var(--glow),.45);background:rgba(var(--glow),.12);border-radius:999px;padding:7px 13px;font-size:11px;font-weight:800;color:#dce8ff}
.cover .c-pill::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--now)}
.cover .c-mid{margin-top:auto}
.cover .c-eyebrow{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--now-l);margin-bottom:16px}
.cover h1{font-family:Fraunces,Georgia,serif;font-size:clamp(34px,5vw,52px);font-weight:900;line-height:1;letter-spacing:-.02em;margin:0 0 14px}
.cover h1 .accent{background:linear-gradient(120deg,var(--now),var(--now-l));-webkit-background-clip:text;background-clip:text;color:transparent}
.cover .c-sub{font-size:15px;line-height:1.5;color:#d3e7ee;max-width:92%;font-weight:500}
.cover .c-meta{margin-top:26px;padding-top:18px;border-top:1px solid rgba(255,255,255,.16);display:flex;align-items:flex-end;justify-content:space-between;gap:14px}
.cover .c-meta .cm-l .cm-by{font-size:13px;font-weight:800;color:#eaf7f8}
.cover .c-meta .cm-l .cm-rel{font-size:11.5px;color:#bcd6de;margin-top:3px;font-weight:600}
.cover .c-meta .cm-r{font-size:10px;color:#9fbcc6;text-align:right;font-weight:600;max-width:46%}
.back-cover h2{font-family:Fraunces,Georgia,serif;font-size:24px;font-weight:900;letter-spacing:-.01em;margin-bottom:12px;color:#fff}
.back-cover h2::before{display:none}
.back-cover p{font-size:12.5px;line-height:1.6;color:#d3e7ee;margin-bottom:11px}
.back-cover .bc-cta{display:inline-flex;align-items:center;gap:9px;background:var(--now);color:#fff;font-weight:800;font-size:13px;border-radius:999px;padding:12px 22px;margin-top:6px}
.back-cover .legacy{margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,.16);font-size:10.5px;line-height:1.55;color:#bcd6de}
.back-cover .legacy strong{color:#eaf7f8}
.back-cover .disclaimer{font-size:9px;line-height:1.5;color:#7fa0ab;margin-top:12px}
.back-cover .bc-foot{margin-top:14px;font-size:11px;font-weight:700;color:#dce8ff;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* controls */
.controls{position:relative;z-index:6;display:flex;align-items:center;gap:16px;padding:12px 0 20px;color:#eaf7f8}
.nav-btn{width:50px;height:50px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:21px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(8px);transition:.2s ease}
@media(hover:hover){.nav-btn:hover:not(:disabled){background:var(--now);color:#fff;transform:translateY(-2px)}}
.nav-btn:active:not(:disabled){background:var(--now);color:#fff;transform:scale(.92)}
.nav-btn:disabled{opacity:.3;cursor:default}
.counter{font-size:13px;font-weight:800;min-width:90px;text-align:center;letter-spacing:.04em}
.counter b{color:var(--now-l)}
.hint{position:fixed;bottom:9px;left:50%;transform:translateX(-50%);z-index:6;font-size:11px;color:#9fbcc6;font-weight:600;opacity:.8}

/* mobile: single page */
@media(max-width:860px){
  /* iOS-safe: no 3D page flip on phones — cross-fade instead */
  body{min-height:100svh}
  .stage{align-items:stretch;padding:6px 0 10px;perspective:none}
  .bookwrap{aspect-ratio:auto;width:92vw;max-width:460px;height:auto;max-height:none;flex:1}
  .book{height:100%}
  .bookwrap::before{inset:-8px -8px -10px -8px}
  /* phones: linearize — every FACE becomes its own page (JS shows one at a time) */
  .leaf{position:absolute!important;inset:0;left:0;right:auto;width:100%;transform:none!important;opacity:1;pointer-events:auto;transition:none}
  .leaf .face{position:absolute;inset:0;transform:none!important;backface-visibility:visible;border-radius:var(--radius)}
  .leaf .face.back{transform:none!important;border-radius:var(--radius)}
  .leaf .face::after{display:none}
  .leaf .face.front::before,.leaf .face.back::before{display:none}
  .leaf.tn .face.front::after{animation:none}
  .cover,.back-cover{border-radius:var(--radius)}
  .book::after{display:none}
  .facing{display:none}
  .hint{display:none}
  .p-head,.p-foot{padding-left:18px;padding-right:18px}.p-rule{margin-left:18px;margin-right:18px}.p-body{padding:16px 18px 12px}
}

h1,.cover h1,.cover h1 .accent,.f-word,.metric-row .m .v,.back-cover h2,.pf-n,.facing .f-num{font-variant-ligatures:none!important;font-feature-settings:"liga" 0,"clig" 0,"dlig" 0!important}

.themer{position:fixed;left:14px;bottom:14px;z-index:30;display:flex;align-items:center;gap:8px;background:rgba(8,20,36,.72);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 12px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.themer .tlabel{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#9fbcc6;margin-right:2px}
.themer .sw{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.25);cursor:pointer;padding:0;transition:transform .15s,box-shadow .15s}
.themer .sw:hover{transform:scale(1.18)}
.themer .sw.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.30)}
@media(max-width:860px){.themer{left:50%;transform:translateX(-50%);bottom:86px;padding:7px 10px;gap:6px}.themer .tlabel{display:none}.themer .sw{width:18px;height:18px}}
</style>
</head>
<body>
<div class="grain"></div>

<div class="topbar">
  <a class="brand" href="https://dbaomarhuertasllc.com" style="color:#eaf7f8;text-decoration:none">
    <span class="brand-mark">OH</span>
    <span class="brand-lock"><span class="b-name">Omar Huertas LLC</span><span class="b-sub">ServiceNow Partner</span></span>
  </a>
  <span style="display:flex;align-items:center;gap:10px"><a class="toplink" href="https://dbaomarhuertasllc.com">dbaomarhuertasllc.com</a><span class="partner-pill"><span class="pp-dot"></span>ServiceNow&reg; &middot; Explained</span></span>
</div>

<div id="progress"><span></span></div>
<div class="themer" id="themer"><span class="tlabel">Theme</span></div>

<div class="stage">
  <div class="bookwrap"><div class="book" id="book"></div></div>
</div>

<div class="controls">
  <button class="nav-btn" id="prev" aria-label="Previous page">&larr;</button>
  <div class="counter"><b id="cur">1</b> / <span id="tot">1</span></div>
  <button class="nav-btn" id="next" aria-label="Next page">&rarr;</button>
</div>
<div class="hint">Use &larr; &rarr; keys, click the page edges, or the buttons to turn the page</div>

<script>
const DOC = "ServiceNow Lexicon";
const PAGES = [
{
"cover": true,
"html": "<div class='c-top'><div class='c-mark'>OH</div><div class='c-pill'>ServiceNow&reg; &middot; Explained</div></div><div class='c-mid'><div class='c-eyebrow'>The Field Guide &middot; ServiceNow, Explained</div><h1>The ServiceNow <span class='accent'>Lexicon</span></h1><p class='c-sub'>What ServiceNow is, what it does, every acronym and module decoded &mdash; and why your company needs it. In plain English.</p></div><div class='c-meta'><div class='cm-l'><div class='cm-by'>An educational guide by Omar Huertas LLC</div><div class='cm-rel'>2026 Edition &middot; Expanded &middot; 100 pages</div></div><div class='cm-r'>&copy; 2026 Omar Huertas LLC.</div></div>"
},
{
"doc": "FOUNDATIONS",
"html": "<span class='eyebrow'>WHAT IT IS</span><h1>ServiceNow, in One Sentence</h1><p class='lead'>ServiceNow is a single cloud platform for running the work of a whole organization.</p><p>Most companies juggle dozens of disconnected systems. ServiceNow takes that scattered work &mdash; requests, approvals, tasks, records &mdash; and puts it on one shared foundation where everything lives together and talks to itself.</p><h2>The Core Idea</h2><p>Instead of buying separate software for IT, HR, customer service, and operations, you build all of it on the same platform. One login, one data model, one way of working.</p><div class='grid2'><div class='kcard'><div class='kt'>ONE PLATFORM</div><div class='kd'>Many business functions run on the same shared system rather than separate tools.</div></div><div class='kcard'><div class='kt'>WORKFLOW ENGINE</div><div class='kd'>At its heart it moves work from person to person automatically until it is done.</div></div></div><div class='callout'><p><strong>Key:</strong> Think of ServiceNow not as one app, but as the ground everything else is built on.</p></div>"
},
{
"doc": "THE PROBLEM",
"html": "<span class='eyebrow'>WHY IT EXISTS</span><h1>The Mess It Cleans Up</h1><p class='lead'>Before a platform like this, work hides inside email threads, spreadsheets, and a dozen tools that do not talk to each other.</p><h2>Tool Sprawl</h2><p>Each team buys its own software. A request that crosses two teams falls through the cracks because the systems never share information. Nobody can see the whole picture.</p><ul><li><strong>Email chaos.</strong> Requests live in inboxes, so nothing is tracked, measured, or guaranteed to get done.</li><li><strong>Spreadsheet sprawl.</strong> Critical lists get copied, edited, and emailed until no one knows which version is true.</li><li><strong>No accountability.</strong> Without a shared record, it is impossible to say who owns what or how long it took.</li></ul><div class='callout'><p><strong>Key:</strong> The real problem is not too few tools &mdash; it is too many disconnected ones.</p></div><p>ServiceNow replaces the scattered patchwork with one trustworthy place where every request becomes a tracked, visible record.</p>"
},
{
"doc": "THE NOW PLATFORM",
"html": "<span class='eyebrow'>THE FOUNDATION</span><h1>The Now Platform</h1><p class='lead'>The Now Platform is the shared engine underneath every ServiceNow product.</p><p>Because everything sits on one platform, a customer complaint, an IT outage, and an HR onboarding task can all reference the same people, the same equipment, and the same history.</p><h2>One Data Model</h2><p>A single, shared structure stores all the information. When one team updates a record, everyone who needs it sees the change instantly. There is no copying between systems.</p><div class='grid2'><div class='kcard'><div class='kt'>ONE PLACE TO WORK</div><div class='kd'>People do their daily tasks inside the same environment, no matter which department they are in.</div></div><div class='kcard'><div class='kt'>SHARED SERVICES</div><div class='kd'>Automation, reporting, and security are built once and reused everywhere.</div></div></div><div class='callout'><p><strong>Key:</strong> The power comes from connection &mdash; everything referencing the same single source of truth.</p></div>"
},
{
"doc": "INSTANCES",
"html": "<span class='eyebrow'>WHERE IT LIVES</span><h1>Your Instance &amp; Environments</h1><p class='lead'>Each customer gets their own private copy of ServiceNow, called an instance.</p><p>An instance is a dedicated, walled-off version of the platform with your data and your customizations. Most organizations run several instances so they can build and test safely before changes reach real users.</p><h2>The Typical Lineup</h2><table><tr><th>Environment</th><th>Purpose</th></tr><tr><td>Development</td><td>Where builders create and change things.</td></tr><tr><td>Test</td><td>Where changes are verified before release.</td></tr><tr><td>Production</td><td>The live system real users depend on.</td></tr></table><p>Development and test are called <strong>sub-production</strong> instances. To keep test realistic, teams make a <strong>clone</strong> &mdash; a fresh copy of production data &mdash; so testing happens against real-world conditions.</p><div class='callout'><p><strong>Key:</strong> Build in dev, prove it in test, release to production &mdash; never experiment on the live system.</p></div>"
},
{
"doc": "RELEASES",
"html": "<span class='eyebrow'>STAYING CURRENT</span><h1>Releases &amp; Upgrades</h1><p class='lead'>ServiceNow ships major upgrades on a predictable schedule, each with a city name.</p><p>Twice a year a new family release arrives &mdash; named alphabetically after cities (for example, Washington, Xanadu, Yokohama). Each one adds features and improvements that every customer eventually adopts.</p><h2>How Support Works</h2><p>ServiceNow supports the current release and the one before it &mdash; a policy called <strong>N-1</strong>. This gives customers a window to test and upgrade on their own timeline without falling out of support.</p><div class='metric-row'><div class='m'><div class='v'>2x</div><div class='l'>major releases per year</div></div><div class='m'><div class='v'>N-1</div><div class='l'>supported versions</div></div><div class='m'><div class='v'>A&ndash;Z</div><div class='l'>city naming order</div></div></div><div class='callout'><p><strong>Key:</strong> Upgrades are expected and routine &mdash; staying within N-1 keeps you supported and secure.</p></div>"
},
{
"doc": "DATA MODEL",
"html": "<span class='eyebrow'>HOW DATA IS STORED</span><h1>Tables, Records &amp; Fields</h1><p class='lead'>Everything in ServiceNow is stored as records in tables &mdash; like a giant set of smart spreadsheets.</p><h2>The Three Building Blocks</h2><ul><li><strong>Table.</strong> A collection of similar things, such as all incidents or all employees.</li><li><strong>Record.</strong> One single item in a table &mdash; one incident, one person, one laptop.</li><li><strong>Field.</strong> A single piece of information on a record, such as its status or who it is assigned to.</li></ul><p>Tables can build on one another. A specialized table can inherit everything from a general one and add its own details &mdash; so common features are defined once and reused.</p><div class='grid2'><div class='kcard'><div class='kt'>RELATED RECORDS</div><div class='kd'>A field can point to another record, linking a request to the person who made it.</div></div><div class='kcard'><div class='kt'>ONE TRUTH</div><div class='kd'>Update a record once and every place that references it reflects the change.</div></div></div><div class='callout'><p><strong>Key:</strong> Tables hold records, records hold fields &mdash; that simple pattern underlies the entire platform.</p></div>"
},
{
"doc": "THE INTERFACE",
"html": "<span class='eyebrow'>USING IT</span><h1>Forms, Lists &amp; the UI</h1><p class='lead'>People mostly interact with ServiceNow through two simple views: lists and forms.</p><h2>Lists and Forms</h2><p>A <strong>list</strong> shows many records at once, like rows in a table &mdash; handy for scanning, sorting, and filtering. A <strong>form</strong> shows one record in detail, with all its fields laid out for reading and editing.</p><div class='grid2'><div class='kcard'><div class='kt'>LIST VIEW</div><div class='kd'>See and filter many records. Click any row to open it.</div></div><div class='kcard'><div class='kt'>FORM VIEW</div><div class='kd'>Work on a single record &mdash; fill in fields, add notes, save.</div></div></div><p>Forms guide users with required fields, helpful defaults, and sections that group related information. Most people never need to think about the tables underneath &mdash; they just open a form and do their work.</p><div class='callout'><p><strong>Key:</strong> Lists are for finding; forms are for doing. Together they cover almost all daily use.</p></div>"
},
{
"doc": "NAVIGATION",
"html": "<span class='eyebrow'>FINDING YOUR WAY</span><h1>Navigator &amp; Workspaces</h1><p class='lead'>ServiceNow offers different front doors depending on the kind of work you do.</p><h2>Two Ways In</h2><p>The classic <strong>Navigator</strong> is a searchable menu on the left that opens any list or page &mdash; flexible and powerful for builders and power users.</p><p><strong>Workspaces</strong> are modern, focused screens built for a specific job. They put everything an agent needs &mdash; lists, details, and tools &mdash; on one streamlined page.</p><div class='grid2'><div class='kcard'><div class='kt'>NAVIGATOR</div><div class='kd'>The all-purpose menu to reach any part of the platform quickly.</div></div><div class='kcard'><div class='kt'>SERVICE OPERATIONS WORKSPACE</div><div class='kd'>A unified screen for IT operations teams to triage, investigate, and resolve issues in one view.</div></div></div><div class='callout'><p><strong>Key:</strong> Navigator gives you everything; workspaces give you exactly what one role needs.</p></div>"
},
{
"doc": "ACCESS CONTROL",
"html": "<span class='eyebrow'>WHO CAN DO WHAT</span><h1>Roles, Groups &amp; Access</h1><p class='lead'>ServiceNow carefully controls who can see and change each piece of information.</p><h2>The Pieces</h2><ul><li><strong>Role.</strong> A label that grants a set of permissions, such as the ability to manage incidents.</li><li><strong>Group.</strong> A collection of people, often a team, that can be assigned roles all at once.</li><li><strong>ACL.</strong> An access control rule that decides, record by record and field by field, who may read or write.</li></ul><p>Access Control Lists (ACLs) are the gatekeepers. Before showing or saving anything, the platform checks the relevant ACL to confirm the user is allowed.</p><div class='callout'><p><strong>Key:</strong> Give people roles through groups, and let ACLs enforce the fine-grained rules automatically.</p></div><p>This layered approach means sensitive data stays protected without anyone having to police it by hand.</p>"
},
{
"doc": "AUTOMATION",
"html": "<span class='eyebrow'>MAKING IT SMART</span><h1>The Automation Primitives</h1><p class='lead'>Small, focused rules make ServiceNow react intelligently as people work.</p><h2>Three Workhorses</h2><div class='grid2'><div class='kcard'><div class='kt'>BUSINESS RULES</div><div class='kd'>Run on the server when records are saved &mdash; to validate, calculate, or trigger follow-on actions.</div></div><div class='kcard'><div class='kt'>CLIENT SCRIPTS</div><div class='kd'>Run in the browser as a user fills out a form, reacting instantly to what they type.</div></div><div class='kcard'><div class='kt'>UI POLICIES</div><div class='kd'>Show, hide, or require fields on a form based on conditions &mdash; no coding needed.</div></div><div class='kcard'><div class='kt'>WHY IT MATTERS</div><div class='kd'>Together they keep data clean and guide users without anyone watching over their shoulder.</div></div></div><div class='callout'><p><strong>Key:</strong> Business rules act behind the scenes; client scripts and UI policies shape the form in front of you.</p></div>"
},
{
"doc": "LIFECYCLE",
"html": "<span class='eyebrow'>WORK IN MOTION</span><h1>Notifications, SLAs &amp; States</h1><p class='lead'>Every record moves through a lifecycle, and ServiceNow keeps that journey on track.</p><h2>How Work Progresses</h2><p>Records carry a <strong>state</strong> &mdash; such as New, In Progress, or Closed &mdash; that shows where they are. Flows and rules move work to the right person at each step.</p><ul><li><strong>Notifications.</strong> Automatic emails or alerts tell people when something needs their attention.</li><li><strong>SLAs.</strong> Service Level Agreements set time targets &mdash; like resolving an issue within four hours &mdash; and track whether they are met.</li></ul><div class='metric-row'><div class='m'><div class='v'>States</div><div class='l'>where work stands</div></div><div class='m'><div class='v'>SLAs</div><div class='l'>time commitments</div></div><div class='m'><div class='v'>Alerts</div><div class='l'>who to nudge</div></div></div><div class='callout'><p><strong>Key:</strong> States show progress, SLAs hold it to a clock, and notifications keep everyone moving.</p></div>"
},
{
"doc": "PACKAGING",
"html": "<span class='eyebrow'>HOW IT'S BUNDLED</span><h1>Scoped Apps &amp; the Store</h1><p class='lead'>Functionality is packaged into self-contained applications that can be installed cleanly.</p><h2>Scoped Applications</h2><p>A <strong>scoped app</strong> is a bundle of tables, rules, and screens that lives in its own namespace. Because it is walled off, it cannot accidentally interfere with other apps on the same instance &mdash; making it safe to install, update, or remove.</p><div class='grid2'><div class='kcard'><div class='kt'>THE STORE</div><div class='kd'>A marketplace of ready-made apps from ServiceNow and partners that install onto your instance.</div></div><div class='kcard'><div class='kt'>BUILD YOUR OWN</div><div class='kd'>Organizations create custom scoped apps for needs unique to their business.</div></div></div><p>This packaging model is why the platform scales: capabilities arrive as tidy units instead of tangled custom code.</p><div class='callout'><p><strong>Key:</strong> Scoped apps keep features isolated and safe; the Store makes proven ones a click away.</p></div>"
},
{
"doc": "CMDB",
"html": "<span class='eyebrow'>SYSTEM OF RECORD</span><h1>The CMDB</h1><p class='lead'>The Configuration Management Database is the single, trusted inventory of everything an organization owns and runs in IT &mdash; the master list that everything else trusts.</p><p>Think of it as the company's IT census. Every server, laptop, application, database, network switch, and cloud resource is recorded once, in one place, with its key details kept current. When teams need to know what they have, who owns it, and how it connects, they look here.</p><div class='callout'><p><strong>Key:</strong> Without a CMDB, IT runs on spreadsheets and tribal knowledge. With one, every other ServiceNow capability &mdash; incidents, change, security, cost &mdash; gets accurate, shared facts.</p></div><h2>Why it is the foundation</h2><ul><li><strong>Shared truth.</strong> Support, security, and operations all read the same data.</li><li><strong>Impact awareness.</strong> Before a change, you can see what it might break.</li><li><strong>Accountability.</strong> Every item has an owner and a lifecycle.</li></ul>"
},
{
"doc": "CIs",
"html": "<span class='eyebrow'>BUILDING BLOCKS</span><h1>Configuration Items &amp; Classes</h1><p class='lead'>A Configuration Item, or CI, is a single thing the CMDB tracks &mdash; one server, one app, one database. CI classes group similar items so each kind stores the right details.</p><p>Every record in the CMDB is a CI. A class is the template that decides which fields a CI carries: a server CI tracks CPU and memory; a software CI tracks version and publisher. Classes are arranged in a family tree, from broad to specific.</p><div class='grid2'><div class='kcard'><div class='kt'>CI</div><div class='kd'>One tracked thing, with an owner, status, and identifying details.</div></div><div class='kcard'><div class='kt'>CLASS</div><div class='kd'>The category that defines what fields a CI of that type holds.</div></div></div><h3>From general to specific</h3><ul><li><strong>Hardware.</strong> A broad parent class for physical gear.</li><li><strong>Server.</strong> A child of hardware, with server-specific fields.</li><li><strong>Linux Server.</strong> A more specific child still, inheriting all the above.</li></ul><div class='callout'><p><strong>Key:</strong> Right class, right fields, no duplicates &mdash; that is a healthy CI.</p></div>"
},
{
"doc": "RELATIONSHIPS",
"html": "<span class='eyebrow'>CONNECTIONS</span><h1>Relationships &amp; Dependency Views</h1><p class='lead'>CIs rarely stand alone. Relationships record how items depend on one another &mdash; an app runs on a server, which uses a database, which sits on storage.</p><p>A list of parts is useful, but the real value is knowing how the parts connect. Relationships turn a flat inventory into a living map. A dependency view draws that map visually, so anyone can trace a chain from a customer-facing service down to the hardware beneath it.</p><h3>Why connections matter</h3><ul><li><strong>Impact analysis.</strong> Patching one server? See every app and service that rides on it first.</li><li><strong>Faster root cause.</strong> When a service breaks, follow the relationships down to the failing part.</li><li><strong>Smarter change.</strong> Plan maintenance windows around what is actually affected.</li></ul><div class='callout'><p><strong>Key:</strong> An item without relationships is an orphan &mdash; data with no story. Relationships are what make a CMDB worth having.</p></div>"
},
{
"doc": "CSDM",
"html": "<span class='eyebrow'>THE BLUEPRINT</span><h1>CSDM Overview</h1><p class='lead'>The Common Service Data Model is ServiceNow's recommended standard for how to organize your CMDB &mdash; an agreed-upon blueprint so everyone models data the same way.</p><p>Left to their own devices, teams name and structure things differently, and the data becomes a mess. CSDM is a shared rulebook: it says which classes to use, how services should be defined, and how everything links together. Follow it, and your CMDB stays consistent, reportable, and ready for advanced features.</p><div class='callout'><p><strong>Key:</strong> CSDM is not a product you install &mdash; it is a framework, a set of best practices for arranging the data you already collect.</p></div><h3>What adopting it gives you</h3><ul><li><strong>Consistency.</strong> Everyone speaks the same data language.</li><li><strong>Service focus.</strong> Technology is tied to the business services it supports.</li><li><strong>Future-ready.</strong> Cost, risk, and AI features expect CSDM-shaped data.</li></ul>"
},
{
"doc": "CSDM DOMAINS",
"html": "<span class='eyebrow'>FOUR PARTS</span><h1>CSDM's Four Domains</h1><p class='lead'>CSDM organizes data into four domains that move from raw building blocks to the services customers actually buy and use.</p><div class='grid2'><div class='kcard'><div class='kt'>FOUNDATION</div><div class='kd'>The basics everything else needs: locations, companies, people, and groups.</div></div><div class='kcard'><div class='kt'>DESIGN</div><div class='kd'>How services are planned and defined before they go live &mdash; the service portfolio.</div></div><div class='kcard'><div class='kt'>MANAGE TECHNICAL</div><div class='kd'>The real running technology: servers, apps, and the technical services IT operates.</div></div><div class='kcard'><div class='kt'>SELL / CONSUME</div><div class='kd'>The business and customer-facing services people actually request and pay for.</div></div></div><div class='callout'><p><strong>Key:</strong> Read the domains left to right &mdash; foundation supports design, design becomes managed technology, which is sold and consumed as services.</p></div>"
},
{
"doc": "CMDB HEALTH",
"html": "<span class='eyebrow'>DATA QUALITY</span><h1>CMDB Health</h1><p class='lead'>A CMDB is only as useful as it is trustworthy. CMDB Health measures data quality across three dimensions so you know whether to rely on what it says.</p><div class='metric-row'><div class='m'><div class='v'>1</div><div class='l'>Correctness</div></div><div class='m'><div class='v'>2</div><div class='l'>Completeness</div></div><div class='m'><div class='v'>3</div><div class='l'>Compliance</div></div></div><ul><li><strong>Correctness.</strong> Is the data accurate and free of duplicate records for the same thing?</li><li><strong>Completeness.</strong> Are the required fields actually filled in, not left blank?</li><li><strong>Compliance.</strong> Does the data follow the standards, like CSDM, the organization set?</li></ul><div class='callout'><p><strong>Key:</strong> Bad data is worse than no data &mdash; it leads teams to wrong decisions with confidence. Health dashboards score these dimensions so owners can fix the weakest spots first.</p></div>"
},
{
"doc": "DISCOVERY",
"html": "<span class='eyebrow'>AUTO-INVENTORY</span><h1>Discovery</h1><p class='lead'>Discovery is how ServiceNow finds out what is actually on the network and records it &mdash; automatically &mdash; so the CMDB reflects reality instead of guesswork.</p><p>Rather than asking people to enter every device by hand, Discovery scans the network, identifies each device, logs in safely to read its details, and writes accurate CIs into the CMDB. It runs on a schedule, so the inventory stays current as things change.</p><h3>How it works, in plain steps</h3><ul><li><strong>Scan.</strong> Look across a range of network addresses for live devices.</li><li><strong>Classify.</strong> Figure out what each one is &mdash; a Windows server, a switch, a database.</li><li><strong>Probe.</strong> Gather details: software installed, configuration, running services.</li><li><strong>Record.</strong> Create or update the matching CI, avoiding duplicates.</li></ul><div class='callout'><p><strong>Key:</strong> Discovery is agentless &mdash; it does not require software installed on every machine. It reaches out securely through a helper called the MID Server.</p></div>"
},
{
"doc": "MID SERVER",
"html": "<span class='eyebrow'>SECURE BRIDGE</span><h1>The MID Server</h1><p class='lead'>The MID Server is a small piece of software that runs inside your own network and acts as a secure bridge between ServiceNow's cloud and your internal systems.</p><p>ServiceNow lives in the cloud, but your servers and devices live behind your firewall. The MID Server &mdash; Management, Instrumentation, and Discovery &mdash; sits in the middle. ServiceNow hands it work to do, and it carries that work out locally, then sends results back.</p><h3>Why it matters</h3><ul><li><strong>Safe by design.</strong> The MID Server reaches out to ServiceNow; you never have to open your firewall inward.</li><li><strong>Local muscle.</strong> It does the scanning, probing, and integrating from inside the network where the devices are.</li><li><strong>Agentless enabler.</strong> It lets Discovery work without installing software on every machine.</li></ul><div class='callout'><p><strong>Key:</strong> No MID Server, no Discovery, Service Mapping, or most integrations &mdash; it is the trusted hands inside your network.</p></div>"
},
{
"doc": "SERVICE MAPPING",
"html": "<span class='eyebrow'>THE SERVICE MAP</span><h1>Service Mapping</h1><p class='lead'>Service Mapping builds a top-down picture of how a business service is delivered &mdash; tracing it from the front door all the way down to every server and database that powers it.</p><p>Discovery finds the parts; Service Mapping shows how those parts come together to deliver something people use, like an online checkout or an employee portal. It starts at an entry point, follows the actual traffic, and draws the complete map of supporting CIs and their relationships.</p><h3>What you gain</h3><ul><li><strong>Service-level visibility.</strong> See the whole service, not just scattered components.</li><li><strong>Precise impact.</strong> Know exactly which service a failing component affects.</li><li><strong>Living maps.</strong> The map updates as the environment changes.</li></ul><div class='callout'><p><strong>Key:</strong> Discovery answers what do we have; Service Mapping answers how does this service actually work and what holds it up.</p></div>"
},
{
"doc": "EVENT MGMT",
"html": "<span class='eyebrow'>SIGNAL FROM NOISE</span><h1>Event Management</h1><p class='lead'>Monitoring tools generate a flood of alerts. Event Management filters, groups, and prioritizes that noise into a short list of alerts worth acting on.</p><p>A large environment can throw off thousands of raw events an hour &mdash; most of them duplicates, blips, or symptoms of one underlying problem. Event Management collects events from many tools, removes the noise, and bundles related ones into a single meaningful alert tied to the affected service.</p><h3>From flood to focus</h3><ul><li><strong>Collect.</strong> Pull events in from monitoring tools across the environment.</li><li><strong>Deduplicate.</strong> Collapse repeats so one issue is one alert.</li><li><strong>Correlate.</strong> Group related events that point to the same root cause.</li><li><strong>Act.</strong> Raise a prioritized alert &mdash; and open an incident automatically if needed.</li></ul><div class='callout'><p><strong>Key:</strong> The goal is fewer, smarter alerts &mdash; so teams chase real problems, not noise.</p></div>"
},
{
"doc": "AIOPS",
"html": "<span class='eyebrow'>INTELLIGENT OPS</span><h1>Health Log Analytics &amp; AIOps</h1><p class='lead'>AIOps applies machine learning to operations data, spotting trouble before it becomes an outage. Health Log Analytics reads system logs to learn what normal looks like &mdash; and flags what is not.</p><p>Traditional monitoring waits for something to cross a fixed threshold. AIOps is smarter: it studies patterns over time, learns each system's normal rhythm, and surfaces unusual behavior early &mdash; often before users notice anything.</p><h3>What it brings</h3><ul><li><strong>Anomaly detection.</strong> Learns normal, then flags meaningful deviations automatically.</li><li><strong>Log insight.</strong> Health Log Analytics scans huge volumes of logs to find early warning signs.</li><li><strong>Root-cause hints.</strong> Connects related signals to point at the likely cause faster.</li></ul><div class='callout'><p><strong>Key:</strong> AIOps shifts operations from reacting after the fact to predicting and preventing &mdash; using the CMDB and service maps to understand impact.</p></div>"
},
{
"doc": "CLOUD VISIBILITY",
"html": "<span class='eyebrow'>MULTI-CLOUD</span><h1>Cloud &amp; Container Visibility</h1><p class='lead'>Modern IT runs across several cloud providers and fast-changing containers. ServiceNow extends Discovery to see all of it and keep the CMDB current with the Service Graph Connector.</p><p>Cloud resources spin up and disappear in minutes, and containers can come and go in seconds &mdash; far too fast for manual tracking. ServiceNow connects directly to cloud platforms to inventory what is running, and uses Service Graph Connectors to pull trusted data from outside tools straight into the CMDB.</p><div class='grid2'><div class='kcard'><div class='kt'>MULTI-CLOUD</div><div class='kd'>One inventory spanning multiple public cloud providers, no silos.</div></div><div class='kcard'><div class='kt'>CONTAINERS</div><div class='kd'>Visibility into short-lived, fast-moving container workloads.</div></div></div><div class='callout'><p><strong>Key:</strong> The Service Graph is the modern, governed pipeline for getting accurate data into the CMDB &mdash; so even ephemeral cloud resources show up where decisions get made.</p></div>"
},
{
"doc": "ITSM",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>IT Service Management</h1><p class='lead'>ITSM is the discipline of running IT like a service business &mdash; with front doors, queues, and promises &mdash; instead of a pile of cables and ad-hoc favors. It is where ServiceNow began.</p><p>Imagine a company where every laptop problem, password reset, and new-hire setup goes through one organized front desk. That front desk takes the request, routes it to the right person, tracks it to completion, and keeps a record. That is ITSM.</p><div class='callout'><p><strong>Key:</strong> ITSM treats IT support as a set of repeatable services with clear ownership, timelines, and quality measures &mdash; not random firefighting.</p></div><ul><li><strong>Why here.</strong> ServiceNow was founded to fix messy IT help desks, so ITSM is its original and strongest home.</li><li><strong>Built on ITIL.</strong> Most ITSM follows ITIL, a widely used playbook of best practices.</li><li><strong>One platform.</strong> Incidents, requests, changes, and knowledge all live in one connected system.</li></ul>"
},
{
"doc": "INCIDENT",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>Incident Management</h1><p class='lead'>An incident is anything that breaks or slows a service users depend on. The single goal of incident management is to restore normal service as fast as possible &mdash; even with a temporary fix.</p><p>If email is down, the job is not to find why it broke. The job is to get email working again. Investigating the deeper cause comes later, and it has its own process.</p><div class='grid2'><div class='kcard'><div class='kt'>RESTORE</div><div class='kd'>Get the user working again quickly, by any safe means.</div></div><div class='kcard'><div class='kt'>TRACK</div><div class='kd'>Log it, assign a priority, and keep the user informed.</div></div></div><ul><li><strong>Priority.</strong> Set by combining impact (how many affected) and urgency (how time-sensitive).</li><li><strong>Workaround.</strong> A temporary fix that restores service while the real cause waits.</li></ul><div class='callout'><p><strong>Key:</strong> Speed of restoration is the measure of success &mdash; not elegance of the fix.</p></div>"
},
{
"doc": "MAJOR INCIDENT",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>Major Incidents &amp; Swarming</h1><p class='lead'>A major incident is a high-impact outage &mdash; a store-wide checkout failure, a hospital records system down. It needs a faster, bigger, more coordinated response than an everyday ticket.</p><p>Instead of passing a ticket from team to team, the organization swarms: it pulls the right experts into one virtual room at the same time to solve it together, in real time.</p><ul><li><strong>Major incident manager.</strong> A single coordinator who runs the response and shields the experts from chaos.</li><li><strong>Swarming.</strong> Network, app, and database specialists collaborate live instead of in a relay race.</li><li><strong>War room.</strong> A bridge or chat channel where status, decisions, and updates are centralized.</li><li><strong>Communication.</strong> Frequent, plain updates go to leadership and affected users.</li></ul><div class='callout'><p><strong>Key:</strong> Major incidents trade the orderly queue for all-hands speed, with one person owning the outcome.</p></div>"
},
{
"doc": "PROBLEM",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>Problem Management</h1><p class='lead'>If incidents are fires, problem management is fire prevention. Its job is to find the underlying cause behind recurring incidents so they stop happening.</p><p>When the same outage returns every Monday, incident management keeps putting it out. Problem management asks why &mdash; and fixes the root so the fire never restarts.</p><div class='grid2'><div class='kcard'><div class='kt'>ROOT CAUSE</div><div class='kd'>The true underlying reason incidents keep occurring.</div></div><div class='kcard'><div class='kt'>KNOWN ERROR</div><div class='kd'>A documented cause with a proven workaround on file.</div></div></div><ul><li><strong>Reactive.</strong> Investigate after repeated incidents reveal a pattern.</li><li><strong>Proactive.</strong> Spot weak points and fix them before they cause outages.</li><li><strong>Known error database.</strong> A reference so support resolves repeat issues instantly.</li></ul><div class='callout'><p><strong>Key:</strong> Incident management restores service; problem management removes the cause for good.</p></div>"
},
{
"doc": "CHANGE",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>Change Management</h1><p class='lead'>Most outages are caused by changes &mdash; an upgrade, a new server, a config tweak. Change management makes change safe by reviewing, approving, and scheduling it before it happens.</p><p>It is the seatbelt for IT: it does not stop you from moving, it stops a small move from becoming a crash.</p><table><tr><th>Type</th><th>What it is</th></tr><tr><td>Standard</td><td>Low-risk, pre-approved, routine (e.g. a known password reset job)</td></tr><tr><td>Normal</td><td>Needs assessment and approval before scheduling</td></tr><tr><td>Emergency</td><td>Urgent fix for an outage; fast-tracked approval</td></tr></table><ul><li><strong>Risk assessment.</strong> Weigh likelihood and impact before saying yes.</li><li><strong>Rollback plan.</strong> A documented way to undo the change if it fails.</li></ul><div class='callout'><p><strong>Key:</strong> Change management balances progress against risk &mdash; move forward, but with a safety net.</p></div>"
},
{
"doc": "CAB",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>The CAB &amp; Change Calendar</h1><p class='lead'>The Change Advisory Board (CAB) is the group that reviews and approves higher-risk changes. The change calendar shows everyone what is scheduled and when.</p><p>Think of the CAB as a flight control tower: it makes sure two risky changes do not take off at once and collide.</p><ul><li><strong>CAB members.</strong> Representatives from IT, business, and security who assess risk together.</li><li><strong>Change calendar.</strong> A shared schedule that prevents conflicts and surprises.</li><li><strong>Blackout window.</strong> A protected period (like holiday sales) when no risky changes are allowed.</li><li><strong>Maintenance window.</strong> A planned time set aside for safe, expected changes.</li></ul><div class='callout'><p><strong>Key:</strong> The CAB approves; the calendar coordinates &mdash; together they keep changes from colliding.</p></div>"
},
{
"doc": "REQUEST",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>Request Management &amp; the Catalog</h1><p class='lead'>A request is asking for something you are entitled to &mdash; a new laptop, software access, a phone. The Service Catalog is the menu of those somethings, like an online store for the workplace.</p><p>Unlike an incident, nothing is broken. The user simply wants something delivered, and the catalog turns that into an orderly, trackable order.</p><div class='grid2'><div class='kcard'><div class='kt'>CATALOG ITEM</div><div class='kd'>A single orderable thing, with a form and clear cost.</div></div><div class='kcard'><div class='kt'>FULFILLMENT</div><div class='kd'>The behind-the-scenes steps that deliver the order.</div></div></div><ul><li><strong>Request vs. incident.</strong> Request = I want something; incident = something is broken.</li><li><strong>Workflow.</strong> Approvals and tasks fire automatically once you submit.</li></ul><div class='callout'><p><strong>Key:</strong> The catalog turns vague emails into clean, approved, trackable orders.</p></div>"
},
{
"doc": "KNOWLEDGE",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>Knowledge Management</h1><p class='lead'>Knowledge management captures what the team learns &mdash; how-tos, fixes, answers &mdash; so it can be reused instead of rediscovered. The dream: users help themselves.</p><p>When a good article exists, a user finds the answer and never files a ticket. That avoided ticket is called deflection, and it saves everyone time.</p><ul><li><strong>Knowledge article.</strong> A clear, searchable write-up of a solution or process.</li><li><strong>KCS.</strong> Knowledge-Centered Service &mdash; capture knowledge as you solve tickets, not afterward.</li><li><strong>Self-service deflection.</strong> Users solving their own issues via articles, reducing ticket volume.</li><li><strong>Feedback loop.</strong> Readers flag stale or unclear articles so they stay accurate.</li></ul><div class='callout'><p><strong>Key:</strong> The cheapest, fastest ticket is the one a good article prevented from ever being filed.</p></div>"
},
{
"doc": "SLM",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>Service Level Management</h1><p class='lead'>Service level management is about promises and proof. It sets clear targets for how fast and how well services are delivered &mdash; then measures whether those targets are met.</p><p>A Service Level Agreement (SLA) is a promise to the customer: resolve high-priority issues within four hours, for example. The system tracks the clock automatically.</p><table><tr><th>Term</th><th>Promise between</th></tr><tr><td>SLA</td><td>IT and the customer or business</td></tr><tr><td>OLA</td><td>Internal teams supporting that SLA</td></tr><tr><td>Underpinning contract</td><td>IT and an outside vendor</td></tr></table><ul><li><strong>Breach.</strong> When a target is missed &mdash; tracked and reported.</li><li><strong>Chained promises.</strong> An SLA only holds if the OLAs and contracts beneath it do.</li></ul><div class='callout'><p><strong>Key:</strong> SLAs are public promises; OLAs and underpinning contracts are the internal promises that keep them.</p></div>"
},
{
"doc": "PORTAL",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>The Service Portal &amp; Self-Service</h1><p class='lead'>The Service Portal is the friendly front door &mdash; a website where employees search answers, order from the catalog, report issues, and check status, all in one place.</p><p>It hides the complex system behind a clean, consumer-grade page. Most people never see the engine; they just see a search bar and a few clear buttons.</p><div class='grid2'><div class='kcard'><div class='kt'>SEARCH</div><div class='kd'>One bar that surfaces articles, items, and help.</div></div><div class='kcard'><div class='kt'>MY STUFF</div><div class='kd'>Track open tickets and orders without calling anyone.</div></div></div><ul><li><strong>Self-service.</strong> Users get help any hour without waiting for a human.</li><li><strong>Beyond IT.</strong> The same portal can serve HR, facilities, and more (Employee Service).</li></ul><div class='callout'><p><strong>Key:</strong> A good portal makes the powerful platform feel as simple as a shopping site.</p></div>"
},
{
"doc": "WALK-UP",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>Walk-up &amp; Omnichannel</h1><p class='lead'>Sometimes people want a human. The walk-up experience is the in-person tech bar; omnichannel means support meets users wherever they are &mdash; chat, phone, email, portal, or desk.</p><p>The point is consistency: whichever door you use, your history follows you, so you never have to repeat the whole story.</p><ul><li><strong>Walk-up.</strong> A staffed help desk where users book a slot or join a queue in person.</li><li><strong>Omnichannel.</strong> Many ways in &mdash; chat, phone, email, portal &mdash; feeding one shared record.</li><li><strong>Virtual agent.</strong> A chatbot that handles common questions instantly, day or night.</li><li><strong>Seamless handoff.</strong> When the bot is stuck, a human takes over with full context.</li></ul><div class='callout'><p><strong>Key:</strong> Meet users on their channel of choice while keeping one continuous record behind the scenes.</p></div>"
},
{
"doc": "METRICS",
"html": "<span class='eyebrow'>ITSM CLUSTER</span><h1>ITSM Metrics That Matter</h1><p class='lead'>You cannot improve what you do not measure. A few honest numbers tell you whether IT service is getting faster, cheaper, and more pleasant &mdash; or not.</p><div class='metric-row'><div class='m'><div class='v'>MTTR</div><div class='l'>mean time to resolve</div></div><div class='m'><div class='v'>FCR</div><div class='l'>first-call resolution</div></div><div class='m'><div class='v'>CSAT</div><div class='l'>customer satisfaction</div></div></div><ul><li><strong>MTTR.</strong> Average time to fix an issue &mdash; lower is better.</li><li><strong>First-call resolution.</strong> Share of issues solved on the first contact, with no bounce-around.</li><li><strong>CSAT.</strong> How happy users are, usually a quick post-ticket rating.</li></ul><div class='callout'><p><strong>Key:</strong> Speed (MTTR), efficiency (FCR), and happiness (CSAT) together tell the real story &mdash; chase all three, not just one.</p></div>"
},
{
"doc": "ITAM",
"html": "<span class='eyebrow'>IT ASSET MANAGEMENT</span><h1>Knowing What You Own</h1><p class='lead'>IT Asset Management (ITAM) is the discipline of tracking every piece of technology an organization buys, uses, and retires &mdash; from laptops to software licenses to cloud subscriptions &mdash; along with what each one costs.</p><p>Most companies own far more technology than anyone can name from memory. ITAM in ServiceNow keeps a single, trusted record of every asset, who has it, what was paid for it, and where it is in its useful life.</p><div class='grid2'><div class='kcard'><div class='kt'>HARDWARE</div><div class='kd'>Physical gear: laptops, phones, servers, monitors.</div></div><div class='kcard'><div class='kt'>SOFTWARE</div><div class='kd'>Programs and the licenses that permit their use.</div></div><div class='kcard'><div class='kt'>SAAS</div><div class='kd'>Cloud apps paid by subscription, not installed locally.</div></div><div class='kcard'><div class='kt'>CONTRACTS</div><div class='kd'>The agreements and money tied to all of the above.</div></div></div><div class='callout'><p><strong>Key:</strong> ITAM answers two simple questions executives constantly ask &mdash; what do we own, and what is it costing us?</p></div>"
},
{
"doc": "HAM LIFECYCLE",
"html": "<span class='eyebrow'>HARDWARE ASSET MANAGEMENT</span><h1>From Plan to Retire</h1><p class='lead'>Hardware Asset Management (HAM) follows a physical device through its entire life &mdash; a predictable journey ServiceNow calls the asset lifecycle.</p><p>Every laptop or server moves through the same stages. Tracking those stages prevents lost gear, surprise purchases, and equipment that lingers on the books long after it stopped working.</p><ul><li><strong>Plan.</strong> Decide what is needed and budget for it.</li><li><strong>Procure.</strong> Order and receive the hardware.</li><li><strong>Deploy.</strong> Assign it to a person or location and put it to work.</li><li><strong>Maintain.</strong> Service, repair, and track it in use.</li><li><strong>Retire.</strong> Wipe, recycle, or dispose of it securely.</li></ul><div class='callout'><p><strong>Key:</strong> Each stage has a defined owner and status, so nothing falls through the cracks &mdash; and no one buys a new device when a spare is sitting in a drawer.</p></div>"
},
{
"doc": "ASSET vs CI",
"html": "<span class='eyebrow'>CORE DISTINCTION</span><h1>Asset vs. Configuration Item</h1><p class='lead'>One of the most important ideas in ServiceNow is that a single laptop is tracked two different ways &mdash; as an asset and as a configuration item (CI) &mdash; for two different reasons.</p><p>The asset record is the financial and contractual view: cost, owner, warranty, purchase order. The CI is the operational and technical view: how it is configured and what it connects to.</p><table><tr><th>Asset</th><th>Configuration Item (CI)</th></tr><tr><td>Money &amp; ownership</td><td>Technology &amp; connections</td></tr><tr><td>Cost, contract, warranty</td><td>Specs, status, relationships</td></tr><tr><td>Lives in ITAM</td><td>Lives in the CMDB</td></tr></table><div class='callout'><p><strong>Key:</strong> Same physical device, two linked records. Finance cares about the asset; IT operations cares about the CI. ServiceNow keeps them in sync.</p></div>"
},
{
"doc": "STOCKROOMS",
"html": "<span class='eyebrow'>INVENTORY</span><h1>Stockrooms &amp; Transfer Orders</h1><p class='lead'>Before hardware reaches a person, it sits somewhere. ServiceNow models those locations as stockrooms and tracks every movement between them.</p><p>A stockroom is any place inventory is held &mdash; a warehouse, a supply closet, or a shipping dock. When equipment moves, a transfer order records the journey so the count is always accurate.</p><ul><li><strong>Stockroom.</strong> A defined location holding available inventory.</li><li><strong>Transfer order.</strong> A tracked request to move assets from one stockroom to another.</li><li><strong>Inventory count.</strong> The real-time tally of what is on hand and ready to deploy.</li></ul><div class='metric-row'><div class='m'><div class='v'>IN</div><div class='l'>received stock</div></div><div class='m'><div class='v'>OUT</div><div class='l'>deployed to users</div></div><div class='m'><div class='v'>0</div><div class='l'>surprises at audit</div></div></div><div class='callout'><p><strong>Key:</strong> Treating IT supply like a real warehouse means you always know what is available before you spend money buying more.</p></div>"
},
{
"doc": "SAM",
"html": "<span class='eyebrow'>SOFTWARE ASSET MANAGEMENT</span><h1>Managing What You Install</h1><p class='lead'>Software Asset Management (SAM) tracks the programs running across the company and the licenses that legally permit their use &mdash; making sure you have neither too few nor too many.</p><p>Software is bought as entitlements (the right to use it) but consumed as installs (where it actually runs). When those two numbers drift apart, the result is either legal risk or wasted money.</p><div class='grid2'><div class='kcard'><div class='kt'>ENTITLEMENTS</div><div class='kd'>The licenses you purchased &mdash; your right to use software.</div></div><div class='kcard'><div class='kt'>INSTALLS</div><div class='kd'>Where the software is actually running, discovered automatically.</div></div><div class='kcard'><div class='kt'>POSITION</div><div class='kd'>Entitlements minus installs &mdash; over or under licensed.</div></div><div class='kcard'><div class='kt'>OPTIMIZE</div><div class='kd'>Reclaim unused licenses and reassign them.</div></div></div><div class='callout'><p><strong>Key:</strong> SAM turns scattered software spend into a managed asset class with a clear compliance position.</p></div>"
},
{
"doc": "RECONCILIATION",
"html": "<span class='eyebrow'>LICENSE COMPLIANCE</span><h1>Reconciliation &amp; True-Ups</h1><p class='lead'>License reconciliation is the act of comparing what you are entitled to against what you have actually installed &mdash; the heart of staying compliant and cost-efficient.</p><p>ServiceNow gathers entitlements from contracts and installs from discovery, then calculates your license position automatically for each software publisher.</p><ul><li><strong>Compliant.</strong> Installs match or fall under your entitlements &mdash; no action needed.</li><li><strong>Over-licensed.</strong> You bought more than you use &mdash; an opportunity to cut cost at renewal.</li><li><strong>Under-licensed.</strong> You use more than you bought &mdash; a compliance gap to close.</li><li><strong>True-up.</strong> A purchase that buys the additional licenses needed to become compliant.</li></ul><div class='callout'><p><strong>Key:</strong> Catching gaps before the publisher does turns a feared audit into a routine, predictable check.</p></div>"
},
{
"doc": "SAAS",
"html": "<span class='eyebrow'>SAAS MANAGEMENT</span><h1>Taming Cloud Subscriptions</h1><p class='lead'>SaaS License Management tracks the cloud apps a company pays for by subscription &mdash; including the many that were bought without IT ever knowing.</p><p>Because anyone with a credit card can sign up for a cloud tool, SaaS spend sprawls quickly. ServiceNow surfaces this hidden usage and the money attached to it.</p><div class='grid2'><div class='kcard'><div class='kt'>SHADOW IT</div><div class='kd'>Apps bought outside IT, invisible until discovered.</div></div><div class='kcard'><div class='kt'>WASTE</div><div class='kd'>Paid seats no one has logged into in months.</div></div><div class='kcard'><div class='kt'>RENEWALS</div><div class='kd'>Upcoming contract dates flagged before they auto-renew.</div></div><div class='kcard'><div class='kt'>RIGHT-SIZE</div><div class='kd'>Match seats purchased to seats actually used.</div></div></div><div class='callout'><p><strong>Key:</strong> Reclaiming idle SaaS seats and catching auto-renewals early is one of the fastest ways to recover real budget.</p></div>"
},
{
"doc": "NORMALIZATION",
"html": "<span class='eyebrow'>DATA QUALITY</span><h1>Normalization &amp; Content Packs</h1><p class='lead'>Raw software data is messy &mdash; the same product can be discovered under a dozen different names. Normalization cleans it into one consistent, trustworthy record.</p><p>One application might appear as five different entries depending on version, edition, or how it was installed. Without cleanup, no count can be trusted.</p><ul><li><strong>Normalization.</strong> Mapping messy discovered names to one standard product, publisher, and version.</li><li><strong>Content pack.</strong> A regularly updated library of known publishers and products that powers that mapping.</li><li><strong>Publisher.</strong> The company that makes the software and sets its licensing rules.</li></ul><div class='metric-row'><div class='m'><div class='v'>MANY</div><div class='l'>raw names</div></div><div class='m'><div class='v'>&rarr;</div><div class='l'>normalized</div></div><div class='m'><div class='v'>ONE</div><div class='l'>clean product</div></div></div><div class='callout'><p><strong>Key:</strong> Clean data is the foundation. Reconciliation and reporting are only as accurate as the normalization beneath them.</p></div>"
},
{
"doc": "CONTRACTS",
"html": "<span class='eyebrow'>CONTRACT MANAGEMENT</span><h1>The Agreements Behind the Spend</h1><p class='lead'>Contract Management stores every agreement tied to your assets &mdash; leases, licenses, support, and warranties &mdash; in one place with the dates and dollars that matter.</p><p>Contracts are where the money and the obligations live. When they are scattered in inboxes and filing cabinets, renewals get missed and leverage is lost.</p><ul><li><strong>Terms.</strong> Start and end dates, costs, and what each party promised.</li><li><strong>Renewals.</strong> Automatic alerts before a contract expires or auto-renews.</li><li><strong>Linkage.</strong> Each contract connects to the assets and entitlements it covers.</li><li><strong>Obligations.</strong> Service levels and conditions you can hold a vendor to.</li></ul><div class='callout'><p><strong>Key:</strong> A contract you can find and act on before its deadline is a contract you can renegotiate &mdash; one you forgot is one you simply pay.</p></div>"
},
{
"doc": "S2P",
"html": "<span class='eyebrow'>SOURCING &amp; PROCUREMENT</span><h1>Source-to-Pay (S2P)</h1><p class='lead'>Source-to-Pay (S2P) is the full journey of buying something &mdash; from choosing a supplier all the way to paying the invoice &mdash; managed as one connected flow.</p><p>Procurement in ServiceNow turns scattered purchasing into a tracked process where every request, approval, order, and receipt is recorded.</p><div class='grid2'><div class='kcard'><div class='kt'>SOURCE</div><div class='kd'>Select the right supplier and negotiate terms.</div></div><div class='kcard'><div class='kt'>REQUEST</div><div class='kd'>Submit a purchase request with approvals.</div></div><div class='kcard'><div class='kt'>ORDER</div><div class='kd'>Issue a purchase order to the supplier.</div></div><div class='kcard'><div class='kt'>PAY</div><div class='kd'>Receive goods, match the invoice, and pay.</div></div></div><div class='callout'><p><strong>Key:</strong> When sourcing connects directly to asset records, every dollar spent has a clear paper trail from decision to delivery.</p></div>"
},
{
"doc": "VENDORS",
"html": "<span class='eyebrow'>SUPPLIER MANAGEMENT</span><h1>Vendors, Suppliers &amp; Risk</h1><p class='lead'>Vendor management keeps a clear picture of the companies you buy from &mdash; how well they perform, what you spend with them, and the risk they carry.</p><p>Every supplier is a relationship and a potential exposure. ServiceNow centralizes vendor records so performance and risk are managed, not guessed.</p><ul><li><strong>Performance.</strong> Are they delivering on time and meeting agreed service levels?</li><li><strong>Spend.</strong> How much flows to each vendor across all contracts?</li><li><strong>Risk.</strong> Financial, security, or compliance exposure a vendor introduces.</li><li><strong>Consolidation.</strong> Spotting overlap so you can negotiate from strength.</li></ul><div class='callout'><p><strong>Key:</strong> Knowing which vendors you depend on &mdash; and how risky each one is &mdash; turns supplier relationships from a liability into leverage.</p></div>"
},
{
"doc": "ITAM VALUE",
"html": "<span class='eyebrow'>BUSINESS VALUE</span><h1>Why ITAM Pays Off</h1><p class='lead'>Done well, IT Asset Management is not a cost &mdash; it pays for itself by avoiding waste, surviving audits, and giving leaders the truth about technology spend.</p><p>The payoff shows up in fewer surprise purchases, smaller true-up bills, and the confidence to face a vendor audit without scrambling.</p><div class='metric-row'><div class='m'><div class='v'>AVOID</div><div class='l'>buying what you already own</div></div><div class='m'><div class='v'>READY</div><div class='l'>for any audit</div></div><div class='m'><div class='v'>CLEAR</div><div class='l'>view of total spend</div></div></div><ul><li><strong>Cost avoidance.</strong> Reclaim unused licenses and redeploy idle hardware instead of buying new.</li><li><strong>Audit readiness.</strong> A defensible compliance position the moment a publisher asks.</li><li><strong>Better decisions.</strong> Trusted data on what you own, use, and pay for.</li></ul><div class='callout'><p><strong>Key:</strong> ITAM converts scattered technology spending into a managed, accountable asset base &mdash; the difference between guessing and knowing.</p></div>"
},
{
"doc": "HRSD",
"html": "<span class='eyebrow'>EMPLOYEE WORKFLOWS</span><h1>HR Service Delivery</h1><p class='lead'>HR Service Delivery (HRSD) turns the work of an HR department into organized, trackable services &mdash; so questions get answered, requests get fulfilled, and nothing falls through the cracks.</p><h2>What it solves</h2><p>Before HRSD, employee questions arrive by email, hallway, and phone, and HR juggles them in spreadsheets and inboxes. HRSD gives every request a record, an owner, and a deadline.</p><div class='grid2'><div class='kcard'><div class='kt'>ASK</div><div class='kd'>Employees submit questions or requests in one place instead of guessing who to email.</div></div><div class='kcard'><div class='kt'>ROUTE</div><div class='kd'>Each request goes automatically to the right HR specialist or team.</div></div><div class='kcard'><div class='kt'>RESOLVE</div><div class='kd'>HR tracks progress against service-level targets and closes the loop.</div></div><div class='kcard'><div class='kt'>IMPROVE</div><div class='kd'>Reports reveal what employees ask most, so HR can fix root causes.</div></div></div><div class='callout'><p><strong>Key:</strong> HRSD treats HR like a service desk &mdash; consistent, measurable, and friendly &mdash; rather than a black-box inbox.</p></div>"
},
{
"doc": "EMPLOYEE CENTER",
"html": "<span class='eyebrow'>EMPLOYEE WORKFLOWS</span><h1>The Employee Center</h1><p class='lead'>Employee Center is the single front door where staff go to get help &mdash; from HR, IT, facilities, and more &mdash; without needing to know which department owns the answer.</p><h2>One portal, many services</h2><p>Instead of separate websites for benefits, laptops, and travel, employees land on one branded page. A search box and clear categories guide them to articles, request forms, or a live agent.</p><ul><li><strong>Unified search.</strong> One box looks across knowledge articles and request catalogs from every department.</li><li><strong>Personalized.</strong> Content adapts to the employee&mdash;their location, role, and language.</li><li><strong>Self-service.</strong> Many needs are met instantly with an answer or a simple form.</li><li><strong>Status tracking.</strong> Employees see where their requests stand without re-asking.</li></ul><div class='callout'><p><strong>Key:</strong> Employee Center is the consumer-grade storefront for everything an employee might need at work.</p></div>"
},
{
"doc": "JOURNEYS",
"html": "<span class='eyebrow'>EMPLOYEE WORKFLOWS</span><h1>Employee Journeys</h1><p class='lead'>Major moments in an employee&rsquo;s career &mdash; joining, moving roles, and leaving &mdash; involve many teams at once. Journeys coordinate them all behind the scenes.</p><h2>Lifecycle events</h2><p>A new hire needs a laptop, accounts, payroll setup, training, and a desk. Each task lives in a different team. A journey orchestrates them so the right work fires at the right time.</p><div class='grid2'><div class='kcard'><div class='kt'>ONBOARDING</div><div class='kd'>Equipment, access, paperwork, and a guided first-week plan, ready on day one.</div></div><div class='kcard'><div class='kt'>TRANSITIONS</div><div class='kd'>Promotions, relocations, and team changes update access and tools automatically.</div></div><div class='kcard'><div class='kt'>OFFBOARDING</div><div class='kd'>Returning equipment and revoking access in an orderly, secure checklist.</div></div><div class='kcard'><div class='kt'>GUIDANCE</div><div class='kd'>The employee sees a clear to-do list and progress bar through each event.</div></div></div><div class='callout'><p><strong>Key:</strong> Journeys replace dozens of disconnected handoffs with one coordinated plan for life&rsquo;s big work moments.</p></div>"
},
{
"doc": "HR CASES",
"html": "<span class='eyebrow'>EMPLOYEE WORKFLOWS</span><h1>HR Cases &amp; Employee Relations</h1><p class='lead'>Some HR matters are routine; others are deeply personal or legally sensitive. The case system handles both, with extra walls around the confidential ones.</p><h2>From simple to sensitive</h2><p>A question about vacation balance and an investigation into a workplace concern are both &ldquo;cases,&rdquo; but they are not treated the same. Sensitive matters are locked down tightly.</p><ul><li><strong>Case.</strong> A tracked record of an employee request, with owner, history, and resolution.</li><li><strong>Employee Relations.</strong> A protected workspace for grievances, investigations, and disputes.</li><li><strong>Access control.</strong> Only authorized HR staff can open the most confidential records.</li><li><strong>Audit trail.</strong> Every action is logged, supporting fairness and compliance.</li></ul><div class='callout'><p><strong>Key:</strong> Strict permissions and audit logs let HR handle delicate matters with privacy and accountability.</p></div>"
},
{
"doc": "CSM",
