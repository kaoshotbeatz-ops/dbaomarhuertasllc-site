{doc:"SWAMP", html:`
  <span class="eyebrow">Executive Summary</span>
  <h1>A measurement tool for representation in leadership</h1>
  <p class="lead">SWAMP is a native, privacy-first analytics app that measures how the makeup of an organization&rsquo;s leadership compares to the population it draws from &mdash; turning a fuzzy debate into a clear, data-driven picture.</p>
  <p>The app calculates the share of a single demographic group within an organization&rsquo;s leadership and compares it to that group&rsquo;s roughly 29% share of the United States population, expressing the gap as a plain overrepresentation factor. It analyzes the leadership pipeline tier by tier, visualizes the result with native charts, and ships with a library of pre-loaded public benchmarks so the numbers always have context.</p>
  <div class="metric-row">
    <div class="m"><div class="v">iOS + Mac</div><div class="l">Universal SwiftUI app</div></div>
    <div class="m"><div class="v">On-device</div><div class="l">Local-first, runs offline</div></div>
    <div class="m"><div class="v">Free</div><div class="l">All 175 regions</div></div>
  </div>
  <div class="callout"><p>SWAMP is built for clarity and accountability. It is a reference and analytics utility &mdash; the methodology is open and the math is the same for everyone.</p></div>`},

{doc:"SWAMP", html:`
  <span class="eyebrow">What It Is</span>
  <h1>What SWAMP is</h1>
  <p>SWAMP is a native SwiftUI application for iPhone, iPad, and Mac that quantifies the representation gap between a group&rsquo;s presence in positions of power and its presence in the general population. It is designed as a calm, factual instrument &mdash; you enter or load leadership figures, and the app does the comparison work.</p>
  <h2>The core idea</h2>
  <p>If a group makes up about 29% of the population but holds a far larger share of senior leadership seats, that difference is meaningful and measurable. SWAMP expresses it as an <strong>overrepresentation factor</strong> &mdash; how many times the group&rsquo;s leadership share exceeds its population share.</p>
  <h2>Grounded in published methodology</h2>
  <p>The app&rsquo;s approach is inspired by widely published analyses of representation in American institutions. SWAMP packages that thinking into a repeatable, transparent calculation anyone can run on their own data.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Audience</div><div class="kd">Researchers, journalists, advocates, students, and curious citizens.</div></div>
    <div class="kcard"><div class="kt">Posture</div><div class="kd">Neutral measurement. The data speaks; the app simply does the arithmetic.</div></div>
  </div>`},

{doc:"SWAMP", html:`
  <span class="eyebrow">What It Does</span>
  <h1>Features</h1>
  <p>SWAMP turns raw leadership counts into a structured, comparable analysis with a few taps.</p>
  <h2>Core capabilities</h2>
  <ul>
    <li><strong>Overrepresentation factor</strong> &mdash; compares a group&rsquo;s leadership share against its ~29% population baseline.</li>
    <li><strong>Pipeline analysis</strong> &mdash; breaks representation down tier by tier, so you can see where the gap widens.</li>
    <li><strong>Native charts</strong> &mdash; SwiftUI Charts visualize shares, gaps, and pipeline tiers at a glance.</li>
    <li><strong>Public benchmarks</strong> &mdash; pre-loaded reference figures for Congress, Fortune 500 boards and CEOs, the Supreme Court, governors, and university presidents.</li>
    <li><strong>Seeded sample data</strong> &mdash; the app comes ready to explore on first launch.</li>
  </ul>
  <div class="callout"><p>Pre-loaded benchmarks give every custom analysis a frame of reference &mdash; your numbers next to the institutions everyone recognizes.</p></div>`},

{doc:"SWAMP", html:`
  <span class="eyebrow">How It Works</span>
  <h1>How SWAMP works</h1>
  <h2>Built natively for Apple platforms</h2>
  <p>SWAMP is a single universal SwiftUI app that runs natively on iPhone, iPad, and Mac. One codebase, one design language, full-resolution charts on every screen size.</p>
  <h2>Data model</h2>
  <p>Analyses are stored locally with SwiftData, Apple&rsquo;s modern persistence framework. Each record captures leadership counts, the population baseline, and the resulting factors so results are reproducible and easy to revisit.</p>
  <h2>The methodology</h2>
  <ul>
    <li>Establish the group&rsquo;s population share (the ~29% baseline).</li>
    <li>Count the group&rsquo;s presence within a leadership body.</li>
    <li>Divide leadership share by population share to get the overrepresentation factor.</li>
    <li>Repeat across pipeline tiers to show where representation concentrates.</li>
  </ul>
  <p>The math is deliberately simple and the same for every dataset &mdash; that is what makes the comparisons fair.</p>`},

{doc:"SWAMP", html:`
  <span class="eyebrow">Privacy &amp; Transparency</span>
  <h1>How we keep it safe</h1>
  <p class="lead">SWAMP is private by design. It does the work on your device and collects nothing about you.</p>
  <h2>On-device first</h2>
  <p>All analyses live locally in SwiftData. The app is built to run fully offline, so it works the same on a plane as it does at a desk. iCloud sync and Sign in with Apple are available as optional conveniences and are guarded so the app never depends on them.</p>
  <h2>No data collection</h2>
  <p>SWAMP&rsquo;s App Store privacy declaration is <strong>Data Not Collected</strong>. There are no trackers and no analytics pipelines harvesting your usage.</p>
  <h2>Transparent method</h2>
  <p>Accountability cuts both ways: the calculation is open and consistent. Anyone running the same inputs gets the same outputs, which is exactly what a credible measurement tool should do.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Storage</div><div class="kd">Local SwiftData; optional, guarded iCloud sync.</div></div>
    <div class="kcard"><div class="kt">Privacy</div><div class="kd">Data Not Collected. Runs fully offline.</div></div>
  </div>`},

{doc:"SWAMP", html:`

/* ===== engine ===== */
const book=document.getElementById('book');
const total=PAGES.length;
document.getElementById('tot').textContent=total;
const pageEls=[];
PAGES.forEach((pg,i)=>{
  const el=document.createElement('div');el.className='page';
  const front=document.createElement('div');front.className='face front';
  if(pg.cover) front.classList.add('cover');
  else if(pg.back) front.classList.add('back-cover');
  if(pg.cover||pg.back){
    if(pg.cover) front.innerHTML='<div class="c-aurora"></div>'+pg.html;
    else front.innerHTML='<div class="bc-aurora"></div>'+pg.html;
  } else {
    front.innerHTML =
      '<div class="p-head"><span class="ph-brand"><span class="ph-mark">OH</span>'+
      '<span class="ph-name">Omar Huertas LLC</span></span>'+
      '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div>'+
      '<div class="p-rule"></div>'+
      '<div class="p-body">'+pg.html+'</div>'+
      '<div class="p-foot"><span class="pf-c">&copy; 2026 Omar Huertas LLC</span>'+
      '<span class="pf-n">'+String(i+1).padStart(2,'0')+'</span></div>';
  }
  el.appendChild(front);
  book.appendChild(el);
  pageEls.push(el);
});

let cur=0; // index of the next page to be turned (pages 0..cur-1 are turned)
function render(){
  pageEls.forEach((el,i)=>{
    const turned = i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (total - i);
  });
  document.getElementById('cur').textContent=Math.min(cur+1,total);
  document.getElementById('progress').firstElementChild.style.width=((cur)/(total-1)*100)+'%';
  document.getElementById('prev').disabled=cur<=0;
  document.getElementById('next').disabled=cur>=total-1;
}
function next(){if(cur<total-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
book.addEventListener('click',e=>{const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
render();
</script>
