<html lang="en">
<head>

<title>CivicPulse — App White Paper — Omar Huertas LLC</title>

<style>
:root{
  --now:#62d84e;--now-d:#33b24a;--now-l:#a7f59c;
  --ink:#0a1418;--ink-2:#142329;--navy:#04222f;--navy-2:#0a3a4d;
  --muted:#5a6c75;--line:#e6ecef;--bg:#f4f8f9;
  --shadow:0 30px 70px rgba(4,34,47,.30);--radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--ink);
  background:
   radial-gradient(40% 50% at 85% 8%,rgba(98,216,78,.22),transparent 70%),
   radial-gradient(40% 60% at 12% 100%,rgba(51,178,74,.16),transparent 70%),
   linear-gradient(135deg,#04222f,#0a3a4d 60%,#071d28);
  background-attachment:fixed;min-height:100vh;display:flex;flex-direction:column;align-items:center;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
.grain{position:fixed;inset:0;z-index:0;opacity:.5;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:4px 4px}

/* top bar */
.topbar{position:relative;z-index:5;width:100%;display:flex;align-items:center;justify-content:space-between;
  gap:18px;padding:14px 22px;color:#eaf7f8}
.brand{display:flex;align-items:center;gap:11px}
.brand-mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--now));
  display:grid;place-items:center;color:#fff;font-size:13px;font-weight:900;box-shadow:0 8px 20px rgba(51,178,74,.35)}
.brand-lock{display:flex;flex-direction:column;line-height:1.12}
.brand-lock .b-name{font-weight:800;font-size:15px;letter-spacing:-.02em}
.brand-lock .b-sub{font-size:10px;font-weight:800;letter-spacing:.09em;color:var(--now-l);text-transform:uppercase}
.partner-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(98,216,78,.4);
  background:rgba(98,216,78,.10);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:800;color:#d6ffce}
.partner-pill .pp-dot{width:8px;height:8px;border-radius:50%;background:var(--now);box-shadow:0 0 0 3px rgba(98,216,78,.22)}
@media(max-width:640px){.partner-pill{display:none}}

/* progress */
#progress{position:relative;z-index:5;width:min(900px,92vw);height:4px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden;margin:2px 0 14px}
#progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--now-d),var(--now),var(--now-l));
  box-shadow:0 0 12px rgba(98,216,78,.6);transition:width .4s cubic-bezier(.2,.8,.2,1)}

/* book stage */
.stage{position:relative;z-index:5;perspective:2600px;width:min(900px,92vw);flex:1;display:flex;
  align-items:center;justify-content:center;padding-bottom:8px}
.book{position:relative;width:100%;aspect-ratio:1/1.414;max-height:78vh}
.page{position:absolute;inset:0;background:#fff;border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);transform-style:preserve-3d;transform-origin:left center;backface-visibility:hidden;
  transition:transform .85s cubic-bezier(.65,.02,.28,1);will-change:transform;display:flex;flex-direction:column}
.page.turned{transform:rotateY(-180deg)}
.page .face{position:absolute;inset:0;display:flex;flex-direction:column;backface-visibility:hidden;overflow:hidden}
.page .back{transform:rotateY(180deg);background:#fff}
/* stacking handled by JS via z-index */

/* page chrome */
.p-head{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:18px 30px 0 30px;flex:0 0 auto}
.p-head .ph-brand{display:flex;align-items:center;gap:9px}
.p-head .ph-mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--navy),var(--now));
  display:grid;place-items:center;color:#fff;font-size:9px;font-weight:900}
.p-head .ph-name{font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--ink)}
.p-head .ph-doc{font-size:10px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--now-d)}
.p-rule{height:3px;margin:12px 30px 0;border-radius:999px;
  background:linear-gradient(90deg,var(--now-d),var(--now) 45%,transparent)}
.p-body{flex:1 1 auto;overflow-y:auto;padding:20px 30px 14px;scrollbar-width:thin}
.p-body::-webkit-scrollbar{width:7px}.p-body::-webkit-scrollbar-thumb{background:#cfdde2;border-radius:999px}
.p-foot{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:9px 30px 16px;font-size:9.5px;font-weight:600;color:var(--muted);border-top:1px solid var(--line)}
.p-foot .pf-c{color:var(--ink);font-weight:700}
.p-foot .pf-n{font-weight:800;color:var(--now-d)}

/* typography inside pages */
.p-body h1{font-size:26px;font-weight:900;letter-spacing:-.03em;line-height:1.08;margin:2px 0 12px;color:var(--ink)}
.p-body h2{font-size:18px;font-weight:850;letter-spacing:-.02em;margin:20px 0 9px;color:var(--ink);
  display:flex;align-items:center;gap:9px}
.p-body h2::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--now);box-shadow:0 0 0 3px rgba(98,216,78,.18);flex:0 0 auto}
.p-body h3{font-size:13.5px;font-weight:800;margin:15px 0 6px;color:var(--ink-2)}
.p-body p{font-size:12.5px;line-height:1.62;color:#26373d;margin:0 0 11px}
.p-body ul,.p-body ol{margin:0 0 12px;padding-left:4px;list-style:none}
.p-body li{font-size:12.5px;line-height:1.55;color:#26373d;margin:0 0 7px;padding-left:20px;position:relative}
.p-body li::before{content:"";position:absolute;left:2px;top:7px;width:7px;height:7px;border-radius:2px;
  background:var(--now);transform:rotate(45deg)}
.p-body strong{color:var(--ink);font-weight:800}
.p-body .lead{font-size:14px;line-height:1.6;color:#1c2c32;font-weight:500}
.p-body .eyebrow{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(51,178,74,.3);
  background:rgba(98,216,78,.10);border-radius:999px;padding:6px 13px;font-size:10.5px;font-weight:800;
  letter-spacing:.06em;text-transform:uppercase;color:var(--now-d);margin-bottom:14px}
.p-body .eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--now)}
.callout{background:var(--bg);border:1px solid var(--line);border-left:4px solid var(--now);
  border-radius:12px;padding:13px 16px;margin:4px 0 14px}
.callout p{margin:0;font-size:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:2px 0 14px}
.kcard{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.kcard .kt{font-size:11px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:var(--now-d);margin-bottom:5px}
.kcard .kd{font-size:11.5px;line-height:1.5;color:#33474f}
table{width:100%;border-collapse:collapse;margin:2px 0 14px;font-size:11px}
th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:top}
th{background:var(--ink);color:#fff;font-weight:800;font-size:10px;letter-spacing:.03em}
tr:nth-child(even) td{background:#fafcfc}
.metric-row{display:flex;gap:9px;flex-wrap:wrap;margin:2px 0 14px}
.metric-row .m{flex:1 1 110px;background:var(--ink);color:#fff;border-radius:14px;padding:13px}
.metric-row .m .v{font-size:22px;font-weight:900;letter-spacing:-.02em;
  background:linear-gradient(120deg,var(--now),var(--now-l));-webkit-background-clip:text;background-clip:text;color:transparent}
.metric-row .m .l{font-size:10px;font-weight:700;color:#bcd6de;margin-top:3px}

/* COVER */
.cover{background:linear-gradient(135deg,#04222f,#0a3a4d 60%,#071d28);color:#fff;
  justify-content:space-between;padding:40px 38px}
.cover .c-aurora{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(45% 45% at 82% 10%,rgba(98,216,78,.34),transparent 70%),
   radial-gradient(45% 55% at 10% 96%,rgba(51,178,74,.22),transparent 70%)}
.cover>*{position:relative;z-index:1}
.cover .c-top{display:flex;align-items:center;justify-content:space-between}
.cover .c-mark{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--navy),var(--now));
  display:grid;place-items:center;color:#fff;font-size:18px;font-weight:900;box-shadow:0 12px 30px rgba(51,178,74,.4)}
.cover .c-pill{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(98,216,78,.45);
  background:rgba(98,216,78,.12);border-radius:999px;padding:7px 13px;font-size:11px;font-weight:800;color:#d6ffce}
.cover .c-pill::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--now)}
.cover .c-mid{margin-top:auto}
.cover .c-eyebrow{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--now-l);margin-bottom:16px}
.cover h1{font-size:clamp(34px,7vw,58px);font-weight:900;line-height:.98;letter-spacing:-.05em;margin:0 0 14px}
.cover h1 .accent{background:linear-gradient(120deg,var(--now),var(--now-l));-webkit-background-clip:text;background-clip:text;color:transparent}
.cover .c-sub{font-size:15px;line-height:1.5;color:#d3e7ee;max-width:90%;font-weight:500}
.cover .c-meta{margin-top:26px;padding-top:18px;border-top:1px solid rgba(255,255,255,.16);
  display:flex;align-items:flex-end;justify-content:space-between;gap:14px}
.cover .c-meta .cm-l .cm-by{font-size:13px;font-weight:800;color:#eaf7f8}
.cover .c-meta .cm-l .cm-rel{font-size:11.5px;color:#bcd6de;margin-top:3px;font-weight:600}
.cover .c-meta .cm-r{font-size:10px;color:#9fbcc6;text-align:right;font-weight:600;max-width:46%}

/* BACK */
.back-cover{background:linear-gradient(135deg,#04222f,#0a3a4d 60%,#071d28);color:#fff;justify-content:space-between;padding:40px 38px}
.back-cover .bc-aurora{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(45% 45% at 18% 12%,rgba(98,216,78,.28),transparent 70%)}
.back-cover>*{position:relative;z-index:1}
.back-cover h2{font-size:24px;font-weight:900;letter-spacing:-.03em;margin-bottom:12px;color:#fff}
.back-cover h2::before{display:none}
.back-cover p{font-size:12.5px;line-height:1.6;color:#d3e7ee;margin-bottom:11px}
.back-cover .bc-cta{display:inline-flex;align-items:center;gap:9px;background:var(--now);color:#06231a;
  font-weight:800;font-size:13px;border-radius:999px;padding:12px 22px;margin-top:6px}
.back-cover .legacy{margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,.16);
  font-size:10.5px;line-height:1.55;color:#bcd6de}
.back-cover .legacy strong{color:#eaf7f8}
.back-cover .disclaimer{font-size:9px;line-height:1.5;color:#7fa0ab;margin-top:12px}
.back-cover .bc-foot{margin-top:14px;font-size:11px;font-weight:700;color:#cfe9d3;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* controls */
.controls{position:relative;z-index:6;display:flex;align-items:center;gap:16px;padding:14px 0 22px;color:#eaf7f8}
.nav-btn{width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer;display:grid;place-items:center;
  backdrop-filter:blur(8px);transition:.2s ease}
.nav-btn:hover:not(:disabled){background:var(--now);color:#06231a;transform:translateY(-2px)}
.nav-btn:disabled{opacity:.32;cursor:default}
.counter{font-size:13px;font-weight:800;min-width:80px;text-align:center;letter-spacing:.04em}
.counter b{color:var(--now-l)}
.hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:6;font-size:11px;color:#9fbcc6;font-weight:600;opacity:.8}
@media(max-width:640px){.p-body{padding:16px 18px 12px}.p-head{padding:14px 18px 0}.p-rule,.p-foot{margin-left:0;padding-left:18px;padding-right:18px}.p-rule{margin:10px 18px 0}.cover,.back-cover{padding:30px 24px}}
</style>

const PAGES = [

{doc:"CivicPulse", html:`
  <div class="eyebrow">Executive Summary</div>
  <h1>A clear, factual view of local democracy</h1>
  <p class="lead">CivicPulse is a civic accountability app that helps residents understand who represents them, what is on the upcoming ballot, and how to take part in their community &mdash; all from their phone or Mac.</p>
  <p>Local government shapes daily life, yet the information needed to participate is often scattered across agency websites, board filings, and election notices. CivicPulse gathers that information into one neutral, easy-to-navigate reference so residents can find their officials, study their districts, and track races without wading through bureaucracy.</p>
  <p>The first release launches with full coverage for <strong>Guilford County, North Carolina</strong>, built on official ballot and elections data for 2026. The app is free worldwide and available on iPhone, iPad, and Mac.</p>
  <div class="callout"><p><strong>The goal:</strong> lower the barrier to civic participation. When the facts are easy to find, more people can engage with confidence.</p></div>`},

{doc:"CivicPulse", html:`
  <div class="eyebrow">What It Is</div>
  <h1>A civic reference, organized around you</h1>
  <p>CivicPulse is a personal civic companion. It answers the everyday questions residents have about their local government and elections, and it keeps a private record of where you stand.</p>
  <h2>Built for a real community first</h2>
  <p>The launch release focuses on <strong>Guilford County, North Carolina</strong>, including the Greensboro area. It is populated from official sources &mdash; the county Board of Elections filing report and district records &mdash; with <strong>2026 ballot data</strong> covering the seats up for election.</p>
  <h2>Designed to grow county by county</h2>
  <p>Under the hood, each county is described by its own structured data file. Adding a new community is a matter of adding a new dataset, so coverage can expand over time without reworking the app.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Scope</div><div class="kd">City, county, state, and federal seats relevant to a resident&rsquo;s address.</div></div>
    <div class="kcard"><div class="kt">Stance</div><div class="kd">Politically neutral. Presents facts and contacts, not opinions or endorsements.</div></div>
  </div>`},

{doc:"CivicPulse", html:`
  <div class="eyebrow">What It Does</div>
  <h1>Everything you need to engage</h1>
  <p>CivicPulse organizes civic life into focused tabs, each answering a common question.</p>
  <h2>Core features</h2>
  <ul>
    <li><strong>My Officials</strong> &mdash; browse city, county, state, and federal representatives with direct contact buttons.</li>
    <li><strong>Districts</strong> &mdash; understand seat math and look up which districts apply to you.</li>
    <li><strong>2026 Races</strong> &mdash; the seats on the upcoming ballot, with an election-day countdown and a personal ballot view.</li>
    <li><strong>My Scorecard</strong> &mdash; a private, on-device place to approve or disapprove of officials, add notes, and export your own record as CSV or JSON.</li>
    <li><strong>Act</strong> &mdash; register to vote, find meetings, contact officials, and discover local community partner organizations.</li>
    <li><strong>Civics 101</strong> &mdash; plain-language explainers covering how local government and elections work.</li>
  </ul>
  <div class="callout"><p>Records still awaiting source confirmation are clearly marked with a <strong>&ldquo;pending verification&rdquo;</strong> badge, so users always know what is confirmed.</p></div>`},

{doc:"CivicPulse", html:`
  <div class="eyebrow">How It Works</div>
  <h1>Native, offline-first, and transparent</h1>
  <p>CivicPulse is a native application built with <strong>SwiftUI</strong>, sharing one codebase across iPhone, iPad, and Mac for a fast, platform-native experience.</p>
  <h2>Data sources</h2>
  <p>Civic content is drawn from official public records &mdash; the county Board of Elections filing report, district descriptions, and published seat information. Each county is encoded in its own structured data file bundled with the app.</p>
  <h2>Architecture</h2>
  <ul>
    <li><strong>County-generic schema</strong> &mdash; a single data format describes any locality; a new county is a new data file.</li>
    <li><strong>Offline-first</strong> &mdash; civic data ships in the app, so the core experience works without a network connection.</li>
    <li><strong>Resilient loading</strong> &mdash; the data loader degrades gracefully on unexpected values rather than failing, keeping the app dependable.</li>
  </ul>
  <div class="metric-row">
    <div class="m"><div class="v">1</div><div class="l">Shared SwiftUI codebase</div></div>
    <div class="m"><div class="v">3</div><div class="l">Apple platforms</div></div>
    <div class="m"><div class="v">2026</div><div class="l">Ballot data year</div></div>
  </div>`},

{doc:"CivicPulse", html:`
  <div class="eyebrow">How We Keep It Safe</div>
  <h1>Private by design, neutral by principle</h1>
  <p>CivicPulse treats both your privacy and the integrity of its information as first-class commitments.</p>
  <h2>Your opinions stay yours</h2>
  <p>Your scorecard &mdash; the officials you approve or disapprove of and the notes you keep &mdash; lives <strong>entirely on your device</strong>. It is never required to leave your phone or Mac. You choose when to export it, and where it goes.</p>
  <h2>Neutral, factual data</h2>
  <p>The app presents <strong>facts and contacts, not opinions</strong>. It does not endorse candidates or positions. Content is sourced from official public records, and any item not yet confirmed against its source is labeled as pending verification rather than presented as settled fact.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">On-device</div><div class="kd">Personal scorecard and notes stay local; you control export.</div></div>
    <div class="kcard"><div class="kt">Free &amp; open</div><div class="kd">Free worldwide, with no paywall on civic information.</div></div>
  </div>`},

{doc:"CivicPulse", html:`
  <div class="eyebrow">Apple Platform Integration</div>
  <h1>At home on every Apple device</h1>
  <p>CivicPulse is a true native app, not a wrapped website, and it takes advantage of the platforms it runs on.</p>
  <h2>Universal by design</h2>
  <ul>
    <li><strong>iPhone, iPad, and Mac</strong> from a single SwiftUI codebase.</li>
    <li><strong>System-native contact actions</strong> &mdash; call and email buttons hand off to the built-in phone and mail experiences.</li>
    <li><strong>Standard export formats</strong> &mdash; scorecard data exports as CSV and JSON for use in spreadsheets and other tools.</li>
    <li><strong>Accessibility</strong> &mdash; built on standard SwiftUI controls that support Dynamic Type, VoiceOver, and other system features.</li>
  </ul>
  <div class="callout"><p>One download covers iPhone, iPad, and Mac &mdash; the same civic reference, sized to whatever device is in hand.</p></div>`},

{doc:"CivicPulse", html:`
  <div class="eyebrow">Availability &amp; About</div>
  <h1>Getting started &mdash; and what&rsquo;s next</h1>
  <h2>Availability</h2>
  <p>CivicPulse is <strong>free, worldwide</strong>, on iPhone, iPad, and Mac. The first release ships with full coverage for Guilford County, North Carolina, built on 2026 ballot data.</p>
  <h2>Care before launch</h2>
  <p>A small set of records &mdash; certain race outcomes, seat successions, and approximate district descriptions &mdash; are held for source confirmation before public release. These appear with a clear pending-verification badge so the app never presents unconfirmed information as final.</p>
  <h2>On the roadmap</h2>
  <ul>
    <li>Coverage for additional counties.</li>
    <li>Address-based district detection.</li>
    <li>Meeting and election reminders.</li>
    <li>Optional community-level engagement features.</li>
  </ul>
  <h2>About Omar Huertas LLC</h2>

/* ===== engine ===== */
const book=document.getElementById('book');
const total=PAGES.length;
document.getElementById('tot').textContent=total;
const pageEls=[];
PAGES.forEach((pg,i)=>{
  const el=document.createElement('div');el.className='page';
  const front=document.createElement('div');front.className='face front';
  if(pg.cover) front.classList.add('cover');
  else if(pg.back) front.classList.add('back-cover');
  if(pg.cover||pg.back){
    if(pg.cover) front.innerHTML='<div class="c-aurora"></div>'+pg.html;
    else front.innerHTML='<div class="bc-aurora"></div>'+pg.html;
  } else {
    front.innerHTML =
      '<div class="p-head"><span class="ph-brand"><span class="ph-mark">OH</span>'+
      '<span class="ph-name">Omar Huertas LLC</span></span>'+
      '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div>'+
      '<div class="p-rule"></div>'+
      '<div class="p-body">'+pg.html+'</div>'+
      '<div class="p-foot"><span class="pf-c">&copy; 2026 Omar Huertas LLC</span>'+
      '<span class="pf-n">'+String(i+1).padStart(2,'0')+'</span></div>';
  }
  el.appendChild(front);
  book.appendChild(el);
  pageEls.push(el);
});

let cur=0;
function render(){
  pageEls.forEach((el,i)=>{
    const turned = i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (total - i);
  });
  document.getElementById('cur').textContent=Math.min(cur+1,total);
  document.getElementById('progress').firstElementChild.style.width=((cur)/(total-1)*100)+'%';
  document.getElementById('prev').disabled=cur<=0;
  document.getElementById('next').disabled=cur>=total-1;
}
function next(){if(cur<total-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
book.addEventListener('click',e=>{const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
render();
</script>
