<script>
const DOC = "ServiceFleet Pro";
const PAGES = [
{cover:true, html:`
  <div class="c-top"><span class="c-mark">OH</span><span class="c-pill">ServiceNow Partner</span></div>
  <div class="c-mid">
    <div class="c-eyebrow">ServiceFleet&trade; &middot; White Paper</div>
    <h1>ServiceFleet <span class="accent">Pro</span></h1>
    <p class="c-sub">Native macOS &amp; iOS ITSM / ITOM / ITAM &mdash; a full service&#8209;management platform on your desktop and in your pocket.</p>
    <div class="c-meta">
      <div class="cm-l"><div class="cm-by">A White Paper by Omar Huertas LLC</div><div class="cm-rel">Release 1.0 &middot; June 2026</div></div>
      <div class="cm-r">&copy; 2026 Omar Huertas LLC. All rights reserved.</div>
    </div>
  </div>`},

{html:`
  <span class="eyebrow">Executive Summary</span>
  <h1>A full service&#8209;management platform, native to Apple.</h1>
  <p class="lead">ServiceFleet Pro is a large native macOS and iOS application that delivers ITSM, ITOM, and ITAM capability directly on Apple hardware &mdash; with a built&#8209;in MID server, Apple MDM, and multi&#8209;cloud discovery, all wired into the ServiceNow CMDB.</p>
  <div class="metric-row">
    <div class="m"><div class="v">~462</div><div class="l">Swift Files</div></div>
    <div class="m"><div class="v">~307K</div><div class="l">Lines of Code</div></div>
    <div class="m"><div class="v">174</div><div class="l">Data Models</div></div>
    <div class="m"><div class="v">2</div><div class="l">Platforms</div></div>
  </div>
  <p>Built by an architect with Elite&#8209;tier ServiceNow partner experience, ServiceFleet Pro is engineered to enterprise and Fortune&#8209;500 standards &mdash; honest, best&#8209;in&#8209;class delivery across CMDB, ITAM, ITSM, Integrations, AI, Flow, and ITOM.</p>`},

{html:`
  <span class="eyebrow">The Problem</span>
  <h1>Operators are trapped in a browser tab.</h1>
  <p class="lead">Service&#8209;management work on Apple hardware has never had a first&#8209;class home.</p>
  <h2>Browser&#8209;bound</h2>
  <p>ServiceNow operators are tied to a browser window. There is no first&#8209;class native Apple experience &mdash; just a web app rendered in a tab, divorced from the platform it runs on.</p>
  <h2>Fragmented tooling</h2>
  <p>Cloud discovery, MID&#8209;server operation, and Apple device management each typically demand their own separate tooling. The result is a sprawl of consoles, agents, and credentials that operators must stitch together by hand.</p>
  <div class="callout"><p>ServiceFleet Pro collapses that sprawl into one native application &mdash; discovery, MID, MDM, and the CMDB pipeline in a single place.</p></div>`},

{html:`
  <span class="eyebrow">What It Is</span>
  <h1>A native platform, not a wrapper.</h1>
  <p class="lead">ServiceFleet Pro is a large native macOS and iOS application &mdash; effectively a full ServiceNow&#8209;style ITSM / ITOM / ITAM platform running natively on Apple hardware.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">Scale</div><div class="kd">~462 Swift files and roughly 307,000 lines of code across two platforms.</div></div>
    <div class="kcard"><div class="kt">Data Layer</div><div class="kd">174 SwiftData models backing the full service&#8209;management domain.</div></div>
    <div class="kcard"><div class="kt">Built&#8209;In MID</div><div class="kd">A native MID server runs inside the app &mdash; no separate appliance.</div></div>
    <div class="kcard"><div class="kt">Apple MDM</div><div class="kd">Native Apple device management plus multi&#8209;cloud discovery.</div></div>
  </div>
  <p>It is the operator <strong>interface</strong> pillar of ServiceFleet &mdash; the place where engineers live, with the heavy machinery built in rather than bolted on.</p>`},

{html:`
  <span class="eyebrow">What It Does</span>
  <h1>Discovery, MID, MDM &mdash; in one place.</h1>
  <ul>
    <li><strong>Cloud Connections</strong> &mdash; multi&#8209;cloud discovery across providers from one panel.</li>
    <li><strong>Native Linux / SSH discovery</strong> via an embedded SwiftNIO SSH stack &mdash; no external collector required.</li>
    <li><strong>Native MID&#8209;server behavior</strong> &mdash; discovered CIs are pushed into the ServiceNow CMDB through IRE.</li>
    <li><strong>Apple MDM</strong> &mdash; enroll, supervise, and manage Apple devices natively.</li>
    <li><strong>Discovery &amp; Service Mapping</strong> &mdash; build out infrastructure and the services that ride on it.</li>
    <li><strong>Event Management</strong> &mdash; ingest and correlate operational events.</li>
    <li><strong>SecOps</strong> &mdash; security operations workflows alongside ITSM.</li>
    <li><strong>HAM / SAM</strong> &mdash; hardware and software asset management end to end.</li>
  </ul>`},

{html:`
  <span class="eyebrow">Integration Hub</span>
  <h1>One panel. Every module, on or off.</h1>
  <p class="lead">Connect to a ServiceNow instance and toggle each module or companion on or off &mdash; ServiceFleet Pro adapts to exactly the footprint you need.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">MID Server</div><div class="kd">Native MID behavior, built in.</div></div>
    <div class="kcard"><div class="kt">CMDB / IRE</div><div class="kd">Identification and reconciliation push.</div></div>
    <div class="kcard"><div class="kt">Discovery</div><div class="kd">Infrastructure discovery across the estate.</div></div>
    <div class="kcard"><div class="kt">Service Mapping</div><div class="kd">Map services onto discovered CIs.</div></div>
    <div class="kcard"><div class="kt">Event Management</div><div class="kd">Operational event ingestion.</div></div>
    <div class="kcard"><div class="kt">Cloud Connections</div><div class="kd">Multi&#8209;cloud discovery.</div></div>
    <div class="kcard"><div class="kt">SecOps</div><div class="kd">Security operations workflows.</div></div>
    <div class="kcard"><div class="kt">HAM / SAM</div><div class="kd">Hardware &amp; software asset management.</div></div>
    <div class="kcard"><div class="kt">ServiceFleet MDM</div><div class="kd">Native Apple device management.</div></div>
    <div class="kcard"><div class="kt">ServiceFleet MID / IMID Agent</div><div class="kd">Mobile discovery companion.</div></div>
    <div class="kcard"><div class="kt">TMF Logger Pro</div><div class="kd">Telemetry and logging companion.</div></div>
    <div class="kcard"><div class="kt">ServiceFleet Vault</div><div class="kd">Credential authority for the suite.</div></div>
  </div>`},

{html:`
  <span class="eyebrow">How It Works &amp; Stays Safe</span>
  <h1>Modular by design. Encrypted by default.</h1>
  <h2>Architecture</h2>
  <ul>
    <li>SwiftUI and SwiftData throughout &mdash; <strong>174 models</strong> across the domain.</li>
    <li>An embedded SSH discovery engine built on <strong>SwiftNIO SSH</strong>.</li>
    <li>IRE push moves discovered CIs cleanly into the CMDB.</li>
    <li>Modular, toggleable capabilities &mdash; run only what you need.</li>
  </ul>
  <h2>Security</h2>
  <p><strong>CredentialCrypto</strong> provides transparent AES&#8209;GCM at&#8209;rest encryption for every connection and credential model, with the key held in the Apple Keychain.</p>
  <div class="callout"><p>Secrets live in private encrypted columns with computed accessors &mdash; plaintext is never persisted. ServiceFleet Pro is designed to use <strong>ServiceFleet Vault</strong> as its credential authority.</p></div>`},

{html:`
  <span class="eyebrow">Apple Integration &amp; Companion</span>
  <h1>Apple&#8209;native, end to end.</h1>
  <p class="lead">100% native SwiftUI / SwiftData on macOS and iOS / iPadOS &mdash; the only ServiceNow&#8209;style operator platform that is Apple&#8209;native rather than a browser wrapper.</p>
  <ul>
    <li>Keychain&#8209;backed crypto across the application.</li>
    <li>LocalAuthentication&#8209;ready for biometric access.</li>
  </ul>
  <h2>Companion: ServiceFleet Agent</h2>

/* ===== engine ===== */
const book=document.getElementById('book');
const total=PAGES.length;
document.getElementById('tot').textContent=total;
const pageEls=[];
PAGES.forEach((pg,i)=>{
  const el=document.createElement('div');el.className='page';
  const front=document.createElement('div');front.className='face front';
  if(pg.cover) front.classList.add('cover');
  else if(pg.back) front.classList.add('back-cover');
  if(pg.cover||pg.back){
    if(pg.cover) front.innerHTML='<div class="c-aurora"></div>'+pg.html;
    else front.innerHTML='<div class="bc-aurora"></div>'+pg.html;
  } else {
    front.innerHTML =
      '<div class="p-head"><span class="ph-brand"><span class="ph-mark">OH</span>'+
      '<span class="ph-name">Omar Huertas LLC</span></span>'+
      '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div>'+
      '<div class="p-rule"></div>'+
      '<div class="p-body">'+pg.html+'</div>'+
      '<div class="p-foot"><span class="pf-c">&copy; 2026 Omar Huertas LLC</span>'+
      '<span class="pf-n">'+String(i+1).padStart(2,'0')+'</span></div>';
  }
  el.appendChild(front);
  book.appendChild(el);
  pageEls.push(el);
});

let cur=0;
function render(){
  pageEls.forEach((el,i)=>{
    const turned = i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (total - i);
  });
  document.getElementById('cur').textContent=Math.min(cur+1,total);
  document.getElementById('progress').firstElementChild.style.width=((cur)/(total-1)*100)+'%';
  document.getElementById('prev').disabled=cur<=0;
  document.getElementById('next').disabled=cur>=total-1;
}
function next(){if(cur<total-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
book.addEventListener('click',e=>{const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
render();
</script>
