const DOC = "ServiceFleet Vault";
const PAGES = [
{cover:true, html:`
  <div class="c-top"><span class="c-mark">OH</span><span class="c-pill">ServiceNow Partner</span></div>
  <div class="c-mid">
    <div class="c-eyebrow">ServiceFleet&trade; · White Paper</div>
    <h1>ServiceFleet <span class="accent">Vault</span></h1>
    <p class="c-sub">Zero&#8209;Knowledge Credential Management, Authentication &amp; Identity &mdash; for endpoints, the enterprise, and ServiceNow.</p>
    <div class="c-meta">
      <div class="cm-l"><div class="cm-by">A White Paper by Omar Huertas LLC</div><div class="cm-rel">Release 1.0 &middot; June 2026</div></div>
      <div class="cm-r">&copy; 2026 Omar Huertas LLC. All rights reserved.</div>
    </div>
  </div>`},

{html:`
  <span class="eyebrow">Executive Summary</span>
  <h1>Identity and credentials, owned end to end.</h1>
  <p class="lead">ServiceFleet Vault is the identity and credentials pillar of the ServiceFleet platform. It delivers zero&#8209;knowledge secret storage, strong authentication, and enterprise federation across three tightly integrated components &mdash; native endpoint clients, a ServiceNow scoped application, and a self&#8209;hosted server.</p>
  <p>Built to enterprise and Fortune&#8209;500 standards, ServiceFleet Vault gives organizations full ownership of their crypto, identity, and federation stack instead of renting it from a SaaS provider. The server, the apps, and the ServiceNow bridge all speak the same API, so secrets can live where the organization needs them &mdash; on the device, on&#8209;premises, or inside the ServiceNow platform.</p>
  <div class="metric-row">
    <div class="m"><div class="v">AES&#8209;256&#8209;GCM</div><div class="l">Encryption at rest</div></div>
    <div class="m"><div class="v">Zero&#8209;Knowledge</div><div class="l">No admin backdoor</div></div>
    <div class="m"><div class="v">NIST 800&#8209;53</div><div class="l">Control alignment</div></div>
    <div class="m"><div class="v">SAML 2.0</div><div class="l">Federation / SSO</div></div>
  </div>`},

{html:`
  <span class="eyebrow">The Problem</span>
  <h1>The problem it solves.</h1>
  <p class="lead">Secrets multiply faster than the tooling that should govern them.</p>
  <h2>Credential sprawl</h2>
  <p>Passwords, API keys, TOTP seeds, discovery credentials, and service&#8209;account secrets accumulate across spreadsheets, ticket comments, personal password managers, and shared drives. Each copy is a liability, and none of them prove who accessed what or when.</p>
  <h2>A gap in the ServiceNow ecosystem</h2>
  <p>The ServiceNow platform manages enormous operational value, yet there is no first&#8209;class, zero&#8209;knowledge vault that lives natively inside it &mdash; one that governs platform secrets and connection credentials with real cryptographic separation rather than trust in administrators.</p>
  <h2>Ownership over dependency</h2>
  <p>Many organizations are unwilling to hand their most sensitive secrets to a third&#8209;party SaaS vault. They want the same guarantees on infrastructure they own and control, with the option to run on&#8209;premises and integrate on their own terms.</p>`},

{html:`
  <span class="eyebrow">What It Is</span>
  <h1>Three components, one identity fabric.</h1>
  <p>ServiceFleet Vault is delivered as three integrated components that share a common API and security model.</p>
  <div class="grid2">
    <div class="kcard"><div class="kt">CustosKey</div><div class="kd">Native SwiftUI authenticator and encrypted vault &mdash; Mac&#8209;first, then iOS, Windows, and Android. (&ldquo;Custos&rdquo; is Latin for &ldquo;guardian.&rdquo;) Built on CryptoKit, LocalAuthentication biometrics, and the Keychain; RFC 6238 TOTP codes; vault sealed with ChaCha20&#8209;Poly1305.</div></div>
    <div class="kcard"><div class="kt">ServiceVault</div><div class="kd">A ServiceNow scoped application (x_omhu_servicevlt) with four tables, supporting script includes, and a REST API &mdash; bringing zero&#8209;knowledge secret storage natively into the platform.</div></div>
    <div class="kcard"><div class="kt">CustosKey Server</div><div class="kd">A self&#8209;hosted backend on .NET 8 / ASP.NET Core with EF Core 8 &mdash; runs as a Windows Service, launchd agent, or systemd unit, so organizations keep their secrets on infrastructure they own.</div></div>
    <div class="kcard"><div class="kt">One API surface</div><div class="kd">The server mirrors the ServiceVault API, so native clients can point at either backend interchangeably &mdash; ServiceNow&#8209;hosted or self&#8209;hosted &mdash; without code changes.</div></div>
  </div>`},

{html:`
  <span class="eyebrow">What It Does</span>
  <h1>What it does.</h1>
  <p>ServiceFleet Vault covers the full lifecycle of secrets and access &mdash; from personal storage to governed team sharing to platform integration.</p>
  <ul>
    <li><strong>Zero&#8209;knowledge per&#8209;user vaults.</strong> Secrets are client&#8209;encrypted into opaque blobs with self&#8209;only ACLs &mdash; no administrator override, ever.</li>
    <li><strong>Team vaults with governance.</strong> Shared secrets flow through checkout, grant, and approval workflows so access is deliberate and recorded.</li>
    <li><strong>Native ServiceNow bridge.</strong> Governs discovery credentials, connection aliases, and MID server secrets directly inside the platform.</li>
    <li><strong>Self&#8209;service access requests.</strong> Users request access through a workflow that routes for approval rather than back&#8209;channel sharing.</li>
    <li><strong>Strong authentication.</strong> Built&#8209;in TOTP / 2FA generation and verification for the accounts that matter.</li>
    <li><strong>Enterprise SSO.</strong> Acts as a SAML 2.0 Identity Provider for federated single sign&#8209;on.</li>
  </ul>`},

{html:`
  <span class="eyebrow">Security Architecture</span>
  <h1>How we keep it safe.</h1>
  <p class="lead">Security is the product. Every layer is designed so that trust never has to be placed in the server or its administrators.</p>
  <ul>
    <li><strong>Zero&#8209;knowledge by design.</strong> The server stores only opaque, client&#8209;encrypted blobs &mdash; there is no administrator backdoor.</li>
    <li><strong>Modern AEAD ciphers.</strong> AES&#8209;256&#8209;GCM (via GlideEncrypter on the platform) and ChaCha20&#8209;Poly1305 for authenticated encryption.</li>
    <li><strong>Argon2id key derivation.</strong> Memory&#8209;hard KDF resistant to brute&#8209;force and hardware attacks.</li>
    <li><strong>Tamper&#8209;evident audit.</strong> A SHA&#8209;256 hash&#8209;chain makes the audit log verifiable and append&#8209;only in practice.</li>
    <li><strong>Constant&#8209;time TOTP comparison.</strong> Timing&#8209;attack&#8209;resistant verification of one&#8209;time codes.</li>
    <li><strong>Biometric unlock &amp; hardware keys.</strong> Keys held in the hardware&#8209;backed Keychain; unlock via Touch ID / Face ID.</li>
    <li><strong>43 configurable security properties</strong> with Strict, Standard, and Custom tiers enforced by a SecurityTierManager.</li>
    <li><strong>Full IP ownership</strong> of the crypto and SAML stack &mdash; no opaque third&#8209;party security dependencies.</li>
  </ul>`},

{html:`
  <span class="eyebrow">SSO / SAML &amp; Federation</span>
  <h1>Enterprise SSO, SAML &amp; federation.</h1>
  <p>ServiceFleet Vault includes a full SAML 2.0 Identity Provider built only on the .NET Base Class Library&rsquo;s SignedXml &mdash; no third&#8209;party SAML library, which means full IP ownership of the federation path.</p>
  <h2>Multi&#8209;tenant by design</h2>
  <p>A Tenant and Service&#8209;Provider registry with a per&#8209;tenant signing certificate underpins isolation. Each tenant exposes its own endpoints: metadata, SSO (redirect and POST bindings), IdP&#8209;initiated SSO, SLO, and login.</p>
  <h2>Verified end to end</h2>
  <p>IdP&#8209;initiated SSO produces a signed SAML Response &mdash; carrying Assertion, SignatureValue, Audience, NameID, Recipient, AuthnStatement, and Status:Success &mdash; auto&#8209;POSTed to a ServiceNow ACS. Signed metadata imports cleanly into ServiceNow Multi&#8209;Provider SSO.</p>
  <div class="callout"><p>An OIDC SSO broker is also included, federating to Microsoft Entra, Okta, Google, and Ping.</p></div>`},

{html:`
  <span class="eyebrow">Deployment &amp; Apple</span>
  <h1>Deployment &amp; macOS integration.</h1>
  <p class="lead">Run it where it makes sense &mdash; on&#8209;premises, in ServiceNow, or both &mdash; with first&#8209;class Apple platform support.</p>

/* ===== engine ===== */
const book=document.getElementById('book');
const total=PAGES.length;
document.getElementById('tot').textContent=total;
const pageEls=[];
PAGES.forEach((pg,i)=>{
  const el=document.createElement('div');el.className='page';
  const front=document.createElement('div');front.className='face front';
  if(pg.cover) front.classList.add('cover');
  else if(pg.back) front.classList.add('back-cover');
  if(pg.cover||pg.back){
    if(pg.cover) front.innerHTML='<div class="c-aurora"></div>'+pg.html;
    else front.innerHTML='<div class="bc-aurora"></div>'+pg.html;
  } else {
    front.innerHTML =
      '<div class="p-head"><span class="ph-brand"><span class="ph-mark">OH</span>'+
      '<span class="ph-name">Omar Huertas LLC</span></span>'+
      '<span class="ph-doc">'+(pg.doc||DOC)+'</span></div>'+
      '<div class="p-rule"></div>'+
      '<div class="p-body">'+pg.html+'</div>'+
      '<div class="p-foot"><span class="pf-c">&copy; 2026 Omar Huertas LLC</span>'+
      '<span class="pf-n">'+String(i+1).padStart(2,'0')+'</span></div>';
  }
  el.appendChild(front);
  book.appendChild(el);
  pageEls.push(el);
});

let cur=0;
function render(){
  pageEls.forEach((el,i)=>{
    const turned = i<cur;
    el.classList.toggle('turned',turned);
    el.style.zIndex = turned ? i : (total - i);
  });
  document.getElementById('cur').textContent=Math.min(cur+1,total);
  document.getElementById('progress').firstElementChild.style.width=((cur)/(total-1)*100)+'%';
  document.getElementById('prev').disabled=cur<=0;
  document.getElementById('next').disabled=cur>=total-1;
}
function next(){if(cur<total-1){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});
book.addEventListener('click',e=>{const r=book.getBoundingClientRect();(e.clientX-r.left)/r.width>0.5?next():prev();});
render();
</script>
